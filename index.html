function resetAll(){
  if(!confirm('לאפס את כל הסטטיסטיקה וההיסטוריה?')) return;
  stats = {}; history = [];
  store.set('k131_stats', stats); store.set('k131_history', history);
  renderHome();
}

/* ===== session engine ===== */
function newSession(indices, opts){
  session = {
    order: indices,
    i: 0,
    answers: {},          // pos -> chosen original answer index
    mode: opts.mode,      // 'study' | 'exam'
    label: opts.label,
    timeLeft: opts.seconds || null,
    record: opts.record !== false,
    perms: indices.map(qi => shuffle([0,1,2,3]))   // answer display order per question
  };
  if(session.timeLeft){
    timerInt = setInterval(()=>{
      session.timeLeft--;
      const el = document.getElementById('timer');
      if(el){
        el.textContent = fmtTime(session.timeLeft);
        el.classList.toggle('warn', session.timeLeft <= 300);
      }
      if(session.timeLeft <= 0){ stopTimer(); finishSession(true); }
    }, 1000);
  }
  renderQuestion();
}
function startStudy(topic){
  let idx = QUESTIONS.map((_,i)=>i);
  if(topic) idx = idx.filter(i=>QUESTIONS[i].t === topic);
  renderStudyPicker();
}
function renderStudyPicker(){
  stopTimer();
  app.innerHTML = `
  <div class="backrow"><button class="linkback" onclick="renderHome()">→ חזרה</button></div>
  <div class="card">
    <h2>📖 מצב לימוד</h2>
    <div class="muted">בחר נושא או עבור על כל המאגר. לכל שאלה תקבל מיד הסבר מפורט ומקור חוקי.</div>
  </div>
  <div class="card">
    <div class="studynav">
      <button class="fchip on" onclick="beginStudy(null)">הכול (${QUESTIONS.length})</button>
      ${TOPICS.map(t=>{
        const n = QUESTIONS.filter(q=>q.t===t).length;
        return `<button class="fchip" onclick="beginStudy('${t.replace(/'/g,"\\'")}')">${t} (${n})</button>`;
      }).join('')}
    </div>
  </div>`;
}
function beginStudy(topic){
  let idx = QUESTIONS.map((_,i)=>i);
  if(topic) idx = idx.filter(i=>QUESTIONS[i].t === topic);
  newSession(shuffle(idx), {mode:'study', label: topic ? 'לימוד: '+topic : 'מצב לימוד'});
}
function startSim(n){
  const pool = shuffle(QUESTIONS.map((_,i)=>i)).slice(0, n);
  const secs = n === 30 ? 45*60 : n === 60 ? 90*60 : null;
  newSession(pool, {mode:'exam', label: n >= QUESTIONS.length ? 'מרתון מלא' : 'סימולציה '+n, seconds: secs});
}
function startRandom(){
  newSession(shuffle(QUESTIONS.map((_,i)=>i)).slice(0,10), {mode:'study', label:'10 אקראיות'});
}
function startMistakes(){
  const pool = mistakesPool();
  if(!pool.length){
    app.innerHTML = `<div class="backrow"><button class="linkback" onclick="renderHome()">→ חזרה</button></div>
    <div class="card"><div class="empty"><div class="ic">🎉</div>אין שאלות לחיזוק כרגע.<br>ענה על שאלות במצבי התרגול וכל טעות תיאסף לכאן.</div></div>`;
    return;
  }
  newSession(shuffle(pool), {mode:'study', label:'חזרה על טעויות'});
}

/* ===== question rendering ===== */
function renderQuestion(){
  const s = session;
  const qi = s.order[s.i];
  const q = QUESTIONS[qi];
  const perm = s.perms[s.i];
  const answered = s.answers[s.i] !== undefined;
  const diffTxt = q.d >= 3 ? '🔴 קשה' : q.d === 2 ? '🟠 בינוני' : '🟢 קל';
  app.innerHTML = `
  <div class="qtop">
    <button class="linkback" onclick="confirmExit()">✕ יציאה</button>
    <div class="progresswrap"><div class="progressbar" style="width:${(s.i)/s.order.length*100}%"></div></div>
    <span class="muted" style="font-variant-numeric:tabular-nums">${s.i+1}/${s.order.length}</span>
    ${s.timeLeft != null ? `<span class="timer ${s.timeLeft<=300?'warn':''}" id="timer">${fmtTime(s.timeLeft)}</span>` : ''}
  </div>
  <div class="card">
    <div class="qmeta">
      <span class="chip topic">${q.t}</span>
      <span class="chip">${diffTxt}</span>
      <span class="chip">${s.label}</span>
    </div>
    <div class="qtext">${esc(q.q)}</div>
    <div class="answers" id="answers">
      ${perm.map((ai,pos)=>`
        <button class="ans" id="ans${ai}" onclick="choose(${ai})" ${answered?'disabled':''}>
          <span class="let">${['א','ב','ג','ד'][pos]}</span>
          <span>${esc(q.a[ai])}</span>
        </button>`).join('')}
    </div>
    <div class="explain" id="explain"></div>
    <div class="navrow">
      ${s.mode === 'exam'
        ? `<button class="btn ghost" onclick="prevQ()" ${s.i===0?'disabled':''}>הקודמת</button>
           <button class="btn primary" id="nextBtn" onclick="nextQ()" ${answered?'':'disabled'}>${s.i === s.order.length-1 ? 'סיום מבחן' : 'הבאה'}</button>`
        : `<button class="btn primary" id="nextBtn" onclick="nextQ()" ${answered?'':'disabled'}>${s.i === s.order.length-1 ? 'סיום' : 'הבאה'}</button>`}
    </div>
  </div>`;
  if(answered) showFeedback(qi, s.answers[s.i]);
}
function choose(ai){
  const s = session;
  if(s.answers[s.i] !== undefined) return;
  s.answers[s.i] = ai;
  const qi = s.order[s.i];
  const q = QUESTIONS[qi];
  if(s.record){
    if(!stats[qi]) stats[qi] = {ok:0, bad:0};
    if(ai === q.c) stats[qi].ok++; else stats[qi].bad++;
    store.set('k131_stats', stats);
  }
  document.querySelectorAll('.ans').forEach(b=>b.disabled = true);
  if(s.mode === 'study'){
    showFeedback(qi, ai);
  } else {
    document.getElementById('ans'+ai).classList.add('sel');
  }
  const nb = document.getElementById('nextBtn');
  if(nb) nb.disabled = false;
}
function showFeedback(qi, ai){
  const q = QUESTIONS[qi];
  const good = ai === q.c;
  const elC = document.getElementById('ans'+q.c);
  if(elC) elC.classList.add('correct');
  if(!good){
    const elW = document.getElementById('ans'+ai);
    if(elW) elW.classList.add('wrong');
  }
  if(session.mode === 'study'){
    const ex = document.getElementById('explain');
    ex.className = 'explain' + (good ? '' : ' bad');
    ex.style.display = 'block';
    ex.innerHTML = `<b>${good ? '✅ נכון!' : '❌ לא מדויק'}</b>${esc(q.e)}<span class="src">📕 מקור: ${esc(q.s)}</span>`;
  }
}
function nextQ(){
  const s = session;
  if(s.i === s.order.length - 1){ finishSession(false); return; }
  s.i++; renderQuestion();
}
function prevQ(){
  const s = session;
  if(s.i === 0) return;
  s.i--; renderQuestion();
}
function confirmExit(){
  if(Object.keys(session.answers).length === 0 || confirm('לצאת? ההתקדמות בסבב הנוכחי לא תישמר כתוצאה.')){
    renderHome();
  }
}

/* ===== results ===== */
function finishSession(timeUp){
  stopTimer();
  const s = session;
  const answeredPos = Object.keys(s.answers).map(Number);
  let good = 0;
  const mist = [];
  answeredPos.forEach(pos=>{
    const qi = s.order[pos], q = QUESTIONS[qi], ai = s.answers[pos];
    if(ai === q.c) good++;
    else mist.push({q, ai});
  });
  const total = s.mode === 'exam' ? s.order.length : answeredPos.length;
  if(total === 0){ renderHome(); return; }
  const pct = Math.round(good/total*100);
  if(s.mode === 'exam'){
    history.push({mode:s.label, score:good, total, date:Date.now()});
    if(history.length > 30) history = history.slice(-30);
    store.set('k131_history', history);
  }
  const pass = pct >= PASS;
  const ringColor = pass ? 'var(--green)' : 'var(--red)';
  const circ = 2*Math.PI*62;
  app.innerHTML = `
  <div class="backrow"><button class="linkback" onclick="renderHome()">→ למסך הבית</button></div>
  <div class="card">
    <h2 style="text-align:center">${s.label} — סיכום</h2>
    ${timeUp ? '<div class="muted" style="text-align:center">⏰ הזמן נגמר</div>' : ''}
    <div class="score-ring"><div class="ring">
      <svg width="150" height="150">
        <circle cx="75" cy="75" r="62" fill="none" stroke="var(--line)" stroke-width="12"/>
        <circle cx="75" cy="75" r="62" fill="none" stroke="${ringColor}" stroke-width="12"
          stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}"/>
      </svg>
      <div class="num"><b>${pct}%</b><span>${good} מתוך ${total}</span></div>
    </div></div>
    ${s.mode === 'exam'
      ? `<div class="passline" style="color:${ringColor}">${pass ? '✅ עובר! (ציון מעבר '+PASS+')' : '❌ מתחת לציון המעבר ('+PASS+') — ממשיכים לתרגל'}</div>`
      : ''}
    <div class="navrow">
      ${mist.length ? `<button class="btn navy" onclick="startMistakes()">🩹 תרגול הטעויות</button>` : ''}
      <button class="btn primary" onclick="renderHome()">למסך הבית</button>
    </div>
  </div>
  ${mist.length ? `
  <div class="card">
    <h2>📋 דוח טעויות (${mist.length})</h2>
    <div class="muted" style="margin-bottom:12px">עברו על כל טעות — ההסבר והמקור הם הלימוד האמיתי.</div>
    ${mist.map(m=>`
      <div class="mist">
        <div class="q">${esc(m.q.q)}</div>
        <div class="you">✗ סימנת: ${esc(m.q.a[m.ai])}</div>
        <div class="cor">✓ נכון: ${esc(m.q.a[m.q.c])}</div>
        <div class="ex">${esc(m.q.e)}<br>📕 ${esc(m.q.s)}</div>
      </div>`).join('')}
  </div>` : `<div class="card"><div class="empty"><div class="ic">🏅</div>ללא טעויות — מצוין!</div></div>`}`;
  window.scrollTo(0,0);
  session = null;
}

/* ===== stats & weakness ===== */
function renderStats(){
  stopTimer(); session = null;
  const ts = topicStats();
  const rows = TOPICS.map(t=>{
    const {ok, bad} = ts[t], tot = ok+bad;
    return {t, ok, bad, tot, pct: tot ? Math.round(ok/tot*100) : null};
  });
  const attempted = rows.filter(r=>r.tot > 0);
  const weak = attempted.filter(r=>r.pct < PASS).sort((a,b)=>a.pct-b.pct);
  app.innerHTML = `
  <div class="backrow"><button class="linkback" onclick="renderHome()">→ חזרה</button></div>
  <div class="card">
    <h2>📊 ביצועים לפי נושא</h2>
    ${attempted.length ? rows.map(r=>{
      if(!r.tot) return `<div class="tstat"><div class="row"><span>${r.t}</span><span class="muted">טרם תורגל</span></div><div class="tbar"><i style="width:0"></i></div></div>`;
      const col = r.pct >= PASS ? 'var(--green)' : r.pct >= 60 ? 'var(--orange)' : 'var(--red)';
      return `<div class="tstat">
        <div class="row"><span>${r.t}</span><span style="font-weight:700;color:${col}">${r.pct}% <span class="muted">(${r.ok}/${r.tot})</span></span></div>
        <div class="tbar"><i style="width:${r.pct}%;background:${col}"></i></div>
      </div>`;
    }).join('') : `<div class="empty"><div class="ic">📭</div>עדיין אין נתונים — התחל לתרגל ותחזור לכאן.</div>`}
  </div>
  ${attempted.length ? `
  <div class="card">
    <h2>🎯 ניתוח חולשות והמלצות</h2>
    ${weak.length ? `
      <div class="muted" style="margin-bottom:10px">נושאים מתחת לציון המעבר (${PASS}), מהחלש לחזק:</div>
      ${weak.map(r=>{
        const col = r.pct >= 60 ? 'var(--orange)' : 'var(--red)';
        return `<div class="weak">
          <span class="pct" style="background:${col};color:#fff">${r.pct}%</span>
          <span style="flex:1"><b>${r.t}</b><br><span class="muted">${r.bad} טעויות מתוך ${r.tot} — מומלץ מצב לימוד ממוקד בנושא זה</span></span>
        </div>`;
      }).join('')}
      <div class="navrow"><button class="btn navy" onclick="startMistakes()">🩹 תרגול כל הטעויות</button>
      <button class="btn primary" onclick="renderStudyPicker()">📖 לימוד לפי נושא</button></div>`
    : `<div class="empty"><div class="ic">💪</div>כל הנושאים שתרגלת מעל ציון המעבר — המשך כך!</div>`}
  </div>` : ''}
  ${history.length ? `
  <div class="card">
    <h2>🕘 היסטוריית סימולציות</h2>
    ${history.slice().reverse().map(h=>{
      const p = Math.round(h.score/h.total*100);
      const d = new Date(h.date);
      const ds = d.toLocaleDateString('he-IL') + ' ' + d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
      return `<div class="setrow"><span>${h.mode}<br><span class="muted" style="font-size:.75rem">${ds}</span></span>
        <span class="badge ${p>=PASS?'green':'red'}">${p}% (${h.score}/${h.total})</span></div>`;
    }).join('')}
  </div>` : ''}`;
}

/* ===== theme & boot ===== */
const themeBtn = document.getElementById('themeBtn');
function applyTheme(t){
  document.documentElement.dataset.theme = t;
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  store.set('k131_theme', t);
}
themeBtn.onclick = ()=> applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
document.getElementById('homeBtn').onclick = ()=>{
  if(session && Object.keys(session.answers).length && !confirm('לעזוב את הסבב הנוכחי?')) return;
  renderHome();
};
applyTheme(store.get('k131_theme', window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
renderHome();
</script>
</body>
</html>
