<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קבלן 131 · מאסטר בטיחות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2f0ec; --surface:#ffffff; --surface2:#faf9f6;
  --ink:#1b2430; --ink2:#5b6573; --line:#e3dfd7;
  --orange:#ff7a1a; --orange-d:#e05f00; --yellow:#ffc933;
  --navy:#16212e; --navy2:#21303f;
  --green:#1d9e5f; --green-bg:#e6f6ee;
  --red:#d8404a; --red-bg:#fdecee;
  --shadow:0 2px 10px rgba(22,33,46,.08);
  --radius:14px;
}
[data-theme="dark"]{
  --bg:#11181f; --surface:#1a232d; --surface2:#202b37;
  --ink:#eef2f6; --ink2:#9aa7b4; --line:#2c3947;
  --orange:#ff8a33; --orange-d:#ff7a1a; --yellow:#ffd24d;
  --navy:#0c1218; --navy2:#16212e;
  --green:#34c178; --green-bg:#16302a;
  --red:#ef6b74; --red-bg:#3a2026;
  --shadow:0 2px 12px rgba(0,0,0,.35);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{
  font-family:'Rubik','Heebo',-apple-system,'Segoe UI',Arial,sans-serif;
  background:var(--bg); color:var(--ink);
  min-height:100vh; line-height:1.55;
  transition:background .25s,color .25s;
}
.hazard{
  height:8px;
  background:repeating-linear-gradient(-45deg,#ffc933 0 14px,#1b2430 14px 28px);
}
header{
  background:var(--navy); color:#fff;
  padding:14px 16px; display:flex; align-items:center; gap:10px;
  position:sticky; top:0; z-index:50;
}
header .logo{
  width:40px;height:40px;border-radius:10px;flex:0 0 auto;
  background:var(--orange);display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
header .titles{flex:1;min-width:0}
header h1{font-size:1.02rem;font-weight:700;letter-spacing:.2px}
header .sub{font-size:.72rem;color:#9fb0c2}
.hbtn{
  background:var(--navy2);border:1px solid rgba(255,255,255,.14);color:#fff;
  border-radius:10px;padding:8px 10px;font-size:1rem;cursor:pointer;
  font-family:inherit;
}
.hbtn:active{transform:scale(.96)}
main{max-width:760px;margin:0 auto;padding:16px 14px 90px}
.card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px;margin-bottom:14px;
}
.muted{color:var(--ink2);font-size:.85rem}
h2{font-size:1.15rem;font-weight:700;margin-bottom:4px}
h3{font-size:.98rem;font-weight:600}

/* home */
.hero{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  color:#fff;border:none;position:relative;overflow:hidden;
}
.hero::after{
  content:"";position:absolute;inset-inline-start:-30px;top:-30px;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,122,26,.35),transparent 70%);
}
.hero h2{font-size:1.3rem}
.hero .muted{color:#aebccb}
.statrow{display:flex;gap:10px;margin-top:14px;position:relative;z-index:1}
.statbox{
  flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:10px;text-align:center;
}
.statbox b{display:block;font-size:1.25rem;color:var(--yellow)}
.statbox span{font-size:.7rem;color:#aebccb}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mode{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:14px;cursor:pointer;text-align:right;
  font-family:inherit;color:var(--ink);transition:transform .12s,border-color .12s;
  display:flex;flex-direction:column;gap:6px;
}
.mode:active{transform:scale(.97)}
.mode .ic{font-size:1.5rem}
.mode b{font-size:.95rem;font-weight:700}
.mode span{font-size:.74rem;color:var(--ink2)}
.mode.wide{grid-column:1/-1;flex-direction:row;align-items:center}
.mode.wide .tx{flex:1}
.badge{
  display:inline-block;background:var(--orange);color:#fff;border-radius:999px;
  padding:2px 10px;font-size:.7rem;font-weight:600;
}
.badge.gray{background:var(--ink2)}
.badge.green{background:var(--green)}
.badge.red{background:var(--red)}

/* quiz */
.qtop{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.progresswrap{flex:1;height:8px;background:var(--line);border-radius:99px;overflow:hidden;min-width:120px}
.progressbar{height:100%;background:linear-gradient(90deg,var(--orange),var(--yellow));width:0%;transition:width .3s}
.timer{
  font-variant-numeric:tabular-nums;font-weight:700;font-size:.92rem;
  background:var(--navy);color:var(--yellow);border-radius:9px;padding:4px 10px;
}
.timer.warn{background:var(--red);color:#fff;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.65}}
.qmeta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{
  font-size:.7rem;border-radius:999px;padding:3px 10px;font-weight:600;
  background:var(--surface2);border:1px solid var(--line);color:var(--ink2);
}
.chip.topic{background:var(--navy);border-color:var(--navy);color:var(--yellow)}
.qtext{font-size:1.06rem;font-weight:600;margin-bottom:14px;line-height:1.6}
.answers{display:flex;flex-direction:column;gap:9px}
.ans{
  font-family:inherit;font-size:.95rem;text-align:right;color:var(--ink);
  background:var(--surface2);border:1.5px solid var(--line);border-radius:12px;
  padding:12px 14px;cursor:pointer;line-height:1.5;transition:border-color .12s,background .12s;
  display:flex;gap:10px;align-items:flex-start;
}
.ans .let{
  flex:0 0 24px;height:24px;border-radius:7px;background:var(--line);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.78rem;color:var(--ink2);margin-top:1px;
}
.ans:not(:disabled):hover{border-color:var(--orange)}
.ans.sel{border-color:var(--orange);background:rgba(255,122,26,.08)}
.ans.sel .let{background:var(--orange);color:#fff}
.ans.correct{border-color:var(--green);background:var(--green-bg)}
.ans.correct .let{background:var(--green);color:#fff}
.ans.wrong{border-color:var(--red);background:var(--red-bg)}
.ans.wrong .let{background:var(--red);color:#fff}
.ans:disabled{cursor:default;opacity:1}
.explain{
  margin-top:14px;border-radius:12px;padding:13px 14px;font-size:.88rem;
  border:1.5px solid var(--green);background:var(--green-bg);display:none;
}
.explain.bad{border-color:var(--red);background:var(--red-bg)}
.explain b{display:block;margin-bottom:4px}
.explain .src{
  display:block;margin-top:8px;font-size:.76rem;color:var(--ink2);
  border-top:1px dashed var(--line);padding-top:7px;
}
.navrow{display:flex;gap:10px;margin-top:14px}
.btn{
  flex:1;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;
  border-radius:12px;padding:13px;border:none;transition:transform .1s,opacity .15s;
}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--orange);color:#fff}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn.navy{background:var(--navy);color:#fff}
.btn:disabled{opacity:.4;cursor:default}

/* results */
.score-ring{display:flex;justify-content:center;margin:8px 0 14px}
.ring{position:relative;width:150px;height:150px}
.ring svg{transform:rotate(-90deg)}
.ring .num{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.ring .num b{font-size:2rem;line-height:1}
.ring .num span{font-size:.72rem;color:var(--ink2)}
.passline{text-align:center;font-weight:700;margin-bottom:14px;font-size:1.05rem}
.tstat{margin-bottom:10px}
.tstat .row{display:flex;justify-content:space-between;font-size:.84rem;margin-bottom:4px}
.tbar{height:8px;background:var(--line);border-radius:99px;overflow:hidden}
.tbar i{display:block;height:100%;border-radius:99px}
.mist{border-inline-start:4px solid var(--red);padding:12px 14px;background:var(--surface2);
  border-radius:10px;margin-bottom:10px;font-size:.86rem}
.mist .q{font-weight:600;margin-bottom:6px}
.mist .you{color:var(--red)}
.mist .cor{color:var(--green)}
.mist .ex{margin-top:6px;color:var(--ink2);font-size:.8rem}
.weak{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--line);margin-bottom:8px;font-size:.86rem}
.weak .pct{font-weight:800;min-width:48px;text-align:center;border-radius:8px;padding:4px 0;font-size:.8rem}
.empty{text-align:center;padding:30px 10px;color:var(--ink2)}
.empty .ic{font-size:2.4rem;margin-bottom:8px}
.backrow{margin-bottom:12px}
.linkback{
  background:none;border:none;color:var(--orange);font-family:inherit;
  font-weight:700;font-size:.9rem;cursor:pointer;padding:4px 0;
}
.setrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:.92rem}
.setrow:last-child{border-bottom:none}
.studynav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.fchip{
  font-family:inherit;font-size:.78rem;border-radius:999px;padding:6px 13px;cursor:pointer;
  background:var(--surface);border:1.5px solid var(--line);color:var(--ink2);font-weight:600;
}
.fchip.on{background:var(--navy);border-color:var(--navy);color:var(--yellow)}
@media(max-width:480px){
  .modes{grid-template-columns:1fr 1fr}
  html{font-size:15px}
}
</style>
</head>
<body>
<div class="hazard"></div>
<header>
  <div class="logo">🏗️</div>
  <div class="titles">
    <h1>קבלן 131 · מאסטר בטיחות</h1>
    <div class="sub">200 שאלות תרגול · מבוסס חקיקה ישראלית</div>
  </div>
  <button class="hbtn" id="themeBtn" title="מצב כהה/בהיר">🌙</button>
  <button class="hbtn" id="homeBtn" title="מסך הבית">🏠</button>
</header>
<main id="app"></main>
<script>
const QUESTIONS = [
{t:"בעלי תפקידים וסמכויות",d:2,q:"באתר בנייה פועל קבלן ראשי אחד שהתקשר ישירות עם המזמין, ולצדו שלושה קבלני משנה. מיהו 'מבצע הבנייה' שעליו חלות חובות הבטיחות?",a:["הקבלן הראשי","המזמין","קבלן המשנה הגדול ביותר","מנהל העבודה"],c:0,e:"לפי תקנה 6, כאשר הטיל המזמין את ביצוע הבנייה על קבלן ראשי אחד – רואים את הקבלן הראשי כמבצע הבנייה. לקבלני משנה אין מעמד בקביעת מבצע הבנייה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 6"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מזמין התקשר במישרין עם שלושה קבלנים ראשיים שונים לביצוע פרויקט אחד, ואיש מהם לא קיבל על עצמו את האחריות הכוללת. מי ייחשב מבצע הבנייה?",a:["המזמין","הקבלן הראשי בעל ההיקף הכספי הגדול","הקבלן הראשי הראשון שהחל בעבודה","מפקח העבודה האזורי יקבע ביניהם"],c:0,e:"כאשר הטיל המזמין את הביצוע על יותר מקבלן ראשי אחד, רואים את המזמין כמבצע הבנייה, אלא אם אחד הקבלנים קיבל על עצמו את האחריות, מינה מנהל עבודה והודיע על כך למפקח העבודה האזורי.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 6"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"באתר עם מספר קבלנים ראשיים, קבלן אחד מעוניין לקבל על עצמו את מעמד 'מבצע הבנייה'. מה עליו לעשות כדי שהמעמד יעבור אליו כדין?",a:["לקבל על עצמו את האחריות, למנות מנהל עבודה ולהודיע על כך למפקח העבודה האזורי","לחתום על הסכם פנימי עם שאר הקבלנים בלבד","לקבל אישור בכתב ממהנדס העירייה","להירשם כקבלן ראשי בפנקס הקבלנים בסיווג גבוה יותר"],c:0,e:"תקנה 6 קובעת כי במקרה של כמה קבלנים ראשיים, קבלן שקיבל על עצמו את האחריות, מינה מנהל עבודה והודיע למפקח העבודה האזורי – הוא ייחשב מבצע הבנייה במקום המזמין.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 6"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"מי חייב למנות מנהל עבודה באתר בנייה?",a:["מבצע הבנייה","המזמין בכל מקרה","הקבלן בעל הסיווג הגבוה ביותר","ממונה הבטיחות של החברה"],c:0,e:"תקנה 2 מטילה על מבצע הבנייה את החובה למנות מנהל עבודה לכל אתר שבו מתבצעת עבודת בנייה או בנייה הנדסית.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 2"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מהנדס אזרחי מבקש להתמנות מנהל עבודה באתר בנייה. מהו הניסיון המעשי המזערי הנדרש ממנו בביצוע עבודות בנייה?",a:["שנה אחת","שנתיים","שלוש שנים","אין דרישת ניסיון למהנדס רשום"],c:0,e:"לפי תקנה 3, מהנדס אזרחי כשיר לשמש מנהל עבודה לאחר שנה אחת של ניסיון בביצוע; הנדסאי בניין נדרש לשנתיים ניסיון, ובוגר קורס מנהלי עבודה מוסמך – בהתאם לתנאי הקורס והבחינות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 3"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"הנדסאי בניין מבקש לשמש מנהל עבודה. מהו הניסיון המעשי הנדרש ממנו לפי התקנות?",a:["שנתיים בביצוע עבודות בנייה","שנה אחת בביצוע עבודות בנייה","שלוש שנים בפיקוח בלבד","אין דרישת ניסיון להנדסאי רשום"],c:0,e:"תקנה 3 מבחינה בין מהנדס אזרחי (שנה ניסיון) להנדסאי בניין (שנתיים ניסיון) כתנאי כשירות לשמש מנהל עבודה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 3"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"האם מותר לאדם לשמש מנהל עבודה בשני אתרי בנייה במקביל?",a:["רק באישור מפקח העבודה האזורי","כן, ללא הגבלה אם האתרים קטנים","רק באישור מבצע הבנייה בשני האתרים","לעולם לא, בשום תנאי"],c:0,e:"התקנות אוסרות על אדם לשמש מנהל עבודה ביותר מאתר אחד בעת ובעונה אחת, אלא אם קיבל לכך אישור ממפקח העבודה האזורי.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 5"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מפקח העבודה האזורי סבור שמנהל העבודה שמונה אינו מתאים בשל רקע מקצועי שאינו הולם את מורכבות האתר. מה בסמכותו לעשות?",a:["להודיע בכתב ומנומק למבצע הבנייה כי אינו מקבל את המינוי ולדרוש מינוי אחר","לבטל את רישיון הקבלן של המבצע","להטיל קנס אישי על מנהל העבודה","למנות בעצמו מנהל עבודה חלופי על חשבון המבצע"],c:0,e:"תקנה 4 מסמיכה את מפקח העבודה האזורי לדחות מינוי מנהל עבודה בהודעה כתובה ומנומקת, אם סבר שהמתמנה אינו מסוגל למלא את התפקיד; על המבצע למנות אחר.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 4"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"נתגלעו חילוקי דעות בין מבצע הבנייה למפקח העבודה האזורי בשאלת קיום תנאי הכשירות במינוי מנהל עבודה. מי מכריע?",a:["מפקח העבודה הראשי","בית הדין האזורי לעבודה","רשם הקבלנים","שר העבודה"],c:0,e:"התקנות קובעות במפורש כי בחילוקי דעות בשאלת קיום הוראות הכשירות והמינוי – מכריע מפקח העבודה הראשי.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 4"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"מינוי מנהל עבודה באתר – האם הוא פוטר את מבצע הבנייה מאחריותו לקיום הוראות הבטיחות?",a:["לא; האחריות הכוללת נשארת על מבצע הבנייה גם לאחר המינוי","כן, האחריות עוברת במלואה למנהל העבודה","כן, אם המינוי אושר בידי מפקח העבודה האזורי","האחריות עוברת לממונה הבטיחות של החברה"],c:0,e:"המינוי אינו משחרר את מבצע הבנייה מחובותיו; התקנות מטילות עליו אחריות לוודא שמנהל העבודה ממלא את תפקידו, והאחריות הכוללת לבטיחות האתר נותרת בידיו.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנות 2 ו-9"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מנהל העבודה הפסיק לשמש בתפקידו באמצע הפרויקט. מה חובת מבצע הבנייה?",a:["להודיע מיד למפקח העבודה האזורי, למנות מנהל עבודה אחר ולרשום את פרטיו בפנקס הכללי","להודיע בתוך 30 יום ולהמשיך בעבודה כרגיל","להמתין לסיום השלב ההנדסי ואז למנות מחליף","לפנות לרשם הקבלנים לקבלת אישור להמשך עבודה"],c:0,e:"הפסיק מנהל העבודה לשמש בתפקידו – על המבצע להודיע מיד למפקח העבודה האזורי ולרשום בפנקס הכללי את שמו ומענו של מנהל העבודה החדש שמונה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 2"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"מהי החובה המרכזית המוטלת על מנהל העבודה לפי תקנות עבודות הבנייה?",a:["למלא אחר הוראות התקנות ולנקוט צעדים להבטחת קיומן באתר תוך פיקוח מתמיד","לנהל את לוחות הזמנים והתקציב של הפרויקט","לאשר את תוכניות הקונסטרוקציה","לייצג את המזמין מול הרשויות"],c:0,e:"תקנה 9 קובעת כי מנהל העבודה חייב למלא אחר הוראות התקנות ולנקוט אמצעים מתאימים כדי שהעובדים יקיימו אותן – תפקידו הוא פיקוח בטיחותי שוטף ומתמיד באתר.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 9"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מנהל עבודה נעדר מהאתר ליום עבודה בשל מחלה. מה הדין לגבי המשך ביצוע עבודות באתר?",a:["יש להבטיח מילוי מקום בידי אדם כשיר, שכן אסור לבצע עבודת בנייה ללא השגחת מנהל עבודה","העבודה יכולה להימשך כרגיל עד שלושה ימים","רק עבודות גמר מותרות ללא מנהל עבודה","העבודה מותרת אם ממונה הבטיחות נמצא באתר"],c:0,e:"עבודת בנייה מחייבת ניהול והשגחה של מנהל עבודה. בהיעדרו יש להעמיד ממלא מקום כשיר ולפעול לפי הנחיות מינהל הבטיחות בדבר מינוי זמני והודעה למפקח האזורי.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנות 2 ו-9; הנחיות מינהל הבטיחות והבריאות התעסוקתית"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"מי מוסמך להוציא 'צו בטיחות' המורה על הפסקת עבודה במקום שבו נשקפת סכנה לעובדים?",a:["מפקח עבודה אזורי","מנהל העבודה","ממונה הבטיחות","רשם הקבלנים"],c:0,e:"חוק ארגון הפיקוח על העבודה מסמיך מפקח עבודה אזורי להוציא צו בטיחות האוסר שימוש במכונה, בציוד או בתהליך, או מפסיק עבודה, כאשר נשקפת סכנה לשלום העובדים.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מהו ההבדל העקרוני בין 'צו שיפור' ל'צו בטיחות'?",a:["צו שיפור דורש תיקון ליקוי בתוך פרק זמן נקוב; צו בטיחות אוסר מיידית שימוש או מפסיק עבודה בשל סכנה","צו שיפור ניתן רק לקבלן רשום; צו בטיחות לכל מעסיק","צו שיפור מוצא בידי בית הדין לעבודה; צו בטיחות בידי המשטרה","אין הבדל – אלו שמות שונים לאותו צו"],c:0,e:"צו שיפור מורה למעסיק לתקן ליקוי בתוך תקופה הקבועה בצו, ואילו צו בטיחות הוא צעד חמור יותר שמופעל כשנשקפת סכנה, והוא אוסר שימוש או מפסיק את העבודה עד הסרת הסיכון.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מעסיק שקיבל צו שיפור ממפקח עבודה חולק על נחיצותו. בפני מי ניתן לערור על הצו?",a:["מפקח העבודה הראשי","בית המשפט המחוזי","רשם הקבלנים","ועדת הערר של משרד הבינוי והשיכון"],c:0,e:"על צו שיפור ניתן לערור בפני מפקח העבודה הראשי בתוך המועד הקבוע בחוק; על צו בטיחות הערעור הוא לבית הדין האזורי לעבודה.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"על צו בטיחות שהוצא לאתר בנייה ניתן לערער בפני:",a:["בית הדין האזורי לעבודה","מפקח העבודה הראשי בלבד","שר העבודה","הממונה על חוקי העבודה במשרד הכלכלה"],c:0,e:"ערעור על צו בטיחות מוגש לבית הדין האזורי לעבודה; הגשת הערעור אינה מעכבת כשלעצמה את ביצוע הצו אלא אם הורה בית הדין אחרת.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"אילו מהסמכויות הבאות נתונה למפקח עבודה מכוח חוק ארגון הפיקוח על העבודה?",a:["להיכנס בכל עת למקום עבודה, לעיין בפנקסים ובמסמכים ולחקור אנשים בנוגע לבטיחות","להטיל מאסר על מעסיק מפר","לשלול רישיון קבלן לצמיתות","לפסוק פיצויים לעובד שנפגע"],c:0,e:"החוק מקנה למפקח עבודה סמכויות כניסה למקום עבודה בכל עת סבירה, עיון בכל פנקס ומסמך שחובה לנהלו, נטילת דגימות וחקירת בני אדם – אך לא סמכויות ענישה שיפוטיות.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"קבלן ביצוע מעסיק באתרי הבנייה שלו 120 עובדים. מה חובתו לעניין ממונה על הבטיחות?",a:["חייב למנות ממונה בטיחות בעל אישור כשירות","פטור, כי באתרי בנייה די במנהל עבודה","חייב רק אם דרש זאת מפקח העבודה האזורי","חייב רק אם יש באתר עבודה בגובה"],c:0,e:"תקנות הממונים על הבטיחות מחייבות מבצע בנייה המעסיק 100 עובדים לפחות באתרי בנייה למנות ממונה על הבטיחות בעל אישור כשירות תקף.",s:"תקנות ארגון הפיקוח על העבודה (ממונים על הבטיחות), התשנ\"ו-1996"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מי מעניק 'אישור כשירות' לממונה על הבטיחות?",a:["מפקח העבודה הראשי","מפקח העבודה האזורי","רשם הקבלנים","המוסד לבטיחות ולגיהות"],c:0,e:"אישור הכשירות לממונה בטיחות ניתן בידי מפקח העבודה הראשי, והוא רשאי גם להתנותו, להגבילו או לבטלו בהתאם לתקנות.",s:"תקנות ארגון הפיקוח על העבודה (ממונים על הבטיחות), התשנ\"ו-1996"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"מה מעמדו של ממונה הבטיחות ביחס למעסיק?",a:["גורם מקצועי מייעץ – מטרתו לייעץ למעסיק בכל הנוגע לבטיחות ולקדם את התודעה; האחריות הביצועית נותרת על המעסיק","גורם ביצועי המחליף את מנהל העבודה","נציג המדינה באתר בעל סמכויות אכיפה","בורר מוסמך בסכסוכי עבודה"],c:0,e:"תפקיד הממונה על הבטיחות לייעץ למעסיק, לאתר מפגעים, לקדם הדרכה ותוכניות בטיחות – אך הוא אינו נושא בסמכויות אכיפה שלטוניות ואינו מחליף את מנהל העבודה או את אחריות המעסיק.",s:"תקנות ארגון הפיקוח על העבודה (ממונים על הבטיחות), התשנ\"ו-1996"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"איזו מהפעולות הבאות נמנית במפורש עם תפקידי הממונה על הבטיחות לפי התקנות?",a:["לוודא קיום שגרת בדיקות תקופתיות לציוד ולמתקנים ולעקוב אחר ביצוע הוראות מפקחי העבודה","לחתום על היתרי בנייה בשם המבצע","לאשר חשבונות קבלני משנה","לנהל את יומן העבודה ההנדסי של הפרויקט"],c:0,e:"בין תפקידי הממונה: איתור מפגעים, וידוא ביצוע בדיקות תקופתיות לציוד, וידוא הדרכות, הכנת תוכנית בטיחות ומעקב אחר יישום הוראות מפקחי העבודה.",s:"תקנות ארגון הפיקוח על העבודה (ממונים על הבטיחות), התשנ\"ו-1996, תקנה 10"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"באילו אתרי בנייה קמה חובה למנות 'עוזר בטיחות' למנהל העבודה?",a:["אתר שבו מוקם מבנה שגובהו 7 מטרים לפחות ושטחו 1,000 מ\"ר לפחות","כל אתר שבו מועסקים יותר מ-10 עובדים","אתר שבו פועל עגורן צריח בלבד","כל אתר בנייה הנדסית ללא תלות בהיקף"],c:0,e:"תיקון מס' 11 לחוק ארגון הפיקוח על העבודה (חוק עוזר בטיחות) מחייב מינוי עוזר בטיחות באתר בנייה שבו מוקם מבנה בגובה 7 מ' לפחות ובשטח 1,000 מ\"ר לפחות.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954, תיקון מס' 11 (התשע\"ט-2019)"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מה כולל תפקידו של עוזר הבטיחות באתר?",a:["לסייע למנהל העבודה במעקב אחר קיום הוראות בטיחות באמצעות רשימת תיוג ולדווח לו על הפרות","להחליף את מנהל העבודה בהיעדרו","להוציא צווי שיפור לקבלני משנה","לאשר את תוכנית ארגון האתר מול הרשות המקומית"],c:0,e:"עוזר הבטיחות פועל לצד מנהל העבודה: עורך בדיקות לפי רשימת תיוג שקבע מפקח העבודה הראשי, מתריע על הפרות בפני הגורם המפר ומדווח למנהל העבודה; אין לו סמכויות שלטוניות.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954, פרק עוזר בטיחות"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"עוזר בטיחות שזיהה הפרת הוראת בטיחות שטרם תוקנה – כיצד עליו לפעול?",a:["להתריע בפני המפר, לדווח למנהל העבודה ולתעד את ההפרה ברשימת התיוג","לעצור מיידית את כל העבודה באתר בצו","לדווח ישירות למשטרת ישראל","להמתין לביקורת הבאה של מפקח העבודה"],c:0,e:"סמכות עוזר הבטיחות היא התרעה, תיעוד ודיווח למנהל העבודה; הסמכות להפסיק עבודה מסוכנת נתונה לגורמים האחראים באתר ולמפקחי העבודה.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954, פרק עוזר בטיחות"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"במפעל או ארגון המעסיק 25 עובדים לפחות – מה החובה החלה עליו לפי חוק ארגון הפיקוח?",a:["להקים ועדת בטיחות המורכבת מנציגי עובדים ונציגי מעסיק","למנות שני ממוני בטיחות","להעסיק רופא תעסוקתי במשרה מלאה","למנות עוזר בטיחות לכל מחלקה"],c:0,e:"החוק קובע חובת הקמת ועדת בטיחות במקום עבודה שבו מועסקים 25 עובדים לפחות, בהרכב שווה של נציגי עובדים ונציגי המעסיק.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"נאמן בטיחות שמצא ליקוי בטיחותי במקום העבודה – מה סמכותו לפי החוק?",a:["להודיע בכתב למעסיק על הליקוי ולמסור העתק למפקח העבודה האזורי","להפסיק את העבודה עד לתיקון הליקוי","להטיל קנס מנהלי על המעסיק","לפטר עובד שאינו מציית להוראות בטיחות"],c:0,e:"נאמן הבטיחות מוסמך להודיע בכתב למעסיק על ליקויים, כשהעתק נמסר למפקח העבודה האזורי, ולעיין בפנקסים ובמסמכים הנוגעים לבטיחות – אך אין לו סמכויות אכיפה.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מעסיק שקיבל מנאמן בטיחות הודעה כדין על ליקוי ולא תיקן אותו – מה חובתו?",a:["למסור לנאמן בתוך זמן סביר הודעה מנומקת בכתב ולשלוח העתק בדואר רשום למפקח העבודה האזורי","להעביר את הטיפול לוועד העובדים","אין עליו כל חובה – ההודעה היא בגדר המלצה","לזמן אסיפת עובדים כללית"],c:0,e:"החוק מחייב מעסיק לנקוט אמצעים לתיקון ליקויים שדווחו כדין, ואם לא עשה כן – למסור לנאמן הבטיחות הודעה מנומקת בכתב ולשלוח העתק במכתב רשום למפקח העבודה האזורי.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"מי עומד בראש מערך הפיקוח על העבודה במדינת ישראל?",a:["מפקח העבודה הראשי","מפקח העבודה האזורי הוותיק","רשם הקבלנים","מנכ\"ל המוסד לבטיחות ולגיהות"],c:0,e:"בראש מערך הפיקוח עומד מפקח העבודה הראשי, המתמנה לפי חוק ארגון הפיקוח על העבודה; הוא מוסמך לפרסם הוראות והנחיות מקצועיות המחייבות את ציבור המעסיקים.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"איזו מהסמכויות הבאות שמורה למפקח העבודה הראשי דווקא, ולא למפקח האזורי?",a:["הכרעה בחילוקי דעות בין מבצע בנייה למפקח אזורי בעניין מינוי מנהל עבודה","קבלת הודעה על פעולת בנייה","מתן היתר לניהול שני אתרים בידי מנהל עבודה אחד","קבלת הודעה על תאונת עבודה"],c:0,e:"קבלת הודעות על פעולת בנייה, על מינויים ועל תאונות וכן מתן היתר לניהול יותר מאתר אחד – נתונים למפקח האזורי; ההכרעה במחלוקות מינוי מנהל עבודה שמורה למפקח הראשי.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנות 4-5; חוק ארגון הפיקוח על העבודה"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"אתר בנייה שבו צפויות העבודות להימשך יותר משישה חודשים – מה נדרש מהמעסיק לפי תקנות התוכנית לניהול בטיחות?",a:["להכין ולקיים תוכנית לניהול בטיחות מבוססת ניהול סיכונים ולעדכנה לפחות אחת לשנה","להגיש תוכנית בטיחות לאישור הרשות המקומית","למנות שני מנהלי עבודה במשמרות","לערוך ביקורת חיצונית של מכון התקנים"],c:0,e:"תקנות התוכנית לניהול בטיחות חלות גם על אתרי בנייה שמשך העבודה בהם עולה על שישה חודשים, ומחייבות תוכנית מבוססת הערכת סיכונים המתעדכנת לפחות אחת לשנה.",s:"תקנות ארגון הפיקוח על העבודה (תוכנית לניהול בטיחות), התשע\"ג-2013"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"באיזו תדירות מזערית חייב מעסיק לקיים הדרכת בטיחות לעובדיו ולחזור עליה?",a:["לפחות אחת לשנה, ובנוסף בכל שינוי בתפקיד או בסיכונים","אחת לשנתיים","אחת לחמש שנים","רק בקבלת העובד לעבודה"],c:0,e:"תקנות מסירת מידע והדרכת עובדים מחייבות הדרכה בעת קבלה לעבודה ועדכונה לפחות אחת לשנה, וכן בעת שינוי בתהליך, בציוד או בסיכונים במקום העבודה.",s:"תקנות ארגון הפיקוח על העבודה (מסירת מידע והדרכת עובדים), התשנ\"ט-1999"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מעסיק באתר בנייה הדריך את עובדיו בעל-פה בלבד ולא תיעד זאת. האם יצא ידי חובתו?",a:["לא – יש לנהל רישום של ההדרכות ולמסור לעובד תמצית מידע בכתב על הסיכונים בעבודתו","כן – החוק אינו דורש תיעוד","כן – אם ההדרכה ניתנה בידי ממונה בטיחות","לא – הדרכה תקפה רק אם ניתנה במוסד הדרכה חיצוני"],c:0,e:"התקנות מחייבות גם רישום ותיעוד של ההדרכות וגם מסירת תמצית בכתב לעובד בדבר הסיכונים והאמצעים; הדרכה לא מתועדת אינה עומדת בדרישות.",s:"תקנות ארגון הפיקוח על העבודה (מסירת מידע והדרכת עובדים), התשנ\"ט-1999"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מי רשאי לשמש 'בודק מוסמך' לבדיקת מכונות הרמה ומתקני לחץ?",a:["מי שקיבל הסמכה לכך ממפקח העבודה הראשי","כל מהנדס מכונות רשום","ממונה בטיחות בעל ותק של 5 שנים","טכנאי מטעם יצרן הציוד בלבד"],c:0,e:"בודק מוסמך הוא בעל מקצוע שהוסמך בידי מפקח העבודה הראשי לערוך בדיקות תקופתיות ולתת תסקירים למכונות הרמה, מתקני לחץ וציוד נוסף לפי פקודת הבטיחות בעבודה.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"מי אחראי לספק לעובדים באתר ציוד מגן אישי מתאים ותקין, ללא תשלום?",a:["המעסיק (ובאתר בנייה – מבצע הבנייה כלפי המועסקים בו)","העובד עצמו, על חשבונו","הרשות המקומית","ועדת הבטיחות"],c:0,e:"תקנות ציוד מגן אישי מטילות על המעסיק את החובה לספק ציוד מגן מתאים ותקין ללא תמורה, לוודא את השימוש בו ולהדריך את העובדים; באתר בנייה החובה מיושמת באמצעות מבצע הבנייה ומנהל העבודה.",s:"תקנות הבטיחות בעבודה (ציוד מגן אישי), התשנ\"ז-1997"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"עובד שקיבל ציוד מגן אישי – מה חובתו לפי התקנות?",a:["להשתמש בציוד בהתאם לייעודו, לשמור על תקינותו ולדווח על פגם או אובדן","להשתמש בו רק בנוכחות מפקח","רשאי לוותר על השימוש בהצהרה חתומה","להחזירו בסוף כל יום למחסן נעול בלבד"],c:0,e:"חובת העובד להשתמש בציוד המגן שסופק לו בהתאם לייעודו ולהודיע על כל פגם; סירוב להשתמש בציוד מגן הוא הפרת חובה חוקית.",s:"תקנות הבטיחות בעבודה (ציוד מגן אישי), התשנ\"ז-1997"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מי מוסמך להפעיל עגורן צריח באתר בנייה?",a:["עגורנאי בעל הסמכה תקפה לסוג העגורן לפי תקנות העגורנאים","כל עובד שעבר הדרכת עבודה בגובה","מנהל העבודה או מי מטעמו","טכנאי מטעם משכיר העגורן, גם ללא הסמכה"],c:0,e:"תקנות העגורנאים קובעות כי הפעלת עגורן מותרת רק לבעל הסמכה מתאימה לסוג העגורן; הפעלת עגורן צריח מחייבת תעודת עגורנאי מהסוג הנדרש.",s:"תקנות הבטיחות בעבודה (עגורנאים, מפעילי מכונות הרמה אחרות ואתתים), התשנ\"ג-1992"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מתי חובה להעמיד 'אתת' מוסמך לצד עגורן באתר?",a:["כאשר אין למפעיל העגורן קשר עין מלא ורציף עם המטען לאורך כל מסלולו","בכל הפעלה של עגורן, ללא קשר לתנאים","רק בעבודות לילה","רק כשמרימים מטען מעל 5 טונות"],c:0,e:"כשאין קשר עין בין העגורנאי למטען בכל שלבי ההרמה וההובלה, חובה להפעיל אתת מוסמך המכוון את העגורנאי באיתות קבוע ומוסכם.",s:"תקנות הבטיחות בעבודה (עגורנאים, מפעילי מכונות הרמה אחרות ואתתים), התשנ\"ג-1992"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מי רשאי להתקין, לבדוק או לתקן מיתקן חשמל ארעי באתר בנייה?",a:["חשמלאי בעל רישיון מתאים לפי חוק החשמל","מנהל העבודה לאחר הדרכה","כל עובד מנוסה בהשגחת מנהל העבודה","טכנאי מיזוג אוויר מוסמך"],c:0,e:"עבודות חשמל, לרבות במיתקן ארעי באתר, מותרות רק לבעל רישיון חשמלאי מתאים לפי חוק החשמל; עבודת חשמל בידי מי שאינו מורשה היא עבירה.",s:"חוק החשמל, התשי\"ד-1954; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"מי מוסמך להדריך עובדים לעבודה בגובה ולחתום על אישורי הדרכה?",a:["מדריך עבודה בגובה הרשום במרשם שמנהל מפקח העבודה הראשי","ממונה בטיחות, מתוקף תפקידו","מנהל העבודה באתר","כל עובד ותיק בעל ניסיון של 5 שנים"],c:0,e:"רק מדריך עבודה בגובה מוסמך, הרשום במרשם המדריכים, רשאי להדריך ולחתום על אישור הדרכה; ממונה בטיחות או מנהל עבודה אינם מוסמכים לכך מתוקף תפקידם בלבד.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"לאילו סוגי עבודות בגובה נדרש מינוי 'מנהל מקצועי' לפי תקנות העבודה בגובה?",a:["עבודות גלישה וטיפוס תרנים","כל עבודה על סולם מעל 2 מטרים","עבודה על פיגום זקפים","עבודה מתוך סל הרמה"],c:0,e:"פרקי הגלישה וטיפוס התרנים בתקנות מחייבים מינוי מנהל מקצועי האחראי לתכנון השיטה, לציוד ולפיקוח; לא מונה מנהל מקצועי – חובותיו מוטלות על המבצע.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007, פרקים ו'-ז'"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מבצע לא מינה מנהל מקצועי לעבודת גלישה כנדרש. על מי מוטלות חובות המנהל המקצועי במצב זה?",a:["על המבצע עצמו, מבלי שהדבר גורע מאחריותו על אי-המינוי","על מנהל העבודה באתר","על העובד הגולש הוותיק ביותר","החובות בטלות עד למינוי"],c:0,e:"התקנות קובעות במפורש: לא מונה מנהל מקצועי – יראו את כל חובותיו כמוטלות על המבצע, ואין בכך כדי לפטור אותו מאחריות על עצם אי-המינוי.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"מהי 'בנייה הנדסית' לפי פקודת הבטיחות בעבודה?",a:["בניית גשר, מנהרה, נמל, מאגר, קו צינורות, ביב וכיוצא באלה – עבודות תשתית שאינן הקמת בניין","כל בנייה המבוצעת בידי מהנדס","בנייה בשטח של מעל 1,000 מ\"ר","בנייה לגובה העולה על 7 מטרים"],c:0,e:"הפקודה מגדירה בנייה הנדסית כעבודות כגון גשר, מנהרה, נתיב שיט, מכון מים, מאגר, קו צינורות, ביב ועוד – להבדיל מהקמת בניין; שתיהן כפופות לחובות הבטיחות.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"קבלן משנה מעסיק עובדים באתר שבו קבלן ראשי הוא מבצע הבנייה. מי אחראי להדרכת עובדי קבלן המשנה על סיכוני האתר?",a:["חובת ההדרכה חלה על המעסיק הישיר, ומבצע הבנייה אחראי לקיום סדרי בטיחות כלל-אתריים","איש – עובדי קבלן משנה מודרכים רק על ידי איגוד מקצועי","רק מפקח העבודה האזורי","רק יצרן הציוד שבו הם משתמשים"],c:0,e:"חובת ההדרכה לפי תקנות מסירת מידע חלה על המעסיק; במקביל, מבצע הבנייה אחראי לבטיחות הכוללת באתר וכלל העובדים בו, כך שהאחריות משולבת ואינה ניתנת להתנערות.",s:"תקנות ארגון הפיקוח על העבודה (מסירת מידע והדרכת עובדים), התשנ\"ט-1999; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מנהל עבודה הורה לעובד לבצע פעולה מסוכנת בניגוד לתקנות, והעובד נפגע. האם העובדה שמנהל העבודה הוא שהורה פוטרת את מבצע הבנייה מאחריות פלילית?",a:["לא בהכרח – מבצע הבנייה נושא באחריות לקיום התקנות באתר, אלא אם הוכיח שנקט אמצעים סבירים למניעת ההפרה","כן – האחריות הפלילית היא אישית של מנהל העבודה בלבד","כן – אם למבצע יש ביטוח חבות מעבידים","לא רלוונטי – אחריות פלילית חלה רק על העובד שביצע"],c:0,e:"דיני הבטיחות מטילים אחריות מקבילה: גם על מנהל העבודה שביצע/הורה וגם על מבצע הבנייה כנושא באחריות-על, אשר יכול להתגונן רק בהוכחת נקיטת כל האמצעים הסבירים.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"מי קובע את רשימת התיוג (צ'ק-ליסט) שלפיה פועל עוזר הבטיחות באתר?",a:["מפקח העבודה הראשי","מבצע הבנייה","ועדת הבטיחות של האתר","רשם הקבלנים"],c:0,e:"רשימת התיוג של עוזר הבטיחות נקבעת ומפורסמת בידי מפקח העבודה הראשי, והיא כוללת את הוראות הבטיחות המרכזיות שיש לוודא את קיומן באתר.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954, פרק עוזר בטיחות"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מהם תנאי הכשירות המרכזיים של עוזר בטיחות?",a:["בגיר שעבר בהצלחה קורס עוזרי בטיחות מאושר ואינו בעל תפקיד אחר הפוגע במילוי תפקידו באתר","מהנדס אזרחי בלבד","ממונה בטיחות בעל ותק של 3 שנים","כל עובד שמנהל העבודה בחר בו"],c:0,e:"עוזר בטיחות נדרש להכשרה ייעודית בקורס מאושר ולזמינות בפועל באתר; החוק מגביל עיסוקים מקבילים העלולים לפגוע במילוי התפקיד.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954, פרק עוזר בטיחות"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"חובת חבישת קובע מגן (קסדה) באתר בנייה חלה על:",a:["כל אדם הנמצא באתר שבו קיימת סכנת פגיעה בראש, לרבות מבקרים","עובדי שלד בלבד","עובדים בגובה בלבד","עובדים מתחת לעגורן בלבד"],c:0,e:"חובת ההגנה על הראש חלה על כל הנמצאים בתחומי אתר שבו סכנת פגיעה מנפילת חפצים או חבטה – עובדים, מנהלים ומבקרים; האחריות לאספקה ולאכיפה על מבצע הבנייה ומנהל העבודה.",s:"תקנות הבטיחות בעבודה (ציוד מגן אישי), התשנ\"ז-1997; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מי אחראי לכך שבאתר הבנייה יסופק לפיגומים חומר מתאים, באיכות טובה, ללא פגם ובכמות מספקת?",a:["מבצע הבנייה","ספק הפיגומים בלבד","העובדים המקימים","הרשות המקומית"],c:0,e:"התקנות מטילות על מבצע הבנייה לספק חומר תקין ומתאים להתקנת פיגומים; מנהל העבודה חייב לבדוק את החומר לפני השימוש בו.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"'מתכנן הקמת פיגומים' לפי תקנות עבודות הבנייה הוא:",a:["מי שרשאי לתכנן מבנה מהסוג שבו משתמשים בפיגום, לפי תקנות המהנדסים והאדריכלים (רישוי וייחוד פעולות)","כל הנדסאי בניין בעל שנתיים ניסיון","בונה פיגומים מקצועי בעל ותק","נציג יצרן הפיגום"],c:0,e:"ההגדרה בתקנות מפנה לתקנות המהנדסים והאדריכלים (רישוי וייחוד פעולות), התשכ\"ז-1967 – כלומר נדרש מהנדס המורשה לתכנן מבנה מהסוג הרלוונטי.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 1 (הגדרות)"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"עובד באתר מסרב להשתמש ברתמת בטיחות שסופקה לו לעבודה בגובה. כיצד על מנהל העבודה לפעול?",a:["לא להתיר לו לעבוד בגובה עד שישתמש בציוד כנדרש, ולתעד את האירוע","לאפשר לו לעבוד באחריותו האישית כנגד חתימה","להעבירו לעבודת לילה","לדווח לרשם הקבלנים"],c:0,e:"אסור להעסיק עובד בגובה ללא אבטחה כנדרש; מנהל העבודה חייב לאכוף את השימוש בציוד המגן ואינו רשאי 'להעביר את האחריות' לעובד בחתימה.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007; תקנות ציוד מגן אישי, התשנ\"ז-1997"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מהי 'תעודת הסמכה' הנדרשת ממפעיל מכונת הרמה ניידת (כגון עגורן נייד) באתר?",a:["הסמכה מתאימה לסוג מכונת ההרמה לפי תקנות העגורנאים ומפעילי מכונות הרמה","רישיון נהיגה מדרגה C בלבד","אישור עבודה בגובה בלבד","תעודת מלגזן"],c:0,e:"תקנות העגורנאים קובעות סוגי הסמכה נפרדים לפי סוג מכונת ההרמה; רישיון נהיגה או אישור גובה אינם תחליף להסמכה הייעודית.",s:"תקנות הבטיחות בעבודה (עגורנאים, מפעילי מכונות הרמה אחרות ואתתים), התשנ\"ג-1992"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"באתר בנייה התרחש ליקוי שתיקונו באחריות מנהל העבודה. איזה גורם באתר מוסמך לסייע לו במעקב אחר התיקון מתוקף הגדרת תפקידו בחוק?",a:["עוזר הבטיחות","המודד המוסמך","מנהל הפרויקט מטעם המזמין","חשב הכמויות"],c:0,e:"בין תפקידי עוזר הבטיחות בחוק: סיוע למנהל העבודה במעקב אחר תיקון הפרות של הוראות בטיחות שהחובה לקיימן מוטלת על מנהל העבודה.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954, פרק עוזר בטיחות"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"סמכותו של מפקח עבודה לחקור אדם בקשר לתאונת עבודה כוללת:",a:["גביית עדות מכל אדם הקשור לעניין ודרישת הצגת מסמכים ופנקסים","מעצר חשודים עד 24 שעות","חיפוש בבית מגוריו של העובד ללא צו","פסילת רישיון נהיגה של המעורבים"],c:0,e:"מפקח עבודה מוסמך לחקור בני אדם, לדרוש מסמכים ופנקסים וליטול דגימות לצורך בירור נסיבות תאונה או הפרה – אך סמכויות מעצר וחיפוש פולשני שמורות למשטרה.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מנהל עבודה מונה כדין אך בפועל אינו נוכח באתר ואינו מקיים פיקוח. מה המשמעות המשפטית?",a:["גם מנהל העבודה וגם מבצע הבנייה חשופים לאחריות בגין אי-קיום חובת ההשגחה והפיקוח המתמיד","אין הפרה כל עוד ההודעה על המינוי נשלחה כדין","ההפרה היא של העובדים בלבד","האחריות עוברת לרשות המקומית"],c:0,e:"המינוי הפורמלי אינו מספיק: התקנות דורשות פיקוח והשגחה בפועל. היעדרות שיטתית מהאתר מהווה הפרה שמטילה אחריות הן על מנהל העבודה הן על המבצע.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנות 2 ו-9"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מי מוסמך לפרסם הוראות מקצועיות מחייבות בענייני בטיחות (כגון נהלים לעבודת מנהלי עבודה) לציבור המעסיקים?",a:["מפקח העבודה הראשי","המוסד לבטיחות ולגיהות","התאחדות הקבלנים","רשם הקבלנים"],c:0,e:"מפקח העבודה הראשי מוסמך לפרסם הוראות והנחיות מקצועיות מכוח חוק ארגון הפיקוח; המוסד לבטיחות ולגיהות הוא גוף הסברה והדרכה ללא סמכות אכיפה.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"מה תפקידו של המוסד לבטיחות ולגיהות?",a:["הסברה, הדרכה, ייעוץ וקידום הבטיחות והגיהות – ללא סמכויות אכיפה","אכיפת תקנות הבטיחות והוצאת צווים","רישום קבלנים וביטול רישיונות","חקירה פלילית של תאונות קטלניות"],c:0,e:"המוסד לבטיחות ולגיהות הוקם בחוק ארגון הפיקוח כגוף לקידום מודעות, הדרכה וייעוץ; סמכויות האכיפה נתונות למינהל הבטיחות ולמפקחי העבודה.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"באתר בנייה מועסקים עובדים של כמה מעסיקים שונים. על מי מטילות תקנות עבודות הבנייה את החובה לוודא ביצוע בדיקות תקופתיות לפיגומים שבשימוש כולם?",a:["על מנהל העבודה שמינה מבצע הבנייה","על כל מעסיק בנפרד לגבי עובדיו","על קבלן המשנה שהקים את הפיגום","על נציג ועדת הבטיחות"],c:0,e:"בדיקות הפיגום (לאחר הקמה, אחת ל-7 ימים ואחרי גשם או הפסקה) מוטלות בתקנות על מנהל העבודה של האתר, כחלק מאחריות מבצע הבנייה לבטיחות כלל המועסקים.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מנהל עבודה ביקש ממפקח העבודה האזורי היתר לנהל שני אתרים סמוכים. אילו שיקולים רלוונטיים להחלטת המפקח?",a:["היקף העבודות, מורכבותן, המרחק בין האתרים ויכולת קיום פיקוח ממשי בשניהם","גובה השכר של מנהל העבודה","ותק החברה הקבלנית בפנקס הקבלנים","עמדת ועד העובדים בלבד"],c:0,e:"ההיתר לניהול יותר מאתר אחד הוא חריג, והמפקח שוקל אם ניתן לקיים בפועל השגחה ופיקוח נאותים בשני האתרים בהתחשב בהיקפם, מורכבותם וסמיכותם.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 5"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"'מזמין' שביצע עבודת בנייה באמצעות עובדיו שלו, ללא קבלן ראשי – מי מבצע הבנייה?",a:["המזמין עצמו","אין מבצע בנייה במצב כזה","העובד הבכיר באתר","הרשות המקומית"],c:0,e:"כאשר המזמין מבצע את העבודה בעצמו ולא הטיל אותה על קבלן ראשי, הוא עצמו מבצע הבנייה על כל החובות הנובעות מכך, לרבות מינוי מנהל עבודה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנות 1 ו-6"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"ממונה בטיחות מועסק בחברה קבלנית. האם הוא רשאי לשמש במקביל מנהל עבודה באתר של החברה?",a:["ככלל לא רצוי ועלול לפגוע בכשירותו – נדרש שהממונה יוכל למלא את תפקידו הייעוצי-בקרתי באופן בלתי תלוי ובהיקף שנקבע","כן, ואף מומלץ לחיסכון בכוח אדם","כן, אם אישר זאת רשם הקבלנים","לא, אלא אם הוא גם הנדסאי"],c:0,e:"תקנות הממונים דורשות שהממונה יוקדש לתפקידו בהיקף הנדרש ושלא יוטלו עליו תפקידים הפוגעים במילוי תפקידו; שילוב תפקיד ביצועי-פיקודי כמנהל עבודה פוגע בעצמאות הבקרה.",s:"תקנות ארגון הפיקוח על העבודה (ממונים על הבטיחות), התשנ\"ו-1996"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מהי אחת מחובות מבצע הבנייה כלפי קבלני המשנה בנושא פיגומים שהוא מספק להם?",a:["לצרף לפיגומים את הוראות היצרן בכתב בעברית (ואם יוצרו בחו\"ל – גם באנגלית)","לגבות מהם דמי שימוש מוסדרים","לבטח את הפיגום בביטוח צד ג' בלבד","לסמן את הפיגום בצבע זוהר"],c:0,e:"התקנות מחייבות את מבצע הבנייה לצרף לפיגומים שהוא מספק את הוראות היצרן בכתב בשפה העברית, ולפיגום מיובא – גם באנגלית; מנהל העבודה מצמיד אותן לפנקס הכללי.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"איזה גורם מוסמך לבטל או להתלות אישור כשירות של ממונה בטיחות שאינו ממלא תפקידו כראוי?",a:["מפקח העבודה הראשי","מפקח העבודה האזורי","המעסיק","המוסד לבטיחות ולגיהות"],c:0,e:"מפקח העבודה הראשי, שהעניק את אישור הכשירות, מוסמך גם להתלותו או לבטלו לאחר מתן הזדמנות לטעון, אם הממונה אינו ממלא תפקידו כנדרש.",s:"תקנות ארגון הפיקוח על העבודה (ממונים על הבטיחות), התשנ\"ו-1996"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"איזו מהאמירות הבאות לגבי חלוקת האחריות באתר נכונה?",a:["מבצע הבנייה אחראי לבטיחות הכוללת, מנהל העבודה לפיקוח השוטף, והעובד חייב לציית להוראות ולהשתמש בציוד המגן – האחריות מצטברת ואינה חלופית","אחריות הבטיחות חלה תמיד על גורם אחד בלבד בכל רגע נתון","עובד שהודרך פוטר את המעסיק מכל אחריות","ממונה בטיחות נושא באחריות הביצועית במקום מנהל העבודה"],c:0,e:"דיני הבטיחות בישראל בנויים כמערכת אחריות מצטברת: חובות המבצע, מנהל העבודה והעובד מתקיימות במקביל, וקיומה של חובה אחת אינו מבטל את האחרות.",s:"פקודת הבטיחות בעבודה; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מפקח עבודה הגיע לאתר ומצא הפרות. הוא דרש לעיין בפנקס הכללי ומנהל העבודה סירב. מה דין הסירוב?",a:["עבירה – הפרעה למפקח במילוי תפקידו ואי-הצגת פנקס שחובה לנהלו","זכותו של מנהל העבודה אם אין צו בית משפט","מותר אם המבצע הורה כך בכתב","מותר בשעות שאינן שעות העבודה"],c:0,e:"החוק מסמיך מפקח לעיין בכל פנקס שחובה לנהלו; הפרעה למפקח או מניעת עיון היא עבירה לפי חוק ארגון הפיקוח על העבודה.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"הודעת מינוי מנהל עבודה צריכה להיות חתומה בידי:",a:["מבצע הבנייה ומנהל העבודה המתמנה גם יחד","מבצע הבנייה בלבד","מנהל העבודה בלבד","עורך דין החברה"],c:0,e:"טופס ההודעה על מינוי מנהל עבודה נחתם בידי מבצע הבנייה ובידי מי שנתמנה מנהל עבודה, ונשלח בדואר רשום למשרד מפקח העבודה האזורי שבאזורו מתבצעת העבודה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 2"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"'קבלן ראשי' לעניין תקנות עבודות הבנייה הוא:",a:["מי שהתקשר בחוזה עם המזמין לבצע את הבנייה, כולה או חלקה העיקרי","כל קבלן רשום בפנקס הקבלנים","הקבלן בעל הסיווג הגבוה באתר","מי שמעסיק את מספר העובדים הגדול ביותר"],c:0,e:"המבחן הוא חוזי: קבלן ראשי הוא המתקשר ישירות עם המזמין לביצוע העבודה; קבלני משנה מתקשרים עם הקבלן הראשי ואינם 'ראשיים' לעניין קביעת מבצע הבנייה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנות 1 ו-6"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"עובד הבחין בסכנה מיידית לחייו במהלך עבודה. מה זכותו וחובתו לפי עקרונות דיני הבטיחות?",a:["להפסיק את העבודה המסוכנת, להתרחק ולדווח מיד לממונה עליו","להמשיך לעבוד עד קבלת הוראה אחרת","לעזוב את האתר לצמיתות ללא דיווח","לתקן את המפגע בעצמו גם ללא הכשרה"],c:0,e:"עובד אינו חייב לבצע עבודה שכרוכה בה סכנה מיידית לחייו; עליו להתריע ולדווח לממונה כדי שהסיכון יטופל בידי הגורם המוסמך – ואסור להעסיקו בניגוד לכך.",s:"פקודת הבטיחות בעבודה; חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"בעלי תפקידים וסמכויות",d:2,q:"על מי חלה החובה לוודא שעובד לא יועסק בעבודה בגובה כשהוא תחת השפעת אלכוהול או סמים?",a:["על המבצע (המעסיק) – אסור לו להעסיק עובד במצב העלול לסכן אותו או אחרים","על העובד בלבד","על קופת החולים","על המשטרה בלבד"],c:0,e:"תקנות העבודה בגובה אוסרות על המבצע להעסיק בגובה עובד הנמצא במצב מסכן, לרבות השפעת סמים או משקאות משכרים או ליקוי גופני/נפשי, אם ידע או יכול היה לדעת על כך.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007, תקנה 5"},
{t:"פנקס כללי, הודעות וצווים",d:2,q:"מתי חייב מבצע בנייה למסור הודעה על פעולת בנייה למפקח העבודה האזורי?",a:["כאשר משך פעולת הבנייה צפוי לעלות על שישה שבועות","בכל עבודת בנייה, גם של יום אחד","רק כשהיקף החוזה עולה על מיליון ש\"ח","רק כשמועסקים מעל 50 עובדים"],c:0,e:"סעיף 192 לפקודת הבטיחות בעבודה מחייב הודעה למפקח העבודה האזורי על פעולת בנייה שמשך ביצועה צפוי לעלות על שישה שבועות. חובת מינוי מנהל עבודה, לעומת זאת, חלה על כל אתר.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970, סעיף 192"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"עבודת שיפוץ צפויה להימשך ארבעה שבועות בלבד. אילו מהחובות הבאות עדיין חלה על מבצע הבנייה?",a:["מינוי מנהל עבודה והודעה על המינוי – אך לא הודעה על פעולת הבנייה לפי סעיף 192","אף חובה אינה חלה בעבודה קצרה","הודעה על פעולת בנייה בלבד, ללא מינוי","קבלת היתר מיוחד ממפקח העבודה הראשי"],c:0,e:"הודעת פעולת הבנייה נדרשת רק מעל 6 שבועות, אך חובת מינוי מנהל עבודה וההודעה על מינויו חלה על כל עבודת בנייה ובנייה הנדסית, ללא תלות במשך הביצוע.",s:"פקודת הבטיחות בעבודה, סעיף 192; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 2"},
{t:"פנקס כללי, הודעות וצווים",d:2,q:"כיצד נמסרת ההודעה על מינוי מנהל עבודה למפקח העבודה האזורי?",a:["על גבי טופס ייעודי, חתום בידי המבצע והמתמנה, ונשלח למשרד המפקח האזורי שבאזורו מתבצעת העבודה","בשיחת טלפון למוקד מינהל הבטיחות","בפרסום בעיתון יומי","באמצעות רשם הקבלנים בלבד"],c:0,e:"ההודעה נמסרת בטופס שקבע מפקח העבודה האזורי, חתומה בידי מבצע הבנייה ובידי מנהל העבודה המתמנה, ונשלחת למשרד המפקח האזורי הרלוונטי (בדואר רשום, וכיום גם בדרכים מקוונות שאישר המינהל).",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 2"},
{t:"פנקס כללי, הודעות וצווים",d:2,q:"היכן חייב להימצא הפנקס הכללי של אתר הבנייה?",a:["באתר הבנייה עצמו, זמין לעיון מפקח עבודה בכל עת","במשרד הראשי של החברה הקבלנית","אצל רואה החשבון של המבצע","במשרדי הרשות המקומית"],c:0,e:"הפנקס הכללי מנוהל ומוחזק באתר הבנייה, והוא מהמסמכים שמפקח עבודה רשאי לדרוש לעיין בהם בכל ביקורת; אי-ניהולו או אי-הצגתו הם עבירה.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"אילו מהרישומים הבאים חייבים להופיע בפנקס הכללי של האתר?",a:["שמו ומענו של מנהל העבודה, תוצאות בדיקות הפיגומים ופרטי תאונות שאירעו באתר","שכר העובדים ושעות נוכחותם בלבד","חשבונות קבלני המשנה","פרוטוקול ישיבות התכנון עם האדריכל"],c:0,e:"בפנקס הכללי נרשמים בין היתר: פרטי מנהל העבודה ומינויים, בדיקות פיגומים ותקינות ציוד, תאונות עבודה והדרכות – זהו מסמך הבטיחות המרכזי של האתר.",s:"פקודת הבטיחות בעבודה; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"מנהל העבודה קיבל מיצרן הפיגום הוראות הרכבה ושימוש בכתב. מה עליו לעשות בהן לפי התקנות?",a:["להצמידן לפנקס הכללי באתר הבנייה","להחזירן לספק לאחר ההקמה","לשמרן במשרד הראשי של החברה","למסור אותן לעובד הוותיק בצוות הפיגומים"],c:0,e:"התקנות מחייבות את מנהל העבודה להצמיד את הוראות היצרן של הפיגום לפנקס הכללי, כך שיהיו זמינות באתר לעיון ולבקרה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פנקס כללי, הודעות וצווים",d:2,q:"תוצאות הבדיקה השבועית של הפיגום שערך מנהל העבודה – היכן יש לרשמן?",a:["בפנקס הכללי","ביומן העבודה ההנדסי בלבד","בדוא\"ל למפקח העבודה האזורי","אין חובת רישום אם הפיגום נמצא תקין"],c:0,e:"כל בדיקת פיגום – לאחר הקמתו, אחת לשבעה ימים, ואחרי גשם או הפסקת עבודה – מתועדת בפנקס הכללי, כולל ממצאים ופעולות תיקון.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"מבצע בנייה החליף מנהל עבודה במהלך הפרויקט. אילו פעולות רישום ודיווח נדרשות?",a:["הודעה מיידית למפקח העבודה האזורי על ההחלפה, משלוח טופס מינוי חדש ורישום פרטי המנהל החדש בפנקס הכללי","עדכון הפנקס הכללי בלבד, ללא הודעה למפקח","הודעה למפקח בתוך 60 יום","אין צורך בדבר אם המנהל החדש כשיר"],c:0,e:"החלפת מנהל עבודה מחייבת הודעה מיידית למפקח האזורי (כולל ביטול המינוי הקודם ומינוי חדש בטופס) ורישום שמו ומענו של המנהל החדש בפנקס הכללי.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 2; הנחיות מינהל הבטיחות"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"מהו פרק הזמן הקבוע בצו שיפור לתיקון הליקוי?",a:["התקופה שקבע המפקח בצו עצמו, בהתאם לאופי הליקוי","תמיד 48 שעות","תמיד 30 יום","אין מועד – הצו הצהרתי בלבד"],c:0,e:"צו שיפור נוקב מועד לתיקון הליקוי לפי שיקול דעת המפקח ואופי הסיכון; אי-קיום הצו במועד הוא עבירה העומדת בפני עצמה.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"קבלן המשיך לעבוד באתר בניגוד לצו בטיחות שהורה על הפסקת עבודה. מה משמעות הדבר?",a:["עבירה פלילית חמורה; הגשת ערעור אינה מעכבת את הצו אלא אם הורה כך בית הדין","מותר אם הקבלן סבור שהליקוי תוקן","מותר בתיאום עם המזמין","עבירה מנהלית שדינה אזהרה בלבד"],c:0,e:"צו בטיחות מחייב באופן מיידי; המשך עבודה בניגוד לו הוא עבירה פלילית. ערעור לבית הדין לעבודה אינו מעכב את הביצוע כשלעצמו.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"פנקס כללי, הודעות וצווים",d:2,q:"תאונת עבודה שבה נהרג עובד באתר – מהי חובת הדיווח של המעסיק?",a:["הודעה מיידית למפקח העבודה האזורי","דיווח בתוך 7 ימי עבודה","דיווח רק למוסד לביטוח לאומי","דיווח רק אם המשטרה דורשת"],c:0,e:"פקודת תאונות ומחלות משלח-יד (הודעה), 1945 מחייבת את המעסיק להודיע מיד למפקח העבודה האזורי על תאונה שגרמה למות עובד; נוסף על כך מתנהלים הליכי משטרה וביטוח לאומי.",s:"פקודת תאונות ומחלות משלח-יד (הודעה), 1945"},
{t:"פנקס כללי, הודעות וצווים",d:2,q:"עובד נפצע בתאונת עבודה ואינו מסוגל לעבוד במשך חמישה ימים. האם קמה חובת הודעה למפקח העבודה האזורי?",a:["כן – תאונה הגורמת אי-כושר של יותר משלושה ימים מחייבת הודעה למפקח האזורי","לא – חובת הודעה רק בתאונה קטלנית","לא – די בדיווח לקופת החולים","כן – אך רק אם העובד דורש זאת"],c:0,e:"הפקודה קובעת חובת הודעה כאשר התאונה גרמה לעובד אי-כושר להשתכר שכר מלא במשך יותר משלושה ימים; ההודעה נשלחת בטופס שנקבע, עם הפרטים שבתוספת.",s:"פקודת תאונות ומחלות משלח-יד (הודעה), 1945, סעיף 3"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"עובד נעדר יומיים בלבד בעקבות תאונה קלה באתר. אילו חובות תיעוד חלות?",a:["רישום התאונה בפנקס הכללי של האתר; הודעה למפקח האזורי אינה נדרשת בהיעדר אי-כושר מעל 3 ימים","הודעה מיידית למפקח האזורי ולמשטרה","אין כל חובת תיעוד","דיווח לרשם הקבלנים בלבד"],c:0,e:"סף ההודעה למפקח הוא מוות או אי-כושר מעל שלושה ימים; אך תיעוד פנימי של תאונות בפנקס הכללי נדרש גם באירועים קלים, לצורך בקרה והפקת לקחים.",s:"פקודת תאונות ומחלות משלח-יד (הודעה), 1945; תקנות הבטיחות בעבודה (עבודות בנייה)"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"מי נושא בחובה החוקית להודיע למפקח העבודה האזורי על תאונת עבודה באתר?",a:["המעסיק (ובאתר בנייה – באמצעות הארגון שקבע: מנהל העבודה מדווח למעסיק והמעסיק מודיע למפקח)","העובד הנפגע בעצמו בלבד","קופת החולים המטפלת","חברת הביטוח של הקבלן"],c:0,e:"חובת ההודעה מוטלת על המעסיק. בפועל באתר, מנהל העבודה מעדכן את המעסיק/המבצע, והמעסיק מוסר את ההודעה הרשמית למפקח העבודה האזורי בטופס שנקבע.",s:"פקודת תאונות ומחלות משלח-יד (הודעה), 1945"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"אירעה תאונה קטלנית באתר. מה הדין לגבי זירת התאונה עד להגעת מפקח עבודה?",a:["אין לשנות את הזירה ואין להזיז ציוד, למעט פעולות הכרחיות להצלת חיים או למניעת סכנה נוספת","יש לפנות את הציוד מיד כדי לחדש את העבודה","מותר לשנות את הזירה לאחר צילום","הזירה באחריות המזמין בלבד"],c:0,e:"לצורך חקירת התאונה יש לשמר את הזירה כפי שהייתה; שינוי מותר רק לשם הצלת נפגעים או מניעת סכנה מיידית, ובתיאום עם הגורמים החוקרים.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954; הנחיות מינהל הבטיחות והבריאות התעסוקתית"},
{t:"פנקס כללי, הודעות וצווים",d:2,q:"טופס בל-250 שמוסר המעסיק לעובד שנפגע בעבודה משמש ל:",a:["קבלת טיפול רפואי ראשוני לנפגע עבודה על חשבון המוסד לביטוח לאומי","דיווח למפקח העבודה האזורי","רישום בפנקס הכללי","תביעת נזיקין אזרחית"],c:0,e:"טופס בל-250 הוא הפניה לטיפול רפואי לנפגע עבודה במסגרת ביטוח נפגעי עבודה של המוסד לביטוח לאומי; הוא אינו תחליף להודעה למפקח העבודה לפי פקודת ההודעה.",s:"חוק הביטוח הלאומי [נוסח משולב], התשנ\"ה-1995 – ענף נפגעי עבודה"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"מהי מטרת חובת ההודעה על פעולת בנייה לפי סעיף 192 לפקודה?",a:["לאפשר למינהל הבטיחות לדעת על קיום האתר ולתכנן פיקוח עליו","לגבות אגרת בנייה ממשלתית","לרשום את האתר בפנקס הקבלנים","להעביר את האחריות למדינה"],c:0,e:"ההודעה מיידעת את מערך הפיקוח על פתיחת אתר חדש שצפוי לפעול תקופה משמעותית, ומאפשרת תכנון ביקורות ואכיפה; אין בה כדי להעביר אחריות.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970, סעיף 192"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"מפקח עבודה מצא באתר ליקוי שאינו מהווה סכנה מיידית אך מפר תקנה. מהו כלי האכיפה המדורג המתאים?",a:["צו שיפור הקובע מועד לתיקון","צו בטיחות והפסקת כל האתר","שלילת רישיון הקבלן","מעצר מנהל העבודה"],c:0,e:"במדרג האכיפה, ליקוי שאינו סכנה מיידית מטופל בצו שיפור עם מועד תיקון; צו בטיחות שמור למצבי סכנה, ושלילת רישיון אינה בסמכות מפקח העבודה.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"האם רשאי מפקח עבודה אזורי להוציא צו בטיחות לחלק מסוים של אתר (למשל לעגורן בלבד) ולא לכל האתר?",a:["כן – הצו יכול לאסור שימוש במכונה, בציוד או בתהליך מסוים, או להפסיק עבודה מסוימת","לא – צו בטיחות חל תמיד על כל האתר","לא – צו כזה דורש אישור בית משפט מראש","כן – אך רק בהסכמת המבצע"],c:0,e:"החוק מאפשר צו בטיחות ממוקד: איסור שימוש במכונה/ציוד/חומר/תהליך שממנו נשקפת הסכנה, או הפסקת עבודה מסוימת – ולא בהכרח השבתה גורפת.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"פנקס כללי, הודעות וצווים",d:2,q:"באיזה מועד יש למסור את הודעת מינוי מנהל העבודה ולרשום את פרטיו בפנקס הכללי?",a:["עם תחילת פעולת הבנייה","בתוך 90 יום מתחילת העבודה","רק עם סיום השלד","במועד מסירת הפרויקט למזמין"],c:0,e:"מבצע הבנייה מודיע למפקח האזורי את שם מנהל העבודה עם התחלת פעולת הבנייה, ורושם בפנקס הכללי את שמו ומענו – לפני שהעבודה מתנהלת בפועל ללא ניהול רשום.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 2"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"איזה מהמסמכים הבאים חייב להימצא באתר לעיון, נוסף על הפנקס הכללי?",a:["עותקי אישורי הדרכת עבודה בגובה של העובדים, בידי מנהל העבודה","תיק התביעות המשפטיות של החברה","דוחות המס של הקבלן","פוליסת ביטוח החיים של המנהל"],c:0,e:"תקנות העבודה בגובה קובעות שבעבודות בנייה יימצא עותק אישור ההדרכה של כל עובד גם בידי מנהל העבודה, נוסף על צירוף האישור לפנקס שמנהל המבצע.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"תסקיר בדיקה של בודק מוסמך לעגורן באתר – מה דינו?",a:["יישמר באתר ויהיה זמין לעיון מפקח עבודה; ליקויים שצוינו בו יתוקנו כתנאי להמשך השימוש","מסמך פנימי של חברת הבדיקה בלבד","נשלח לרשם הקבלנים בלבד","נשמר אצל היצרן בחו\"ל"],c:0,e:"תסקירי בודק מוסמך הם חלק מתיעוד הבטיחות החובה של ציוד ההרמה; ציוד שנמצא בו ליקוי המסכן – אסור בשימוש עד תיקונו, והתסקיר מוצג למפקח לפי דרישה.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 – מכונות הרמה"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"מבצע בנייה לא שלח הודעה על פעולת בנייה הנמשכת 8 חודשים ולא מינה מנהל עבודה. כיצד יסווגו ההפרות?",a:["שתי עבירות נפרדות: הפרת חובת ההודעה לפי הפקודה והפרת חובת המינוי לפי התקנות","עבירה אחת בלבד, כי ההודעה כוללת את המינוי","אין עבירה אם לא אירעה תאונה","עבירה מנהלית של הרשות המקומית"],c:0,e:"מדובר בשתי חובות עצמאיות ממקורות שונים – סעיף 192 לפקודה ותקנה 2 לתקנות הבנייה – והפרת כל אחת מהן היא עבירה נפרדת בת אכיפה.",s:"פקודת הבטיחות בעבודה, סעיף 192; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 2"},
{t:"פנקס כללי, הודעות וצווים",d:2,q:"מי רשאי לעיין בפנקס הכללי של האתר מתוקף החוק?",a:["מפקח עבודה, וכן בעלי תפקידים שהחוק הקנה להם זכות עיון במסמכי בטיחות (כגון נאמן בטיחות)","עיתונאים, מתוקף חופש המידע","כל אדם מן הציבור","רק בעלי המניות של החברה"],c:0,e:"מפקחי עבודה מוסמכים לעיין בכל פנקס שחובה לנהלו; גם לנאמני בטיחות הוקנתה זכות עיון במסמכים הנוגעים לבטיחות. הפנקס אינו מסמך ציבורי פתוח.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"אילו עבודות בגובה מחייבות משלוח הודעה מוקדמת למפקח העבודה האזורי לפי תקנות העבודה בגובה?",a:["עבודות מהסוגים שנקבעו בתקנות (כגון עבודת גלישה), כשהעבודה מותרת אם לא התקבלה התנגדות המפקח","כל עבודה בגובה מעל 2 מטרים","אף עבודה – אין חובת הודעה בתקנות הגובה","רק עבודה על גג שביר"],c:0,e:"התקנות קובעות חובת הודעה מוקדמת לסוגי עבודות מסוימים, ובהם עבודת גלישה; העבודה מתבצעת אם לא התקבלה התנגדות מצד מפקח העבודה האזורי כאמור בתקנות.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007, תקנות 59-60"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"קנס מנהלי בגין עבירת בטיחות באתר בנייה מוטל מכוח:",a:["חוק העבירות המינהליות והתקנות שקבעו עבירות בטיחות כעבירות מנהליות","פסיקת בית הדין לעבודה בלבד","החלטת ועד העובדים","תקנון פנימי של התאחדות הקבלנים"],c:0,e:"חלק מעבירות הבטיחות נקבעו כעבירות מנהליות שניתן להטיל בגינן קנס מנהלי, מכוח חוק העבירות המינהליות, התשמ\"ו-1985, כחלופה מהירה להליך פלילי.",s:"חוק העבירות המינהליות, התשמ\"ו-1985; תקנות העבירות המינהליות (קנס מינהלי – בטיחות בעבודה)"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"בדיקת מפסק מגן (ממסר פחת) במיתקן החשמל הארעי באתר – מהי שגרת הבדיקה הנדרשת?",a:["לחיצה על לחיץ הבדיקה אחת לשבוע לפחות (יכול לבצע גם מי שאינו חשמלאי), ובדיקה במכשיר בידי חשמלאי אחת ל-3 חודשים לפחות","בדיקה אחת לשנה בידי בודק מוסמך בלבד","בדיקה יומית בידי מהנדס חשמל","אין חובת בדיקה לציוד ארעי"],c:0,e:"שגרת הבדיקה למפסקי מגן באתר: בדיקת לחיץ שבועית, שאינה מחייבת חשמלאי, ובדיקה באמצעות מכשיר בדיקה אחת לשלושה חודשים לפחות בידי חשמלאי – והכול מתועד.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – חשמל באתר; תקנות החשמל"},
{t:"פנקס כללי, הודעות וצווים",d:2,q:"הודעה כוזבת או רישום כוזב בפנקס הכללי (למשל רישום בדיקת פיגום שלא בוצעה) מהווים:",a:["עבירה פלילית של רישום כוזב במסמך שחובה לנהלו","פגם טכני חסר משמעות","עניין משמעתי פנימי בלבד","הפרה חוזית כלפי המזמין בלבד"],c:0,e:"הפנקס הכללי הוא מסמך סטטוטורי; רישום כוזב בו הוא עבירה, והוא אף עלול לשמש ראיה מחמירה בחקירת תאונה.",s:"פקודת הבטיחות בעבודה; חוק ארגון הפיקוח על העבודה, התשי\"ד-1954"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"מנהל עבודה התמנה זמנית לאתר נוסף לשבוע אחד בשל היעדרות עמיתו. לפי הנחיות מינהל הבטיחות, מה נדרש?",a:["משלוח הודעות כדין למפקח האזורי: ביטול/עדכון רישום ומינוי זמני מתועד, כך שבכל עת רשום מנהל עבודה אחראי לאתר","אין צורך בדבר לתקופה קצרה משבועיים","אישור בכתב מהמזמין בלבד","פרסום מודעה בלוח האתר"],c:0,e:"הנחיות מינהל הבטיחות מסדירות החלפה זמנית של מנהל עבודה באמצעות הודעות מינוי וביטול למפקח האזורי, כדי שלא ייווצר מצב שבו אתר פועל ללא מנהל עבודה רשום ואחראי.",s:"הנחיות מינהל הבטיחות והבריאות התעסוקתית; תקנות הבטיחות בעבודה (עבודות בנייה), תקנה 2"},
{t:"פנקס כללי, הודעות וצווים",d:3,q:"סיים מבצע הבנייה את העבודות באתר שדווח עליו. מה ראוי שיעשה כלפי מינהל הבטיחות?",a:["להודיע על סיום העבודות באתר, כדי לעדכן את רישומי הפיקוח","אין כל צורך בעדכון לעולם","להחזיר את הפנקס הכללי למפקח האזורי","לבקש תעודת גמר ממפקח העבודה הראשי"],c:0,e:"עדכון על סיום עבודות מאפשר למינהל לסגור את רישום האתר ולמקד את הפיקוח באתרים פעילים; טפסי הדיווח של המינהל כוללים הודעת סיום עבודות.",s:"הנחיות מינהל הבטיחות והבריאות התעסוקתית – דיווח על אתרי בנייה"},
{t:"עבודה בגובה",d:2,q:"כיצד מוגדרת 'עבודה בגובה' בתקנות?",a:["עבודה, לרבות גישה למקום עבודה, שבשלה עלול עובד ליפול לעומק העולה על 2 מטרים","כל עבודה מעל 1.8 מטרים","עבודה מעל 3 מטרים בלבד","עבודה על גג בכל גובה שהוא"],c:0,e:"ההגדרה בתקנות מתמקדת בסיכון הנפילה: כל עבודה (כולל גישה אליה) שבה עלול עובד ליפול לעומק העולה על 2 מטרים – לרבות עבודה מעל משטח ללא גידור תקני.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007, תקנה 1"},
{t:"עבודה בגובה",d:2,q:"מהו התוקף המרבי של אישור הדרכה לעבודה בגובה?",a:["שנתיים","שנה אחת","חמש שנים","ללא הגבלת זמן לאחר ההדרכה הראשונה"],c:0,e:"אישור ההדרכה החתום בידי מדריך עבודה בגובה ניתן לתקופה שלא תעלה על שנתיים; לקראת פקיעתו נדרש רענון לחידוש האישור.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:3,q:"מהם התנאים המצטברים להעסקת אדם בעבודה בגובה?",a:["בגיר, שהודרך בידי מדריך מוסמך ובידו אישור תקף לתחום הרלוונטי, ושאינו במצב העלול לסכן אותו או אחרים","בגיר בעל ניסיון של שנה בענף הבנייה","עובד שעבר בדיקת ראייה בלבד","עובד שאושר בידי ממונה הבטיחות"],c:0,e:"תקנה 5 דורשת: בגירות, הדרכה בידי מדריך עבודה בגובה לתחום הספציפי, אישור בתוקף, והיעדר מצב מסכן (סמים, אלכוהול, ליקוי גופני או נפשי).",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007, תקנה 5"},
{t:"עבודה בגובה",d:3,q:"אישור הדרכה לעבודה בגובה ניתן 'לתחום ההדרכה'. מה משמעות הדבר?",a:["העובד רשאי לעבוד רק בתחומים שהודרך והוסמך להם (למשל סולמות, פיגומים נייחים, סלי הרמה) ולא בכל עבודת גובה","האישור תקף לכל סוגי עבודות הגובה ללא הבחנה","האישור תקף רק באזור הגאוגרפי שבו הודרך","האישור מוגבל לאתר אחד בלבד"],c:0,e:"ההדרכה נעשית לפי תוכנית ייעודית לכל תחום (סולמות, פיגומים, במות הרמה, גגות וכו'), והאישור מציין את התחומים; עבודה בתחום שלא הודרך לו – אסורה.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:3,q:"באילו נסיבות מותר לאדם לעבוד בגובה ללא אישור הדרכה?",a:["לצורכי הדרכה, אימון או בחינה, בהשגחתו הישירה והמתמדת של מדריך עבודה בגובה","כשמדובר בעבודה דחופה של פחות משעה","כשהעובד בעל ותק של 10 שנים","בשעות היום בלבד ובמזג אוויר נוח"],c:0,e:"התקנות מתירות חריג יחיד: עבודה במסגרת הדרכה, אימון או בחינה, ובלבד שהעובד נתון להשגחה ישירה ומתמדת של מדריך עבודה בגובה מוסמך.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:3,q:"עבודה בגובה בשעות הלילה (בין שקיעה לזריחה) או ברוחות חזקות מותרת רק אם:",a:["ניתנו הנחיות בטיחות מפורשות בכתב מאת המבצע, לרבות אופן הביצוע והציוד הנדרש, ומתקיימים תנאי תאורה/בטיחות שנקבעו","המבצע נתן אישור בעל-פה בטלפון","העובדים הם בעלי ניסיון של 5 שנים","שולם לעובדים תוספת סיכון"],c:0,e:"התקנות מתנות עבודת גובה בלילה ובתנאי מזג אוויר קשים בהנחיות כתובות של המבצע לגבי שיטת העבודה והציוד, ובקיום תנאים כגון תאורה נאותה או פנס תקני על קובע המגן.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:2,q:"חומרים וכלים שבהם משתמש עובד בגובה – כיצד יש לנהוג בהם?",a:["לאבטחם מפני נפילה ולהחזיקם לפי הצורך בכלי קיבול מתאים","להניחם על מעקה הפיגום לנוחות הגישה","לקשרם לרתמת העובד בלבד, בכל משקל","אין דרישה מיוחדת לגביהם"],c:0,e:"התקנות מחייבות אבטחת חומרים, כלים וציוד מפני נפילה מגובה והחזקתם בכלי קיבול מתאים – הגנה על העובדים והעוברים מתחת.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:3,q:"בסולם קבוע ללא כלוב מגן – מהו המרחק המרבי בין משטחי מנוחה?",a:["6 מטרים","10 מטרים","12 מטרים","אין דרישה למשטחי מנוחה"],c:0,e:"בסולם קבוע נדרשים משטחי מנוחה יציבים ומגודרים משלושה עברים במרחק שאינו עולה על 6 מטרים; אם הסולם מצויד בכלוב מגן לכל גובהו – עד 10 מטרים.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:3,q:"בסולם קבוע המצויד בכלוב מגן לכל גובהו – מהו המרחק המרבי בין משטחי המנוחה?",a:["10 מטרים","6 מטרים","15 מטרים","20 מטרים"],c:0,e:"כלוב מגן מתיר הגדלת המרווח בין משטחי המנוחה עד 10 מטרים, לעומת 6 מטרים בסולם ללא כלוב.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:3,q:"עובד מאובטח בגובה באמצעות מערכת לבלימת נפילה. למה חייבת המערכת להיות מחוברת?",a:["לרתמת בטיחות תקינה שהעובד לובש, ולנקודת עיגון מתאימה","לחגורת המכנסיים של העובד","לכבל החשמל הקרוב","לפיגום הנייד שעליו הוא עומד, בכל מקרה"],c:0,e:"האבטחה נעשית באמצעות רתמת בטיחות שאליה מחוברת מערכת מתאימה (בלימת נפילה, מיקום ותמיכה או ריסון), כשהיא תקינה, שלמה ובדוקה, ומעוגנת לנקודת עיגון נאותה.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:2,q:"עבודה על סולם נסמך מותרת בין היתר בתנאי ש:",a:["הסולם מוצב בזווית יציבה, נשען על סמך יציב ומובטח מפני תזוזה מקרית","הסולם נשען על ארגז כלים יציב","עובד נוסף עומד למטה בכל מקרה ללא קיבוע","הסולם עשוי עץ בלבד"],c:0,e:"התקנות דורשות הצבה יציבה: הישענות על שני הזקפים, אמצעי נגד החלקה בבסיס (רפידות, דורבנות או מעצור), זווית מתאימה ואבטחה מפני תזוזה.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007 – פרק הסולמות"},
{t:"עבודה בגובה",d:3,q:"אילו פעולות מותר לבצע מסולם בלי שיחולו כל דרישות פרק העבודה בגובה?",a:["פעולות שהוחרגו במפורש בתקנות, כגון עלייה או ירידה מסולם ללא ביצוע עבודה נוספת וללא נשיאת משאות בידיים","כל עבודה הנמשכת פחות מ-30 דקות","עבודות צבע בלבד","אין כל החרגה בתקנות"],c:0,e:"התקנות מחריגות פעולות מסוימות, ובהן מעבר בסולם ללא עבודה נוספת וללא נשיאת משא בידיים, וכן עבודות קצרות ולא מאומצות בתנאים שנקבעו – כל השאר כפוף למלוא הדרישות.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:3,q:"עבודה מתוך בימה מתרוממת ניידת (במת הרמה) – כיצד מאובטח העובד?",a:["העובד קשור ברתמת בטיחות המעוגנת לנקודת העיגון שבבימה, ונשאר בתוך הסל במהלך העבודה","העובד רשאי לטפס על מעקה הסל לעבודה גבוהה יותר","אין צורך ברתמה כי הסל מגודר","העובד נקשר למבנה חיצוני בלבד"],c:0,e:"בעבודה מבימה מתרוממת העובד מאובטח ברתמה המחוברת לנקודת העיגון של הבימה; אסור לטפס על דפנות הסל או לצאת ממנו בגובה אלא בתנאים שהותרו במפורש.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007 – פרק בימות הרמה"},
{t:"עבודה בגובה",d:3,q:"מהי הדרישה לגבי המיתקן (במת ההרמה) בזמן שהעובד בגובה מחוץ לטווח בטוח ממנו?",a:["המיתקן יישאר בעמדתו ללא תנועה עד שהעובד התרחק למרחק שנקבע, ויוזז בזהירות מרבית רק לאחר נקיטת האמצעים","מותר להזיזו מיד עם סיום העבודה","המיתקן מוסע כשעובד על הסולם הצמוד לו","אין מגבלות תנועה על המיתקן"],c:0,e:"התקנות אוסרות הזזת מיתקן הרמה כשעובד נמצא בסמוך אליו בגובה; ההזזה מותרת רק לאחר התרחקות העובד למרחק שנקבע ונקיטת אמצעי הזהירות.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:2,q:"עבודה על גג שביר או תלול מחייבת בין היתר:",a:["אמצעים ייעודיים כגון לוחות דריכה/זחילה, אבטחה מפני נפילה ושילוט אזהרה על שבירות הגג","חבישת קסדה בלבד","עבודה בזוגות בלבד ללא אמצעים נוספים","אין דרישות מיוחדות לגג שביר"],c:0,e:"גג שביר הוא מוקד תאונות קטלניות; התקנות מחייבות אמצעי פיזור עומס ודריכה, מערכות אבטחה מפני נפילה, סימון ושילוט, והגבלת גישה לעובדים שהודרכו לכך.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007 – עבודה על גגות"},
{t:"עבודה בגובה",d:3,q:"מי חייב לוודא, לפני תחילת עבודה בגובה באתר בנייה, שלעובד יש אישור הדרכה תקף, ולהחזיק עותק ממנו?",a:["המבצע יחזיק אישור תקף לכל עובד, ובעבודות בנייה יימצא עותק גם בידי מנהל העבודה","העובד בלבד שומר את האישור בביתו","מדריך הגובה שומר את כל האישורים","קופת החולים של העובד"],c:0,e:"התקנות קובעות כי המבצע מחזיק אישור תקף לכל עובד (מצורף לפנקס), ובעבודות בנייה נדרש עותק גם בידי מנהל העבודה באתר.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:3,q:"ציוד מגן אישי לעבודה בגובה (רתמות, מערכות בלימה) – מתי ואיך נבדק?",a:["נבדק תקינות ושלמות לפי התקנות והוראות היצרן לפני השימוש; ציוד פגום או שבלם נפילה – מוצא משימוש","נבדק אחת לחמש שנים במעבדה בלבד","אינו טעון בדיקה אם הוא חדש יחסית","נבדק רק לאחר תאונה"],c:0,e:"התקנות מתנות את השימוש בכך שהמערכות תקינות, שלמות ונבדקו; ציוד שספג עומס בלימת נפילה או נמצא פגום – נפסל ומוחלף בהתאם להוראות היצרן.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007, תקנה 9"},
{t:"עבודה בגובה",d:3,q:"מהו 'אזור סכנה' שיש לתחום בעת עבודה בגובה?",a:["השטח שמתחת לעבודה ובסביבתה, שבו עלולים אנשים להיפגע מנפילת אדם או חפץ – יש לגדרו, לסמנו ולמנוע גישה אליו","חדר המדרגות הקרוב בלבד","שטח של מטר אחד סביב הסולם בכל מקרה","אין מושג כזה בתקנות"],c:0,e:"לפני עבודה בגובה יש לתחם ולסמן את אזור הסכנה שמתחת ומסביב, להציב שילוט ולמנוע כניסת אנשים – הגנה מפני נפילת חפצים ואדם.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:3,q:"עובד גובה מבצע 'טיפול בעצים' (כגון גדיד תמרים) מתוך בימה מתרוממת. אילו תנאים מיוחדים נקבעו?",a:["העבודה לכיוון מרכז הבימה, וטיפוס על ענפים מעל משטח העבודה מוגבל לגובה שלא יעלה על שני מטרים בתנאים שנקבעו","אין כל תנאים מיוחדים לעבודה חקלאית","העבודה מותרת רק בסולם נסמך","העבודה מותרת רק בלילה"],c:0,e:"התקנות מסדירות במפורש טיפול בעצים מתוך בימה מתרוממת, כולל מגבלות על כיוון העבודה ועל טיפוס מעל משטח העבודה – דוגמה לפירוט הענפי של תקנות הגובה.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"עבודה בגובה",d:2,q:"מי נושא באחריות לאספקת כל הציוד והאמצעים הנדרשים לעבודה בגובה, במצב תקין?",a:["המבצע (המעסיק)","העובד, על חשבונו","ספק הציוד בלבד","המזמין הפרטי של הדירה"],c:0,e:"המבצע אחראי לאספקת הציוד והאמצעים הנדרשים לביצוע העבודות בגובה כשהם תקינים ומתאימים – לרבות ציוד מגן אישי, עיגונים ואמצעי גישה.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"פיגומים",d:2,q:"פיגום זקפים שגובהו עולה על 6 מטרים – מי רשאי להקימו או לפרקו?",a:["רק תחת השגחתו והנהלתו הישירה של בונה מקצועי לפיגומים","כל עובד בעל אישור עבודה בגובה","מנהל העבודה בעצמו, ללא תנאי נוסף","צוות של שלושה עובדים ותיקים"],c:0,e:"התקנות אוסרות התקנה, פירוק או שינוי של פיגום זקפים שגובהו מעל 6 מטרים אלא בנוכחות והשגחה ישירה של בונה מקצועי לפיגומים.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פיגומים",d:3,q:"באיזו תדירות חייב מנהל העבודה לבדוק את תקינות הפיגום באתר?",a:["לפחות אחת לשבעה ימים, וכן לאחר הפסקת עבודה ולאחר גשם או רוח העלולים לפגוע ביציבותו","אחת לחודש","רק לאחר הקמתו הראשונית","אחת ל-14 ימים"],c:0,e:"חובת הבדיקה: עם גמר ההקמה ולפני השימוש, לפחות אחת ל-7 ימים, ולאחר הפסקת עבודה ממושכת או מזג אוויר (גשם, רוח) העלול לפגוע ביציבות – והכול נרשם בפנקס הכללי.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פיגומים",d:3,q:"פיגום זקפים מעץ שגובהו עולה על 18 מטרים – מה נדרש לפני הקמתו?",a:["תכנון בידי מתכנן הקמת פיגומים (מהנדס מורשה) הכולל חישובי חוזק ויציבות","אישור בעל-פה של מנהל העבודה","בדיקת מעבדה לכל קרש","אין דרישה מיוחדת מעבר לבונה מקצועי"],c:0,e:"פיגום עץ מעל 18 מ' (ופיגום פלדה מעל הגובה שנקבע בתקנות) נחשב פיגום הטעון תכנון הנדסי בידי מתכנן הקמת פיגומים, בנוסף להקמה בהשגחת בונה מקצועי.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פיגומים",d:3,q:"מהו 'פיגום מיוחד' לפי התקנות?",a:["פיגום זקפים גבוה במיוחד, פיגום שצורתו מיוחדת או פיגום הבנוי מחומרים מיוחדים או המשמש למטרות מיוחדות – הטעון תכנון","כל פיגום מעל 2 מטרים","פיגום שצבעו שונה מהמקובל","פיגום שהושכר מחברה זרה"],c:0,e:"ההגדרה כוללת פיגום זקפים שגובהו חורג מהסף שבתקנות, פיגום בעל צורה/חומרים/שימוש מיוחדים – ואלה מחייבים תכנון הנדסי ואמצעים מיוחדים.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 1 והפרק הפיגומים"},
{t:"פיגומים",d:3,q:"פיגום המוקם בסמוך למדרון – מהן הדרישות?",a:["מרחק של 50 ס\"מ לפחות בין קצה האדן לשפת המדרון, ושיפוע מדרון של 2 אופקי ל-1 אנכי לפחות (אלא אם סלע או מדופן)","מרחק 10 ס\"מ מספיק אם הקרקע יבשה","אסור בכל מקרה להקים פיגום ליד מדרון","נדרש אישור הרשות המקומית בלבד"],c:0,e:"התקנות קובעות מרחק מזערי של 50 ס\"מ משפת המדרון ושיפוע 2:1 לפחות; אם תנאי השטח אינם מאפשרים – נדרשת תוכנית של מתכנן הקמת פיגומים שתבטיח יציבות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פיגומים",d:3,q:"בפיגום זקפים – מה היחס הנדרש בין רצפת הפיגום העליונה לראש הזקפים?",a:["הרצפה תהיה נמוכה במטר אחד לפחות מראש הזקפים","הרצפה יכולה להיות בגובה ראש הזקפים","הרצפה גבוהה מהזקפים ב-50 ס\"מ","אין דרישה כזו"],c:0,e:"התקנות דורשות שרצפת הפיגום תהיה נמוכה ב-1 מטר לפחות מראש הזקפים – כך שהזקפים עצמם משמשים הגנה היקפית למפלס העבודה העליון.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פיגומים",d:2,q:"גידור משטח עבודה בפיגום כולל:",a:["אזן יד, אזן תיכון ולוחות רגליים","אזן יד בלבד","סרט סימון אדום-לבן","רשת צל בלבד"],c:0,e:"הגידור התקני למניעת נפילת אדם וחפצים כולל אזן יד עליון, אזן תיכון ולוח רגליים בשפת המשטח; סרטי סימון אינם אמצעי גידור.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"פיגומים",d:3,q:"עצים המשמשים להתקנת פיגום – אילו דרישות חלות עליהם?",a:["נקיים מקליפה, מצבע ומסמרים בולטים, ואסור לעשות בהם דבר המסתיר ליקויים","צבועים בצבע מגן עבה","דווקא עץ אורן טרי","אין דרישות לחומר עץ"],c:0,e:"התקנות דורשות עץ ללא קליפה וצבע (שמסתירים סדקים ופגמים) וללא מסמרים בולטים; לוחות העלולים להתפקע מחוזקים כנדרש, ומנהל העבודה בודק את החומר לפני השימוש.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פיגומים",d:3,q:"מהו 'פיגום ממוכן'?",a:["פיגום שבעזרת כוח מכני, חשמלי או הידראולי ניתן לשנות את מיקום משטחי העבודה שלו","פיגום המורכב מצינורות פלדה","פיגום שהוקם באמצעות מנוף","פיגום על גלגלים"],c:0,e:"פיגום ממוכן מוגדר כפיגום שמשטחי העבודה שלו ניתנים להזזה בכוח מכני/חשמלי/הידראולי; הוא כפוף לדרישות בדיקה מחמירות, לרבות בדיקת בודק מוסמך.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 1"},
{t:"פיגומים",d:3,q:"פיגום תלוי ממוכן (עריסה) – מה נדרש לפני תחילת השימוש בו באתר?",a:["בדיקת בודק מוסמך ותסקיר המתיר שימוש, נוסף על הרכבה בידי גורם מקצועי לפי הוראות היצרן","שטיפת הפיגום במים בלחץ","אישור ועד הבית של הבניין","חיבור לגנרטור חירום בלבד"],c:0,e:"פיגום ממוכן/תלוי הוא מתקן הרמה לכל דבר וטעון בדיקת בודק מוסמך לפני השימוש הראשון ובדיקות תקופתיות, לצד הקמה לפי הוראות היצרן ובידי מי שהוסמך לכך.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; פקודת הבטיחות בעבודה – מכונות הרמה"},
{t:"פיגומים",d:2,q:"עומס על משטח פיגום – מה הכלל?",a:["אין להעמיס על הפיגום מעבר לעומס השימושי שתוכנן לו, ויש לפזר את העומס באופן שלא יסכן את יציבותו","מותר לאחסן על הפיגום כל כמות חומר זמינה","העומס מוגבל רק במזג אוויר סוער","משקל העובדים אינו נחשב עומס"],c:0,e:"'עומס שימושי' כולל את העובדים, החומרים והציוד; חריגה ממנו או ריכוז עומס נקודתי מסכנים את יציבות הפיגום ואסורים.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פיגומים",d:3,q:"מצא מנהל העבודה בבדיקה השבועית כי חלק מקשירות הפיגום למבנה נותקו לצורך עבודות חיפוי. מה עליו לעשות?",a:["להפסיק את השימוש בקטע הפיגום עד השבת העיגונים או חיזוק חלופי לפי הנחיה מקצועית, ולתעד בפנקס הכללי","לאשר המשך עבודה אם אין רוח","להסתפק בהנחיה בעל-פה לעובדים להיזהר","לדווח לרשם הקבלנים"],c:0,e:"עיגוני פיגום הם תנאי ליציבותו; ניתוקם הופך את הפיגום למסוכן ומחייב הפסקת שימוש, תיקון בהשגחת גורם מקצועי ותיעוד הבדיקה והליקוי בפנקס.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פיגומים",d:3,q:"מהו 'פיגום זיזי'?",a:["פיגום שרצפתו נתמכת על סמוכות זיזיות המחוברות למבנה","פיגום העומד על הקרקע על זקפים","פיגום התלוי על כבלי פלדה","פיגום נייד על גלגלים"],c:0,e:"פיגום זיזי נתמך על זיזים (קונזולות) הבולטים מהמבנה ומעוגנים אליו, להבדיל מפיגום זקפים הנשען על הקרקע ומפיגום תלוי הנישא על כבלים.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 1"},
{t:"פיגומים",d:3,q:"מעבר בין קטעי פיגום זקפים בפינת מבנה ייעשה כך ש:",a:["קטע פיגום אחד עובר את פינת המבנה במלוא רוחבו ומשיק לקטע השני","העובדים מדלגים מעל מרווח של עד מטר","מותקן לוח עץ בודד המגשר בין הקטעים","המעבר נעשה דרך חלונות המבנה"],c:0,e:"התקנות קובעות שבפינת מבנה ייעשה המעבר כשקטע אחד של הפיגום עובר את הפינה במלוא רוחבו ומשיק לקטע השני – ללא מרווחים מסוכנים בפינה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פיגומים",d:2,q:"מי בודק את החומר המיועד להתקנת פיגום לפני השימוש בו?",a:["מנהל העבודה","נציג הספק בלבד","העובד שירכיב את הפיגום","מפקח העבודה האזורי בכל אספקה"],c:0,e:"התקנות מטילות על מנהל העבודה לבדוק את החומר המיועד להתקנת פיגום לפני השימוש, כדי לוודא שהוא תקין, ללא פגמים ומתאים לייעודו.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פיגומים",d:3,q:"'פיגום עצמאי' מוגדר כפיגום ש:",a:["מבנהו מבטיח את חוזקו ויציבותו ללא קשירה למבנה או לגוף אחר","חייב קשירה לפחות בשתי נקודות","עומד על גלגלים נעולים","הוקם בידי עובד יחיד"],c:0,e:"פיגום עצמאי יציב מעצם מבנהו ואינו נדרש לעיגון למבנה; פיגומים אחרים מחייבים קשירה ועיגון כתנאי ליציבות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 1"},
{t:"פיגומים",d:3,q:"עובד נדרש לעבוד על פיגום שטרם הושלמה הקמתו (חסרים משטחים ומעקות). מה הדין?",a:["אסור להשתמש בפיגום שהקמתו לא הושלמה ולא נבדקה; יש לסמן/לחסום גישה אליו עד להשלמה ובדיקה","מותר אם העובד זהיר ומנוסה","מותר לעבודות קלות בלבד","מותר אם זה לפרק זמן קצר משעה"],c:0,e:"השימוש בפיגום מותנה בהשלמת ההקמה ובבדיקת תקינות; פיגום חלקי הוא מפגע שיש למנוע גישה אליו – שימוש בו מהווה הפרה ומקור תאונות נפוץ.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"פיגומים",d:3,q:"'פיגום חמורי' הוא:",a:["פיגום שרצפתו נסמכת על סמוכות ניידות (חמורים) העומדות על הקרקע או על סמך יציב אחר","פיגום הנגרר בידי בהמת משא","פיגום מחומרים כבדים במיוחד","שם עממי לפיגום תלוי"],c:0,e:"ההגדרה בתקנות: פיגום שרצפתו נשענת על סמוכות ניידות ('חמורים') על הקרקע או על אמצעי סמך יציב; השימוש בו מוגבל לגבהים ולעומסים שנקבעו.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנה 1"},
{t:"פיגומים",d:2,q:"לאחר סופת גשמים עזה בלילה, מה על מנהל העבודה לעשות לפני חידוש העבודה על הפיגומים בבוקר?",a:["לבדוק את תקינות הפיגומים ויציבותם לפני חידוש השימוש, ולרשום את הבדיקה בפנקס הכללי","לחדש את העבודה ולבדוק במהלך היום","להמתין יומיים לייבוש ואז לעבוד ללא בדיקה","לשטוף את הפיגום ולחדש עבודה"],c:0,e:"גשם ורוח עלולים לערער ביסוס, עיגונים ומשטחים; התקנות מחייבות בדיקת פיגום לאחר תנאי מזג אוויר כאלה, לפני חידוש השימוש, ותיעוד בפנקס.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק הפיגומים"},
{t:"חפירות ודיפון",d:2,q:"החל מאיזה עומק חפירה קיימת חובת דיפון (או חלופה מאושרת) למניעת התמוטטות?",a:["מעל 1.2 מטר","מעל 2 מטרים","מעל 4 מטרים","מעל 0.8 מטר"],c:0,e:"התקנות קובעות כי בחפירה או בור שעומקם עולה על 1.2 מטר יש להבטיח את דפנותיהם בדיפון מתאים נגד התמוטטות, אלא אם הדפנות חצובות בסלע יציב או בשיפוע טבעי בטוח.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:3,q:"באילו מקרים ניתן לוותר על דיפון בחפירה שעומקה מעל 1.2 מטר?",a:["כאשר הדפנות חצובות בסלע יציב או כשהן בשיפוע המבטיח את יציבותן","כאשר העבודה צפויה להימשך פחות מיום אחד","כאשר מנהל העבודה משגיח ברציפות על החפירה","כאשר הקרקע יבשה לחלוטין"],c:0,e:"החלופות לדיפון הן גיאוטכניות בלבד: סלע יציב או שיפוע דפנות מתון המונע התמוטטות. משך עבודה קצר או נוכחות השגחה אינם מבטלים את סכנת הקריסה ואינם פוטרים מדיפון.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:3,q:"חפירה מתוכננת לעומק של 5 מטרים. מה נדרש בנוסף לדיפון רגיל?",a:["תכנון הדיפון בידי מהנדס והתקנתו לפי התכנון","אישור בכתב ממפקח העבודה הראשי בלבד","הצבת שני מנהלי עבודה במשמרות","אין דרישה נוספת מעבר לדיפון סטנדרטי"],c:0,e:"בחפירה שעומקה עולה על 4 מטרים נדרש שהדיפון יתוכנן בידי מהנדס, והקמתו תיעשה בהתאם לתכנון. זאת בשל העומסים הגיאוטכניים הגדלים משמעותית עם העומק.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:2,q:"מהו המרחק המרבי שעובד בתעלה רשאי להימצא מסולם או דרך יציאה אחרת?",a:["20 מטרים","50 מטרים","10 מטרים","אין הגבלה אם יש סולם אחד בתעלה"],c:0,e:"בתעלה שעומקה מחייב אמצעי יציאה, יש להציב סולמות או דרכי מילוט כך שעובד לא יימצא במרחק העולה על 20 מטרים מדרך יציאה – כדי לאפשר מילוט מהיר בעת סכנה (קריסה, הצפה).",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:2,q:"היכן אסור להניח את החומר החפור (ערימות העפר) ביחס לשפת החפירה?",a:["בקרבת שפת החפירה באופן שעלול לגרום להתמוטטות הדופן או לנפילת חומר על עובדים","במרחק העולה על 10 מטרים מהשפה","בצד הצפוני של החפירה","מותר בכל מקום אם החומר יבש"],c:0,e:"אחסון עפר וחומרים סמוך לשפת החפירה מוסיף עומס על הדופן ועלול לגרום לקריסתה או להידרדרות חומר על העובדים בתוכה. יש להרחיק את הערימות משפת החפירה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:1,q:"מה נדרש להציב סביב חפירה באתר בשעות החשכה, בנוסף לגידור?",a:["פנסים אדומים (תאורת אזהרה)","שלט פולט אור ירוק","שומר בכל פינה","סרט סימון לבן בלבד"],c:0,e:"התקנות מחייבות גידור של חפירות ובורות, ובשעות החשכה – הצבת פנסי אזהרה אדומים שיתריעו על הסכנה בפני עוברים ושבים ועובדים.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:3,q:"מהי 'חפירת מדלה' (חתירה תחת בסיס הדופן) ומה דינה?",a:["חפירה היוצרת מדף עליון תלוי ללא תמיכה – אסורה משום שהיא גורמת להתמוטטות פתאומית","שיטת חפירה מאושרת לקרקע חולית בלבד","חפירה ידנית בעומק רב – מותרת בהשגחת מנהל עבודה","חפירה בשיפוע הפוך – מותרת עד 1.2 מטר"],c:0,e:"חתירה (undercutting) תחת דופן או מדרון יוצרת חלק עליון תלוי העלול לקרוס בפתאומיות על העובדים. התקנות אוסרות שיטת עבודה זו.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:2,q:"מתי חובה לבדוק מחדש את יציבות הדפנות והדיפון בחפירה קיימת?",a:["לאחר גשם, הצפה, קרה או זעזוע, ולפני חידוש העבודה","אחת לחודש בלבד","רק אם עובד התלונן","רק לפני ביקור מפקח עבודה"],c:0,e:"שינויי מזג אוויר וזעזועים (פיצוצים, תנועת כלים כבדים) מערערים את יציבות הקרקע. יש לבדוק את החפירה והדיפון לאחר אירועים כאלה לפני שמתירים לעובדים לרדת אליה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:2,q:"מחפר (באגר) עובד בחפירה. מה הכלל לגבי הימצאות עובדים בקרבתו?",a:["אסור לעובד להימצא בתחום פעולת הזרוע והכף של הכלי","מותר אם העובד עוטה אפוד זוהר","מותר אם המפעיל מנוסה מעל 5 שנים","מותר בצד ימין של הכלי בלבד"],c:0,e:"תחום הפעולה של זרוע הכלי הוא אזור סכנת מוות – פגיעת כף, סיבוב פתאומי או נפילת חומר. אסור לעובדים לשהות בטווח פעולת הכלי, ואפוד זוהר אינו מגן מפני פגיעה פיזית.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:2,q:"כיצד חוצים תעלה פתוחה באתר באופן בטוח?",a:["באמצעות מעבר/גשרון תקני המצויד במעקות","בקפיצה מעל התעלה אם רוחבה קטן ממטר","בירידה לתעלה וטיפוס בצד השני","על גבי צינור החוצה את התעלה"],c:0,e:"מעבר מעל תעלה ייעשה רק על גשרון יציב ברוחב מתאים עם אזני יד (מעקות). קפיצה, מעבר על צינורות או ירידה לתעלה הם מקור לתאונות נפילה והתמוטטות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:3,q:"לפני תחילת חפירה בשטח עירוני, מה על מבצע הבנייה לברר?",a:["הימצאות תשתיות תת-קרקעיות (חשמל, גז, מים, תקשורת) ומיקומן","את זהות הקבלן שעבד במגרש הסמוך","אם בוצעה חפירה במגרש בעבר הרחוק","את גיל המבנים השכנים בלבד"],c:0,e:"פגיעה בכבל חשמל תת-קרקעי או בצינור גז במהלך חפירה היא סכנת חיים מיידית. יש לאתר תשתיות תת-קרקעיות מול הגורמים המוסמכים ולסמנן לפני תחילת החפירה, ולנקוט שיטות עבודה זהירות בקרבתן.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:3,q:"חופרים בסמוך ליסודות של מבנה קיים, מתחת למפלס ביסוסו. מה נדרש?",a:["תמיכה/חיזוק של היסודות לפי הנחיות מהנדס לפני העמקת החפירה","הודעה לשכנים בלבד","חפירה מהירה כדי לקצר את משך הסיכון","הרטבת הקרקע למניעת אבק"],c:0,e:"חפירה מתחת למפלס ביסוס של מבנה סמוך עלולה לגרום לשקיעתו או לקריסתו. נדרש תכנון הנדסי של תמיכות (Underpinning) וביצוע לפי הנחיות מהנדס.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:2,q:"באיזה שלב מסירים את הדיפון מתעלה שהעבודה בה הסתיימה?",a:["בהדרגה, תוך כדי מילוי חוזר, ובאופן שאינו מסכן עובדים","בבת אחת לפני המילוי כדי לחסוך זמן","משאירים את הדיפון בקרקע תמיד","רק לאחר אישור מפקח עבודה אזורי"],c:0,e:"פירוק הדיפון ייעשה בהדרגה ובמקביל למילוי החוזר, כך שדפנות התעלה לא יישארו חשופות ללא תמיכה כשעובדים בתוכה או בקרבתה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
