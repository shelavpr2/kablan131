{t:"חפירות ודיפון",d:3,q:"מי רשאי לקבוע ששיפוע דפנות החפירה מבטיח יציבות ומייתר דיפון, במקרה של ספק לגבי טיב הקרקע?",a:["מהנדס, על סמך בחינת תנאי הקרקע","כל עובד ותיק באתר","נציג חברת כוח האדם","ספק כלי החפירה"],c:0,e:"קביעת שיפוע בטוח תלויה בסוג הקרקע, לחותה ועומסים סמוכים – שיקול הנדסי-גיאוטכני. בכל מקרה של ספק נדרשת הכרעה מקצועית של מהנדס, לא הערכה של גורם בלתי מוסמך.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:2,q:"גידור חפירה באתר נדרש בעיקר כדי:",a:["למנוע נפילת אדם לתוכה, לרבות עוברי אורח וילדים","לסמן את גבול המגרש","למנוע כניסת בעלי חיים בלבד","לשמור על ניקיון החפירה"],c:0,e:"חפירות ובורות הם מפגע נפילה חמור – לעובדים ולציבור. התקנות מחייבות גידור יציב ומחסומים, ובלילה גם תאורת אזהרה אדומה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:3,q:"בתעלה מדופנת, עד איזה מרחק מתחתית התעלה (או מעליה) צריך הדיפון להגיע ביחס לפני הקרקע?",a:["הדיפון צריך לבלוט מעל פני הקרקע כדי למנוע נפילת חומר וכלים לתוך התעלה","הדיפון נדרש רק עד מחצית גובה הדופן","הדיפון מסתיים 30 ס\"מ מתחת לפני הקרקע","אין דרישה לגבי קצה הדיפון העליון"],c:0,e:"דיפון הבולט מעל שפת התעלה (לוח רגל) מונע הידרדרות אבנים, עפר וכלי עבודה על ראשי העובדים בתוכה – בנוסף לתפקידו בתמיכת הדפנות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:2,q:"עובד הבחין בסדקים חדשים בקרקע לאורך שפת החפירה. מה הצעד הנכון?",a:["להפסיק מיד את העבודה בחפירה, להרחיק עובדים ולדווח למנהל העבודה לבדיקה","להמשיך לעבוד ולעקוב אחרי הסדקים","לכסות את הסדקים בעפר","לצלם ולהמשיך בעבודה"],c:0,e:"סדקים מקבילים לשפת חפירה הם סימן מובהק לתחילת כשל וקריסת דופן. התגובה הנדרשת היא פינוי מיידי של העובדים מהחפירה ובדיקה בידי מנהל העבודה (ובמידת הצורך מהנדס) לפני חידוש העבודה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות; עקרונות בטיחות בחפירות – מינהל הבטיחות"},
{t:"חפירות ודיפון",d:3,q:"חפירה צרה ועמוקה (תעלה) נחשבת מסוכנת יותר מחפירה רחבה באותו עומק, בעיקר משום ש:",a:["לעובד אין דרך מילוט צידית וקריסת דופן קוברת אותו מיידית","קשה להכניס אליה כלים","היא מתמלאת מים מהר יותר","היא דורשת יותר עובדים"],c:0,e:"בתעלה צרה העובד כלוא בין שתי דפנות; קריסה של קוב עפר בודד (כ-1.5 טון ויותר) קוברת אדם בשניות ללא אפשרות חילוץ עצמי. לכן הדרישות לדיפון ולדרכי מילוט בתעלות מחמירות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות; הנחיות מינהל הבטיחות"},
{t:"חפירות ודיפון",d:2,q:"כלי רכב פורק חומר בסמוך לשפת חפירה. מה האמצעי הנדרש למניעת הידרדרותו לתוכה?",a:["הצבת מחסום/סד עצירה (עצר גלגלים) במרחק בטוח משפת החפירה","הצבת עובד שיסמן לנהג בעמידה על שפת החפירה","פיזור חצץ על שפת החפירה","אין צורך באמצעי אם הנהג מנוסה"],c:0,e:"רכב המתקרב בנסיעה לאחור לשפת חפירה עלול להידרדר לתוכה או למוטט את הדופן ממשקלו. נדרש עצר (מחסום) פיזי במרחק בטוח מהשפה, ואסור להציב מכוון בנקודת הסכנה עצמה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:3,q:"בור ספיגה ישן התגלה באתר ויש לעבוד בתוכו. מהי הסכנה הייחודית ומה נדרש לפני כניסה?",a:["אטמוספרה מסוכנת (גזים, חוסר חמצן) – נדרשת בדיקת אוויר ואוורור לפני כניסה, בהתאם לכללי מקום מוקף","סכנת רעש בלבד – נדרשות אטמי אוזניים","סכנת חום – נדרשת שתייה מרובה","אין סכנה מיוחדת מעבר לבור רגיל"],c:0,e:"בורות ספיגה, שוחות ביוב ובורות סגורים הם 'מקום מוקף': עלולים להצטבר בהם גזים רעילים/נפיצים או מחסור בחמצן. כניסה מותרת רק לאחר בדיקת אטמוספרה, אוורור ונקיטת סידורי חילוץ לפי פקודת הבטיחות בעבודה.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 – הוראות מקום מוקף"},
{t:"קווי חשמל",d:2,q:"מהו המרחק המזערי שיש לשמור בין כל חלק של ציוד או אדם לבין קו חשמל עילי במתח עד 33 ק\"ו?",a:["3.25 מטרים","5 מטרים","1.5 מטרים","10 מטרים"],c:0,e:"בקווי חשמל עיליים במתח עד 33 ק\"ו המרחק המזערי הנדרש הוא 3.25 מטרים; בקווים שמתחם עולה על 33 ק\"ו – 5 מטרים. מתחת למרחקים אלה קיימת סכנת קשת חשמלית גם ללא מגע ישיר.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – עבודה בקרבת קווי חשמל"},
{t:"קווי חשמל",d:2,q:"עגורן צריך לפעול במרחק קטן מהמרחק המזערי מקו חשמל עילי במתח גבוה. מה הפתרון התקין?",a:["ניתוק הקו, או בידודו/הצבת מחיצות מגן – בתיאום עם חברת החשמל – לפני תחילת העבודה","עבודה איטית ובזהירות של מפעיל מנוסה","עבודה בשעות הלילה כשהצריכה נמוכה","הרטבת הקרקע סביב העגורן"],c:0,e:"כשאי אפשר לשמור על מרחקי הבטיחות, התקנות מחייבות הסדרה מראש מול חברת החשמל: ניתוק המתח, בידוד הקו או התקנת מחיצות/גדרות מגן. מהירות עבודה או ניסיון המפעיל אינם מגינים מקשת חשמלית.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – עבודה בקרבת קווי חשמל"},
{t:"קווי חשמל",d:3,q:"מהו 'מתח נמוך מאוד' לעניין תאורה וכלי עבודה מיטלטלים במקומות לחים או מוקפים?",a:["מתח שאינו עולה על 50 וולט","מתח שאינו עולה על 230 וולט","מתח שאינו עולה על 110 וולט","כל מתח בזרם ישר"],c:0,e:"'מתח נמוך מאוד' מוגדר כמתח שאינו עולה על 50 וולט. בתנאי סיכון מוגבר (רטיבות, מקום מוקף, מגע עם מתכת) נדרש שימוש בתאורה וכלים במתח נמוך מאוד או באמצעי הגנה שווי ערך.",s:"חוק החשמל, התשי\"ד-1954 ותקנותיו; תקנות הבטיחות בעבודה (חשמל), התש\"ן-1990"},
{t:"קווי חשמל",d:2,q:"מי מוסמך להתקין מתקן חשמל ארעי באתר בנייה?",a:["חשמלאי בעל רישיון מתאים לפי חוק החשמל","מנהל העבודה","כל עובד שעבר הדרכת בטיחות בחשמל","טכנאי מיזוג אוויר"],c:0,e:"התקנת מתקן חשמל, לרבות מתקן ארעי באתר בנייה, היא 'עבודת חשמל' המותרת רק לבעל רישיון חשמלאי מתאים לפי חוק החשמל. מנהל עבודה או עובד מודרך אינם מוסמכים לכך.",s:"חוק החשמל, התשי\"ד-1954; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"קווי חשמל",d:3,q:"באיזו תדירות יש ללחוץ על לחצן הבדיקה של מפסק מגן (ממסר פחת) באתר, ומי רשאי לבצע זאת?",a:["אחת לשבוע לפחות; הבדיקה בלחצן יכולה להתבצע גם בידי מי שאינו חשמלאי","אחת ליום בידי חשמלאי בלבד","אחת לשנה בידי בודק מוסמך","אין צורך בבדיקה שוטפת"],c:0,e:"בדיקת תקינות באמצעות לחצן הבדיקה נעשית אחת לשבוע לפחות, ופעולה זו אינה דורשת חשמלאי. בנוסף נדרשת בדיקה באמצעות מכשיר בדיקה אחת לשלושה חודשים – וזו תיעשה בידי חשמלאי.",s:"תקנות הבטיחות בעבודה (חשמל), התש\"ן-1990"},
{t:"קווי חשמל",d:3,q:"בדיקת מפסק מגן (פחת) באמצעות מכשיר בדיקה נדרשת:",a:["אחת לשלושה חודשים, בידי חשמלאי","אחת לשבוע, בידי מנהל העבודה","אחת לחמש שנים, בידי חברת החשמל","רק לאחר תקלה"],c:0,e:"מעבר לבדיקת הלחצן השבועית, נדרשת בדיקה תקופתית של מפסק המגן באמצעות מכשיר בדיקה אחת לשלושה חודשים, והיא תבוצע בידי חשמלאי מוסמך לכך.",s:"תקנות הבטיחות בעבודה (חשמל), התש\"ן-1990"},
{t:"קווי חשמל",d:2,q:"כבל הזנה זמני באתר חוצה דרך שבה נעים כלי רכב. כיצד יוגן?",a:["הטמנה, הגבהה או הגנה מכנית מתאימה למניעת פגיעת רכב בכבל","הנחת הכבל על הקרקע עם סימון בצבע","קשירת הכבל לגדר בגובה מטר","אין צורך בהגנה אם הכבל מבודד"],c:0,e:"כבל חשמל החוצה נתיב תנועה חייב הגנה מפני פגיעה מכנית – הטמנה בשרוול, הגבהה מעל גובה הרכבים או מיגון פיזי. בידוד הכבל לבדו אינו עומד במעיכת גלגלים וזחלים.",s:"תקנות הבטיחות בעבודה (חשמל), התש\"ן-1990; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"קווי חשמל",d:3,q:"משאית הרמה (מנוף) נגעה בקו מתח עילי והנהג נותר בתא. מה ההנחיה הנכונה עבורו כל עוד אין סכנת שריפה?",a:["להישאר בתוך התא ולא לגעת בו-זמנית ברכב ובקרקע, עד לניתוק הקו בידי חברת החשמל","לקפוץ מיד מהתא ולרוץ","לרדת לאט במדרגות הרכב","לגעת בקרקע ברגל אחת תחילה לבדיקה"],c:0,e:"הרכב נמצא בפוטנציאל חשמלי; מגע בו-זמני ברכב ובקרקע יוצר מסלול זרם דרך הגוף. ההנחיה: להישאר בתא ולהרחיק אנשים, עד ניתוק הקו. אם חייבים לנטוש (שריפה) – לקפוץ בשתי רגליים צמודות בלי לגעת ברכב ולהתרחק בצעדים קטנים.",s:"הנחיות בטיחות בעבודה בקרבת קווי חשמל – מינהל הבטיחות וחברת החשמל"},
{t:"קווי חשמל",d:2,q:"לוח חשמל זמני באתר בנייה חייב להיות:",a:["מוגן מפני מים ופגיעות, סגור, ומחוברים בו מפסקי מגן (פחת) למעגלים","פתוח לגישה מהירה של כל עובד","מוצב בתוך מחסן כלים נעול שאין אליו גישה","מחובר ישירות ללא הגנות לחיסכון באנרגיה"],c:0,e:"לוח זמני באתר יהיה מוגן מפגעי מזג אוויר ופגיעה מכנית, דלתו סגורה, והמעגלים יוגנו במפסקי מגן ברגישות מתאימה. נדרשת גם גישה מהירה לניתוק חירום – ולכן אסור לנעול אותו באופן המונע ניתוק.",s:"תקנות הבטיחות בעבודה (חשמל), התש\"ן-1990; חוק החשמל ותקנותיו"},
{t:"קווי חשמל",d:3,q:"מתכננים עבודות באזור שבו עוברים כבלי חשמל תת-קרקעיים. מה הפעולה הראשונה הנדרשת?",a:["איתור וסימון תוואי הכבלים בתיאום עם חברת החשמל לפני תחילת החפירה","חפירה זהירה בכלי מכני קטן","חפירה רק בשעות היום","הנחת לוחות פלדה על הקרקע"],c:0,e:"לפני חפירה באזור החשוד בתשתיות חשמל יש לקבל מחברת החשמל את תוואי הכבלים, לסמנו, ובקרבתו לחפור בעבודת ידיים זהירה. פגיעת כף מחפר בכבל מתח גבוה קטלנית.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; הנחיות חברת החשמל ומינהל הבטיחות"},
{t:"עגורנים ומתקני הרמה",d:2,q:"באיזו תדירות חייב בודק מוסמך לבדוק עגורן ולתת תסקיר?",a:["אחת ל-14 חודשים לפחות, וכן לאחר הקמה או שינוי מהותי","אחת ל-6 חודשים","אחת ל-5 שנים","רק לאחר תאונה"],c:0,e:"מכונת הרמה, ובכלל זה עגורן, טעונה בדיקת בודק מוסמך לפחות אחת ל-14 חודשים, וכן לאחר התקנתה במקום או שינוי מהותי. התסקיר נשמר וזמין לעיון המפקח.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 – מכונות הרמה"},
{t:"עגורנים ומתקני הרמה",d:2,q:"באיזו תדירות נבדקים אבזרי הרמה (שרשרות, כבלים, אונקלים, רתמות) בידי בודק מוסמך?",a:["אחת ל-6 חודשים לפחות","אחת ל-14 חודשים","אחת לשבוע","אחת ל-3 שנים"],c:0,e:"אבזרי הרמה טעונים בדיקה תקופתית של בודק מוסמך אחת לשישה חודשים לפחות – תדירות גבוהה ממכונת ההרמה עצמה, בשל הבלאי המהיר והקריטיות שלהם בשרשרת ההרמה.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 – אבזרי הרמה"},
{t:"עגורנים ומתקני הרמה",d:2,q:"מה חייב להיות מסומן על כל עגורן ואבזר הרמה באופן ברור?",a:["עומס העבודה הבטוח (ע.ע.ב)","שם היצרן בלבד","שנת הייצור בלבד","שם מנהל העבודה"],c:0,e:"על כל מכונת הרמה ואבזר הרמה יסומן עומס העבודה הבטוח. בעגורן בעל זרוע משתנה – טבלת עומסים לפי המפתח (רדיוס). חריגה מהעומס הבטוח אסורה.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 – מכונות ואבזרי הרמה"},
{t:"עגורנים ומתקני הרמה",d:2,q:"מתי חובה להעסיק אתת (מאותת) בעבודת עגורן?",a:["כאשר אין למפעיל העגורן קשר עין מלא עם המטען לאורך כל מסלולו","בכל הרמה, ללא תלות בתנאים","רק בהרמת מטענים מעל 5 טון","רק בעגורן צריח"],c:0,e:"כשהעגורנאי אינו רואה את המטען בכל שלבי ההרמה וההובלה, חובה להציב אתת מוסמך שיכוון אותו בסימנים מוסכמים או בקשר. תקנות העגורנאים מסדירות את הסמכת האתתים.",s:"תקנות הבטיחות בעבודה (עגורנאים, מפעילי מכונות הרמה אחרות ואתתים), התשנ\"ג-1992"},
{t:"עגורנים ומתקני הרמה",d:2,q:"מי רשאי להפעיל עגורן צריח באתר בנייה?",a:["עגורנאי בעל הסמכה תקפה לסוג העגורן הרלוונטי","כל עובד שעבר חפיפה מהעגורנאי הקודם","מנהל העבודה מתוקף תפקידו","טכנאי מטעם ספק העגורן, ללא הסמכת עגורנאי"],c:0,e:"הפעלת עגורן מותרת רק למי שבידו הסמכת עגורנאי תקפה מהסוג המתאים (עגורן צריח – סוג ב'). ההסמכות מוגדרות בתקנות העגורנאים לפי סוגי העגורנים.",s:"תקנות הבטיחות בעבודה (עגורנאים, מפעילי מכונות הרמה אחרות ואתתים), התשנ\"ג-1992"},
{t:"עגורנים ומתקני הרמה",d:3,q:"מה הדין לגבי הרמת אדם באמצעות עגורן?",a:["אסורה, אלא בסל הרמה ייעודי ותקני שאושר לכך ובתנאים שנקבעו","מותרת אם האדם קשור לאונקל ברתמה","מותרת עד גובה 6 מטרים","מותרת בהוראת מנהל העבודה בכל אמצעי"],c:0,e:"אסור להרים בני אדם בכף, על המטען או באבזרי הרמה רגילים. הרמת אדם מותרת רק בסל/במת הרמה ייעודית העומדת בדרישות, שנבדקה ואושרה, ובנקיטת אמצעי הבטיחות שנקבעו.",s:"פקודת הבטיחות בעבודה ותקנותיה; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"עגורנים ומתקני הרמה",d:3,q:"מתי יש להפסיק את עבודת עגורן הצריח בשל רוח?",a:["כאשר מהירות הרוח מגיעה לסף שקבע יצרן העגורן בהוראות ההפעלה","רק כאשר נשבר חפץ מהעגורן","כאשר העובדים בשטח חשים אי-נוחות","בכל רוח מעל 10 קמ\"ש"],c:0,e:"סף הרוח להפסקת עבודה נקבע בהוראות היצרן לכל דגם עגורן (ערכים שונים להרמה ולמצב סופה). על העגורנאי ומנהל העבודה לעקוב אחר מד הרוח ולפעול לפי הוראות היצרן, כולל שחרור הזרוע לסיבוב חופשי בסערה.",s:"הוראות יצרן; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – ציוד מכני"},
{t:"עגורנים ומתקני הרמה",d:2,q:"האם מותר להעביר מטען מורם מעל ראשי עובדים באתר?",a:["לא – יש לתכנן את מסלול ההנפה כך שלא יעבור מעל אנשים, ולהרחיק עובדים מהמסלול","כן, אם המטען קשור היטב","כן, אם גובה המטען מעל 10 מטרים","כן, בהנפות קצרות בלבד"],c:0,e:"נפילת מטען או חלק ממנו היא גורם תאונות קטלני. אסור להעביר מטענים מעל בני אדם; מתכננים את מסלול ההנפה מראש ומפנים את האזור שמתחתיו.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; פקודת הבטיחות בעבודה – מכונות הרמה"},
{t:"עגורנים ומתקני הרמה",d:3,q:"היכן נשמרים תסקירי הבדיקה של בודק מוסמך לעגורן הפועל באתר?",a:["באתר, זמינים לעיון מפקח עבודה, כחלק מתיעוד הציוד והפנקס הכללי","במשרדי הבודק המוסמך בלבד","במשרד הפנים","אין חובת שמירה לאחר הבדיקה"],c:0,e:"תסקירי בדיקה של מכונות הרמה יישמרו ויהיו זמינים להצגה למפקח עבודה. באתר בנייה נהוג לצרפם לתיעוד שליד הפנקס הכללי, כראיה לכשירות הציוד.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970; תקנות מסירת מידע למפקח"},
{t:"עגורנים ומתקני הרמה",d:3,q:"שני עגורני צריח פועלים באתר וזרועותיהם עלולות להצטלב. מה נדרש?",a:["תיאום גבהים ונוהל עבודה משותף למניעת התנגשות, לרבות אמצעי תיאום בין העגורנאים","אין דרישה – העגורנאים יסתדרו בזמן אמת","הפעלת עגורן אחד בלבד בכל יום","הנמכת שני העגורנים לגובה זהה"],c:0,e:"בחפיפת תחומי עבודה של עגורנים נדרש תכנון: הפרשי גובה בין הזרועות, נוהל תיאום וקשר בין העגורנאים, ולעיתים מערכות מניעת התנגשות. היעדר תיאום גרם לתאונות קשות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; הנחיות מינהל הבטיחות לעגורני צריח"},
{t:"עבודות הריסה",d:2,q:"בהשגחת מי תתבצע עבודת הריסה של מבנה?",a:["בהשגחתו הישירה של מנהל עבודה","בהשגחת שומר האתר","בהשגחת נציג העירייה","ללא השגחה אם הקבלן מנוסה"],c:0,e:"התקנות מחייבות שעבודות הריסה יבוצעו בהנהלתו ובהשגחתו הישירה של מנהל עבודה, בשל רמת הסיכון הגבוהה והצורך בסדר הריסה מבוקר.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:2,q:"מה חובה לעשות בתשתיות (חשמל, גז, מים) לפני תחילת הריסת מבנה?",a:["לנתקן ממקורותיהן, ובמידת הצורך בתיאום עם הרשויות והחברות המספקות","להשאירן פעילות לצורכי העבודה","לנתק רק את החשמל ולהשאיר גז ומים","לנתקן רק ביום ההריסה הסופי"],c:0,e:"לפני הריסה יש לנתק חשמל, גז, מים וקווים אחרים – חשמל חי וצנרת גז במבנה נהרס הם סכנת התחשמלות ופיצוץ. אם נדרש חשמל לעבודה, יותקן מתקן ארעי מוגן ונפרד.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:2,q:"כיצד מאבטחים את סביבת מבנה העומד להריסה מפני כניסת אנשים?",a:["גידור האזור המסוכן, הצבת שלטי אזהרה ומניעת גישה של מי שאינו מועסק בהריסה","הצבת שלט אחד בכניסה הראשית","סימון בסרט פלסטיק בלבד","הודעה ברמקול פעם ביום"],c:0,e:"סביב מבנה נהרס נוצר אזור נפילת חלקים. נדרש גידור יציב של תחום הסכנה, שילוט אזהרה, ואיסור כניסה לכל מי שאינו עוסק בעבודה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:3,q:"האם מותר להעסיק עובדים בקומות שונות של מבנה נהרס, זה מעל זה?",a:["לא – אסור להעסיק עובדים במפלסים שונים באותו אנך, מחשש לנפילת חומרים וחלקי מבנה","כן, אם המרחק האנכי מעל 3 מטרים","כן, אם העליון עובד בכלים ידניים בלבד","כן, בתיאום קולי ביניהם"],c:0,e:"בעת הריסה נופלים שברים, אבנים וחלקי מבנה. העסקת עובדים במפלס תחתון מתחת לעובדים במפלס עליון באותו אנך אסורה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:3,q:"מה הכלל לגבי הפלת חלקי מבנה כבדים על תקרות המבנה הנהרס?",a:["אסור להפיל חלקים על תקרה באופן העלול לגרום לקריסתה – אין להעמיס עליה מעבר לכושר נשיאתה","מותר אם התקרה מבטון מזוין","מותר עד גובה הפלה של 2 מטרים","מותר אם אין עובדים בקומה שמתחת"],c:0,e:"תקרות מבנה ישן אינן מתוכננות לעומסי הלם של חומר נופל; הפלת קירות וחלקים כבדים עליהן עלולה למוטט את התקרה ואת העובדים שעליה. ההריסה תתבצע בסדר מבוקר ובפינוי שוטף של הפסולת.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:2,q:"עובד מפרק קיר בעבודת ידיים. היכן אסור לו לעמוד?",a:["על הקיר הנהרס עצמו או על חלק מבנה העלול לקרוס עמו","על פיגום סמוך לקיר","על רצפה יציבה במרחק מהקיר","על במת הרמה תקנית"],c:0,e:"עמידה על האלמנט הנהרס עצמו פירושה נפילה יחד איתו. ההריסה תיעשה ממשטח עבודה יציב ובטוח (פיגום, במה) ולא מהקיר או מהחלק המיועד להריסה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:3,q:"כיצד מפנים פסולת בניין מקומות עליונות של מבנה נהרס באופן תקין?",a:["באמצעות מגלשות (שנאטות) סגורות או אמצעי הורדה מבוקר – אסור להשליך חופשית למפלס הקרקע","בהשלכה חופשית מהחלונות לאחר אזהרה קולית","בהשארת הפסולת על התקרות עד תום ההריסה","בפיזור הפסולת על גרם המדרגות"],c:0,e:"השלכה חופשית של פסולת יוצרת רסס, אבק וסכנת פגיעה. הפינוי ייעשה במגלשות סגורות אל מכולה/אזור גדור, או בהורדה מבוקרת. הצטברות פסולת על תקרות מסכנת בקריסה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:2,q:"איזה אמצעי נדרש לצמצום מפגע האבק בעבודות הריסה?",a:["הרטבה (התזת מים) של החומר הנהרס והפסולת","עבודה בשעות חמות שבהן האבק שוקע","שימוש במאווררים לפיזור האבק","אין דרישה לטיפול באבק"],c:0,e:"אבק הריסה מסכן את דרכי הנשימה ואת הראות באתר. הרטבת החומר הנהרס מקובלת וחיונית, בנוסף לציוד מגן נשימתי לפי הצורך (ובדגש מיוחד כשיש חשד לאסבסט – אז נדרשים כללים נפרדים).",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:3,q:"לפני תחילת הריסה של מבנה שניזוק (למשל בשריפה או רעידת אדמה), מה נדרש?",a:["בחינה הנדסית של יציבות המבנה וקביעת שיטת הריסה וסדר פעולות, בידי גורם מוסמך","הריסה מהירה ככל האפשר לפני קריסה עצמית","הסרת הגג בלבד והמתנה","כיסוי המבנה ביריעות"],c:0,e:"מבנה פגוע עלול לקרוס באופן בלתי צפוי במהלך ההריסה. נדרשת בדיקה הנדסית מוקדמת של מצב המבנה, קביעת שיטת ההריסה, סדר השלבים, ותמיכות זמניות במידת הצורך.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות; הנחיות מינהל הבטיחות"},
{t:"עבודות הריסה",d:3,q:"במהלך הריסה התגלה חומר החשוד כאסבסט. מה הפעולה הנדרשת?",a:["הפסקת העבודה באזור והמשך טיפול רק לפי חוק האסבסט – באמצעות קבלן אסבסט בעל רישיון ובאישור הגורמים המוסמכים","ריסוק החומר והרטבתו וערבובו בפסולת הרגילה","פינוי מהיר בשקיות רגילות","המשך עבודה עם מסכות אבק פשוטות"],c:0,e:"עבודות באסבסט מוסדרות בחוק נפרד ומחייבות קבלן אסבסט מורשה, תוכנית עבודה ואישורים. המשך הריסה רגילה או פינוי עצמאי של אסבסט אסורים ומסכנים את העובדים והסביבה.",s:"החוק למניעת מפגעי אסבסט ואבק מזיק, התשע\"א-2011; תקנות הבטיחות בעבודה (גיהות תעסוקתית ובריאות הציבור והעובדים באבק מזיק)"},
{t:"תאונות עבודה וחקירה",d:2,q:"עובד נהרג בתאונה באתר. תוך כמה זמן ולמי יש להודיע?",a:["מיד, למפקח העבודה האזורי","תוך 3 ימים, לרשם הקבלנים","תוך שבוע, לביטוח הלאומי בלבד","תוך 24 שעות, לעירייה"],c:0,e:"פקודת תאונות ומחלות משלח-יד (הודעה), 1945 מחייבת הודעה מיידית למפקח העבודה האזורי על תאונת עבודה שגרמה למוות. בנוסף קיימות חובות דיווח למשטרה ולמוסד לביטוח לאומי, אך החובה המיידית לפי הפקודה היא למפקח האזורי.",s:"פקודת תאונות ומחלות משלח-יד (הודעה), 1945, סעיף 3"},
{t:"תאונות עבודה וחקירה",d:2,q:"עובד נפצע ונעדר מעבודתו 5 ימים. האם קיימת חובת הודעה למפקח עבודה אזורי?",a:["כן – תאונה שגרמה לאי-כושר עבודה של יותר מ-3 ימים מחייבת הודעה","לא – חובת הודעה קיימת רק במקרה מוות","רק אם העובד פנה לבית חולים","רק אם העובד דורש זאת"],c:0,e:"הפקודה מחייבת הודעה למפקח האזורי על תאונת עבודה שבעקבותיה נבצר מהעובד לעבוד למעלה משלושה ימים, ולא רק על תאונות קטלניות.",s:"פקודת תאונות ומחלות משלח-יד (הודעה), 1945"},
{t:"תאונות עבודה וחקירה",d:3,q:"לאחר תאונה קטלנית באתר, מה הדין לגבי זירת התאונה?",a:["אין לשנות את הזירה ואת מצב הציוד עד לסיום בדיקת מפקח העבודה (ו/או המשטרה), אלא לצורך הצלת חיים או מניעת סכנה","יש לפנות מיד את הציוד כדי לחדש עבודה","יש לנקות את האזור מטעמי כבוד המת","מותר לשנות הכל לאחר צילום בטלפון"],c:0,e:"שימור הזירה חיוני לחקירת הגורמים. שינוי מותרת רק לצורך חילוץ והצלה או מניעת סכנה נוספת. שיבוש זירה עלול להיחשב שיבוש חקירה.",s:"פקודת הבטיחות בעבודה; נוהלי חקירת תאונות – מינהל הבטיחות"},
{t:"תאונות עבודה וחקירה",d:2,q:"היכן באתר מתועדות תאונות עבודה שאירעו בו?",a:["בפנקס הכללי של האתר","ביומן האישי של הקבלן בלבד","בקבוצת הוואטסאפ של האתר","אין חובת תיעוד באתר"],c:0,e:"הפנקס הכללי משמש לרישום אירועים מהותיים באתר, ובכלל זה תאונות עבודה, בנוסף לחובות ההודעה החיצוניות למפקח האזורי ולמוסדות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; פקודת הבטיחות בעבודה – הפנקס הכללי"},
{t:"תאונות עבודה וחקירה",d:2,q:"מהו טופס בל-250?",a:["טופס למתן טיפול רפואי לנפגע עבודה, המוגש למוסד לביטוח לאומי","טופס מינוי מנהל עבודה","תסקיר בודק מוסמך","צו הפסקת עבודה"],c:0,e:"בל-250 הוא הטופס שבאמצעותו מפנה המעסיק נפגע עבודה (שכיר) לקבלת טיפול רפואי במסגרת ביטוח נפגעי עבודה של המוסד לביטוח לאומי.",s:"חוק הביטוח הלאומי [נוסח משולב], התשנ\"ה-1995 – ענף נפגעי עבודה"},
{t:"תאונות עבודה וחקירה",d:3,q:"אילו סמכויות נתונות למפקח עבודה החוקר תאונה?",a:["כניסה לאתר בכל עת, חקירת אנשים, דרישת מסמכים ונטילת דגימות/חפצים הדרושים לחקירה","מעצר חשודים והגשת כתבי אישום בעצמו","שלילת רישיון הקבלן לצמיתות במקום","פסיקת פיצויים לנפגע"],c:0,e:"חוק ארגון הפיקוח על העבודה מקנה למפקח סמכויות כניסה, חקירה (לרבות גביית עדויות), דרישת מסמכים ונטילת מוצגים. מעצר והעמדה לדין הם בסמכות המשטרה והתביעה; שלילת רישיון – בסמכות רשם הקבלנים; פיצויים – בסמכות בתי המשפט והביטוח הלאומי.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954 – סמכויות מפקח עבודה"},
{t:"תאונות עבודה וחקירה",d:3,q:"מהי המטרה העיקרית של חקירת תאונת עבודה על ידי הגורמים המקצועיים באתר?",a:["איתור הגורמים והכשלים והפקת לקחים למניעת הישנות תאונות דומות","מציאת עובד אשם להטלת קנס מיידי","הקטנת תשלומי הביטוח","יצירת תיעוד לתקשורת"],c:0,e:"חקירה בטיחותית מקצועית מתמקדת בגורמי השורש – כשלי ניהול, נהלים, ציוד והדרכה – כדי למנוע את התאונה הבאה. ייחוס אשמה אישית הוא עניין להליכים משפטיים נפרדים.",s:"עקרונות חקירת תאונות – מינהל הבטיחות והבריאות התעסוקתית; תקנות תוכנית לניהול הבטיחות, התשע\"ג-2013"},
{t:"תאונות עבודה וחקירה",d:3,q:"'כמעט תאונה' (אירוע מסוכן ללא נפגעים) באתר – מה היחס הנכון אליה במערך ניהול הבטיחות?",a:["דיווח, תיעוד ותחקיר – כי היא מתריעה על כשל שעלול לגרום לתאונה אמיתית","התעלמות – לא נפגע איש ולכן אין משמעות","ענישת העובד המעורב בלבד","דיווח רק אם נגרם נזק לציוד יקר"],c:0,e:"כמעט-תאונות הן 'אות אזהרה' מקדים. תוכנית ניהול בטיחות תקינה כוללת דיווח ותחקור אירועים מסוכנים גם ללא נפגעים, לזיהוי כשלים לפני שיגבו מחיר בחיי אדם.",s:"תקנות ארגון הפיקוח על העבודה (תוכנית לניהול הבטיחות), התשע\"ג-2013; הנחיות מינהל הבטיחות"},
{t:"תאונות עבודה וחקירה",d:3,q:"מפקח עבודה שחקר תאונה מצא ליקוי המסכן עובדים בהמשך העבודה. באיזה כלי מנהלי ישתמש לעצירת הסיכון המיידי?",a:["צו בטיחות (וכן סמכות לצו הפסקת עבודה לפי הדין), האוסר את השימוש במקום או בציוד המסוכן","מכתב המלצה לקבלן","בקשה מנומסת בעל-פה","פנייה לבית משפט בלבד"],c:0,e:"בסכנה מיידית לעובדים מוסמך המפקח להוציא צו בטיחות (וצווי הפסקת עבודה לפי החוק), שתוקפם מיידי וערעור עליהם אינו מעכב את ביצועם – להבדיל מצו שיפור שניתן לליקויים שאינם מחייבים עצירה מיידית.",s:"חוק ארגון הפיקוח על העבודה, התשי\"ד-1954 – צו שיפור וצו בטיחות"},
{t:"תאונות עבודה וחקירה",d:2,q:"מי חייב למסור את ההודעה למפקח העבודה האזורי על תאונה באתר בנייה?",a:["המעסיק (ובאתר בנייה – נושאי התפקיד מטעם המבצע)","הנפגע עצמו בלבד","עד ראייה מזדמן","חברת הביטוח"],c:0,e:"חובת ההודעה לפי פקודת התאונות מוטלת על המעסיק/תופש המפעל. באתר בנייה האחריות מיושמת באמצעות מבצע הבנייה ומנהל העבודה. אי-דיווח הוא עבירה.",s:"פקודת תאונות ומחלות משלח-יד (הודעה), 1945"},
{t:"בעלי תפקידים וסמכויות",d:3,q:"מנהל עבודה נעדר מהאתר ליום אחד בשל מחלה והעבודה נמשכת. מה דין המצב?",a:["יש להבטיח שבעת ביצוע עבודה תהיה השגחה כנדרש – בהיעדר מנהל עבודה ימונה ממלא מקום כשיר או שתופסק עבודה הטעונה השגחתו","העבודה יכולה להימשך כרגיל עד שבוע ללא מנהל עבודה","העובד הוותיק באתר הופך אוטומטית למנהל עבודה","נדרש רק תיאום טלפוני עם מנהל העבודה החולה"],c:0,e:"חובת ההשגחה של מנהל עבודה היא תנאי לביצוע עבודות בנייה. בהיעדרו יש להעמיד מחליף העומד בתנאי הכשירות (ובמינוי כנדרש), או להימנע מביצוע העבודות הטעונות השגחה. 'ניהול מרחוק' בטלפון אינו עונה על דרישת ההשגחה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, תקנות 2-5"},
{t:"פיגומים",d:3,q:"פיגום זקפים מפלדה מתוכנן לגובה 55 מטרים. מה נדרש לפני הקמתו?",a:["תכנון הנדסי של הפיגום בידי מהנדס, והקמה בהתאם לתכניות","אישור רשם הקבלנים","רק בדיקת בונה מקצועי לאחר ההקמה","אין דרישה מיוחדת לפיגום פלדה"],c:0,e:"פיגום פלדה שגובהו עולה על 50 מטרים (ופיגום עץ מעל 18 מטרים) טעון תכנון הנדסי מוקדם בידי מהנדס, וההקמה תבוצע לפי התכנון. בדיקות מנהל העבודה והקמה בידי בונה מקצועי נדרשות בנוסף, לא במקום.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק הפיגומים"},

{t:"טפסות ויציקות בטון",d:2,q:"מהי 'מערכת טפסות' כהגדרתה בתקנות עבודות בנייה?",a:["מערכת המורכבת מלווחים, תמיכות וחיזוקים, המיועדת לשאת בטון טרי ולהעביר את העומסים למשטח נושא","פיגום זמני להחזקת עובדים בלבד","מערכת צנרת להזרמת בטון","תבנית פלדה לייצור אלמנטים במפעל בלבד"],c:0,e:"ההגדרה בתקנות כוללת את שלושת המרכיבים: לווחים (התבנית), תמיכות וחיזוקים — והייעוד: נשיאת הבטון הטרי והעברת כל העומסים שנוצרים ביציקה אל משטח נושא.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — הגדרות ופרק הטפסות"},
{t:"טפסות ויציקות בטון",d:2,q:"בידי מי ובאיזו השגחה יבוצע פירוק מערכת טפסות?",a:["בידי טפסנים בלבד ובהשגחת בונה מקצועי לטפסות","בידי כל פועל באתר בהשגחת המזמין","בידי מהנדס בלבד","בידי קבלן השלד ללא השגחה מיוחדת"],c:0,e:"התקנות קובעות במפורש שפירוק מערכת הטפסות ייעשה בידי טפסנים בלבד ובהשגחת בונה מקצועי, באופן שלא תישקף סכנה לעובדים מחלקי הטפסות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — פרק הטפסות"},
{t:"טפסות ויציקות בטון",d:3,q:"האם מותר להשאיר מערכת טפסות מפורקת בחלקה בסוף יום העבודה?",a:["רק אם החלק הנותר מובטח מפני התמוטטות","כן, ללא תנאי — הפירוק יושלם למחרת","לא בשום מקרה — חובה להשלים את הפירוק באותו יום","רק בחורף"],c:0,e:"התקנות אוסרות השארת מערכת טפסות מפורקת בחלקה, אלא אם כן החלק הנותר מובטח מפני התמוטטות. כמו כן יינקטו אמצעים נגד התמוטטות מקרית בשעת הפירוק ואחריו.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — פרק הטפסות"},
{t:"טפסות ויציקות בטון",d:3,q:"מתי מותר להתחיל בפירוק טפסות ותמיכות של תקרת בטון יצוקה?",a:["רק לאחר שהבטון התחזק די הצורך לשאת את העומסים, ולפי הוראות מנהל העבודה","מיד עם סיום היציקה כדי לחסוך זמן","לאחר 24 שעות בכל מקרה","כשמתפנה צוות הטפסנים, ללא תלות במצב הבטון"],c:0,e:"פירוק מוקדם של תמיכות לפני שהבטון הגיע לחוזק מספיק הוא גורם לקריסות תקרות. הפירוק ייעשה רק כשהבטון מסוגל לשאת את העומסים (בהתאם לסוג האלמנט ותנאי ההתקשות) ובאישור הגורם האחראי באתר.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — פרק הטפסות"},
{t:"טפסות ויציקות בטון",d:3,q:"על מה אחראי מבצע הבנייה בנוגע לטפסה מתועשת (טפסת ענק מורמת בעגורן)?",a:["שתהיה בחוזק ובקשיחות נאותים ושתובטח שלמותה בעת הרמה, טלטול, הרכבה ופירוק, לרבות התקני תליה בטוחים","רק שצבעה יהיה אחיד","שתישקל לפני כל הרמה בלבד","אין לו אחריות — האחריות על יצרן הטפסה בלבד"],c:0,e:"התקנות מטילות על מבצע הבנייה אחריות לחוזק ולקשיחות הטפסה המתועשת ולשלמותה בכל שלבי הטיפול בה, וכן לכך שהתקני התליה — מיקומם, חוזקם וצורתם — ימנעו נפילת המשא או כשל.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — פרק הטפסות"},
{t:"טפסות ויציקות בטון",d:3,q:"במהלך יציקת תקרה מבחין מנהל העבודה בשקיעה קלה של התמיכות. מה הפעולה הנכונה?",a:["הפסקה מיידית של היציקה, פינוי העובדים מהאזור המסוכן ובדיקת המערכת לפני המשך","המשך היציקה בקצב מהיר יותר כדי לסיים לפני החמרה","הוספת בטון באזור השקיעה לאיזון","התעלמות — שקיעה קלה היא תופעה רגילה"],c:0,e:"תזוזה או שקיעה של טפסות בזמן יציקה היא סימן מקדים לכשל מערכת התמיכות. נדרשת עצירה מיידית, הרחקת עובדים ובדיקה הנדסית — קריסת טפסות ביציקה היא מהתאונות הקטלניות בענף.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — פרק הטפסות; לקחי תאונות — מינהל הבטיחות"},
{t:"טפסות ויציקות בטון",d:2,q:"היכן אסור לעובדים להימצא בעת יציקת בטון לתקרה?",a:["מתחת למערכת הטפסות הנושאת את היציקה","על משטח היציקה עצמו","ליד משאבת הבטון","בקומת הקרקע של המבנה"],c:0,e:"שהייה מתחת לטפסות עמוסות בבטון טרי מסכנת חיים — כשל תמיכה יקרוס ישירות על השוהים מתחת. העבודה ביציקה מתבצעת מעל, על משטחי עבודה מאובטחים.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — פרק הטפסות"},
{t:"טפסות ויציקות בטון",d:2,q:"מה יש לעשות בלוחות טפסות שפורקו ויש בהם מסמרים בולטים?",a:["לשלוף או לכופף את המסמרים מיד עם הפירוק ולערום את הלוחות באופן מסודר","להשאירם כפי שהם — המסמרים יידרשו לשימוש חוזר","לפזרם על הרצפה עד לפינוי","לשרוף את הלוחות באתר"],c:0,e:"מסמרים בולטים בלוחות מפוזרים הם גורם שכיח לפציעות דקירה באתרי בנייה. עם הפירוק יש לטפל במסמרים ולערום את החומר באופן שאינו יוצר מכשול.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; סדר וניקיון באתר — הנחיות מינהל הבטיחות"},
{t:"טפסות ויציקות בטון",d:3,q:"מערכת טפסות לתקרה בגובה רב (תמיכות גבוהות במיוחד) — מה נדרש בתכנונה?",a:["תכנון המערכת בידי גורם הנדסי מוסמך והקמתה לפי התכנון, לרבות חיזוקים אופקיים ואלכסוניים ליציבות","אין צורך בתכנון — מספיק ניסיון הטפסנים","הכפלת כמות המסמרים בלבד","שימוש בתמיכות עץ בלבד"],c:0,e:"ככל שגובה התמיכות עולה, גדל סיכון הקריסה מכשל יציבות (קריסת תמיכים). מערכות טפסות גבוהות או מורכבות מחייבות תכנון הנדסי הכולל חיזוקים ומערכי ייצוב, וביצוע נאמן לתכנון.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — פרק הטפסות"},
{t:"טפסות ויציקות בטון",d:2,q:"משטח עבודה ליציקת בטון בגובה (למשל קצה תקרה נוצקת) חייב להיות מצויד ב:",a:["מעקה תקני למניעת נפילת העובדים היוצקים","שטיח גומי","קו צהוב מסומן בלבד","שלט אזהרה בלבד, ללא אמצעי פיזי"],c:0,e:"עובדי היציקה בקצה התקרה חשופים לנפילה מגובה. נדרשים משטחי עבודה תקינים עם מעקות, או אמצעי הגנה אחרים מפני נפילה לפי תקנות עבודה בגובה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; תקנות עבודה בגובה, התשס\"ז-2007"},
{t:"טפסות ויציקות בטון",d:3,q:"בעת שימוש במשאבת בטון עם זרוע (משאבת זרוע), מהי סכנה ייחודית שיש לתת עליה את הדעת?",a:["קרבת הזרוע לקווי חשמל עיליים ותנועות פתאומיות של צינור הקצה","צבע הבטון","רעש המשאבה בלבד","משקל הבטון על המערבל"],c:0,e:"זרוע משאבה מתרוממת לגבהים ועלולה להתקרב לקווי מתח — חובה לשמור על מרחקי הבטיחות. בנוסף, צינור הקצה (הפיל) עלול לנוע בפתאומיות מלחצי שאיבה ולפגוע בעובד האוחז בו.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — עבודה בקרבת חשמל; הנחיות בטיחות במשאבות בטון — מינהל הבטיחות"},
{t:"טפסות ויציקות בטון",d:2,q:"חומרי טפסות (תמיכות מתכת, לווחים) שנמצאו פגומים או מעוותים:",a:["ייפסלו לשימוש ויורחקו, כדי שלא ישולבו בטעות במערכת נושאת","ישומשו בחלקים פחות חשובים של המערכת","יתוקנו בריתוך מאולתר באתר","יוצבעו מחדש להסתרת הפגם"],c:0,e:"תמיכה מעוותת או פגומה מאבדת מכושר הנשיאה שלה ועלולה להיות החוליה שתכשיל את כל המערכת. ציוד פגום נפסל ומורחק; אין 'מקום פחות חשוב' במערכת נושאת בטון טרי.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — פרק הטפסות"},
{t:"פתחים, מעקות ומשטחי עבודה",d:2,q:"כיצד יש לאבטח פתח ברצפת קומה שאדם עלול ליפול דרכו?",a:["בגידור במעקה תקני או בכיסוי יציב ומקובע המסוגל לשאת את העומס, ומסומן","בסימון בצבע בלבד","בהנחת קרש בודד על הפתח","בהצבת שלט ליד הפתח בלבד"],c:0,e:"כל פתח שניתן ליפול דרכו יגודר במעקה או יכוסה בכיסוי חזק, יציב ומקובע נגד הזזה, המסומן באופן בולט. קרש רופף או סימון בלבד אינם מונעים נפילה — וכיסוי לא מקובע הוא מלכודת.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — פתחים ומשטחי עבודה"},
{t:"פתחים, מעקות ומשטחי עבודה",d:3,q:"מהם מרכיביו של מעקה תקני באתר בנייה ומה גובהו?",a:["אזן יד בגובה 90 עד 115 ס\"מ, אזן תיכון, ולוח רגליים בגובה 15 ס\"מ לפחות","אזן יד בודד בגובה 70 ס\"מ","שני חבלים מתוחים בגובה מטר","רשת צל בגובה 120 ס\"מ"],c:0,e:"מעקה תקני באתר כולל שלושה מרכיבים: אזן יד עליון (90-115 ס\"מ), אזן תיכון המונע נפילה דרך הרווח, ולוח רגליים (כ-15 ס\"מ) המונע החלקת אדם וגלישת כלים וחומרים מהמשטח.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — מעקות ומשטחי עבודה"},
{t:"פתחים, מעקות ומשטחי עבודה",d:2,q:"החל מאיזה גובה של משטח עבודה או מדרכת מעבר נדרש גידור במעקה?",a:["מעל 2 מטרים","מעל 4 מטרים","מעל 6 מטרים","רק מעל גובה קומה שלמה"],c:0,e:"משטח עבודה ומדרכת מעבר שמהם ניתן ליפול מגובה העולה על 2 מטרים יגודרו במעקה תקני — בהתאמה לרף הכללי של סיכון נפילה לעניין עבודה בגובה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; תקנות עבודה בגובה, התשס\"ז-2007"},
{t:"פתחים, מעקות ומשטחי עבודה",d:3,q:"מה תפקידו הייחודי של לוח הרגליים במעקה?",a:["למנוע החלקת רגלי עובד מעבר לשפה ונפילת כלים וחומרים מהמשטח על אנשים מתחת","לשמש מדרגה לטיפוס","לחזק את עמודי המעקה בלבד","לסמן את גבול המשטח בצבע"],c:0,e:"לוח הרגליים (Toe board) סוגר את הרווח שבין רצפת המשטח לאזן התיכון — מונע גלישת רגל, ובעיקר מונע נפילת פטישים, ברגים ופסולת על העובדים והעוברים מתחת.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — מעקות"},
{t:"פתחים, מעקות ומשטחי עבודה",d:2,q:"פיר מעלית במבנה בהקמה — כיצד מאובטחים פתחי הפיר בקומות?",a:["גידור או מחסום תקני בכל פתח פיר בכל קומה, מרגע יצירת הפתח ועד התקנת דלתות המעלית","אבטחת הפתח בקומת הקרקע בלבד","סרט סימון אדום-לבן","הצבת שלט בכניסה לבניין"],c:0,e:"פתחי פיר הם מלכודת נפילה לעומק רב. כל פתח פיר בכל קומה יגודר במעקה/מחסום יציב לאורך כל תקופת הביצוע, וכך גם פתחי פירים אנכיים אחרים.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — פתחים"},
{t:"פתחים, מעקות ומשטחי עבודה",d:3,q:"עובד נדרש להסיר זמנית כיסוי פתח לצורך העברת חומרים. מה הנוהל הנכון?",a:["הסרה רק לפרק הזמן ההכרחי, תוך נוכחות והשגחה, והחזרת הכיסוי וקיבועו מיד עם סיום הפעולה","הסרת הכיסוי בתחילת היום והחזרתו בסופו","הסרה והנחת הכיסוי בצד עם שלט","אסור להסיר כיסוי בשום נסיבות"],c:0,e:"פתח חשוף ללא השגחה הוא הסכנה — תאונות רבות אירעו כשעובד נפל לפתח שכיסויו הוסר 'לרגע'. ההסרה תהיה מינימלית בזמן, עם הגנה חלופית/השגחה, והכיסוי יקובע חזרה מיידית.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — פתחים; הנחיות מינהל הבטיחות"},
{t:"פתחים, מעקות ומשטחי עבודה",d:2,q:"מדרכת מעבר (רמפת הליכה) באתר תהיה:",a:["ברוחב מספיק (לא פחות מ-60 ס\"מ), יציבה, עם אמצעים נגד החלקה ומעקה בצדה הפתוח כשיש סכנת נפילה","ברוחב 30 ס\"מ לפחות","עשויה מלוחות מונחים חופשי","תלולה ככל הנדרש ללא מגבלה"],c:0,e:"מדרכות מעבר ורמפות יהיו ברוחב נאות (לפחות 60 ס\"מ), מקובעות, עם שלבי/פסי עצירה נגד החלקה בשיפועים, וגידור בצד הפתוח — כדי לאפשר מעבר בטוח של עובדים, גם כשנושאים חומרים.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — מדרכות מעבר"},
{t:"פתחים, מעקות ומשטחי עבודה",d:2,q:"מה הכלל לגבי סדר וניקיון במשטחי העבודה והמעברים באתר?",a:["יישמרו פנויים ממכשולים, פסולת וחומרים מפוזרים, ופסולת תפונה באופן שוטף","ניקיון נדרש רק לקראת ביקור מפקח","מספיק ניקיון אחת לשבוע","הפסולת נערמת במעברים עד סוף הפרויקט"],c:0,e:"מעידות ונפילות בגלל פסולת ומכשולים הן מקור תאונות שכיח. שמירה על דרכי גישה ומשטחים פנויים היא חובה שוטפת, חלק מאחריות מנהל העבודה לסדרי האתר.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; פקודת הבטיחות בעבודה — סדר וניקיון"},
{t:"פתחים, מעקות ומשטחי עבודה",d:3,q:"באזור שבו מתבצעת עבודה בגובה מעל מעבר פעיל, מה נדרש להגנת העוברים מתחת?",a:["גגון מגן/רשתות לעצירת חפצים נופלים, או חסימת המעבר והכוונת התנועה לנתיב חלופי","שלט 'זהירות עובדים למעלה' בלבד","הנחיה לעוברים ללכת מהר","חלוקת קסדות למבקרים בלבד"],c:0,e:"נפילת חפצים היא סיכון לכל מי שמתחת לאזור עבודה בגובה. הפתרון הוא הנדסי: גגון/סככת מגן, רשתות, או חסימת המעבר — שלט לבדו אינו עוצר פטיש נופל.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — הגנה מפני נפילת חפצים"},
{t:"פתחים, מעקות ומשטחי עבודה",d:3,q:"הוסר מעקה תקני מקצה תקרה לצורך קבלת מטען מעגורן. כיצד מוגנים העובדים בנקודה זו בזמן הפתיחה?",a:["העובדים בקרבת הקצה הפתוח ירתמו ברתמת בטיחות מעוגנת, והמעקה יוחזר מיד בתום הפעולה","העובדים יתרחקו צעד אחד מהקצה","יוצב עובד שיחזיק את חברו בחגורה","אין צורך באמצעי — הפעולה קצרה"],c:0,e:"בקצה פתוח ללא מעקה חוזר סיכון הנפילה במלואו, ולכן נדרשת הגנה אישית חלופית — רתמה מעוגנת לנקודת עיגון מתאימה — למשך כל זמן הפתיחה, והחזרת המעקה מיד בסיום.",s:"תקנות עבודה בגובה, התשס\"ז-2007; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"סולמות",d:2,q:"לאיזה תקן ישראלי נדרש סולם מיטלטל המשמש לעבודה בגובה להתאים?",a:["ת\"י 1847","ת\"י 1142","ת\"י 466","ת\"י 1225"],c:0,e:"תקנות העבודה בגובה קובעות שלא ייעשה שימוש בסולם שאינו קבוע אלא אם הוא עומד בדרישות ת\"י 1847 ומתאים לאופי העבודה (או חלופות מוגדרות בתקנות, כגון סולם מעבר בפיגום לפי ת\"י 1139).",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007 — פרק הסולמות"},
{t:"סולמות",d:2,q:"כמה צריך סולם נסמך לבלוט מעל משטח היציאה (למשל שפת גג) שאליו מטפסים?",a:["מטר אחד לפחות","10 ס\"מ","חצי מטר","אסור שיבלוט כלל"],c:0,e:"בליטה של מטר לפחות מעל מפלס היציאה נותנת לעובד אחיזת יד יציבה במעבר מהסולם למשטח ובחזרה — שלב המעבר הוא הרגע המסוכן ביותר בשימוש בסולם.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007 — פרק הסולמות"},
{t:"סולמות",d:2,q:"מהי זווית ההצבה הנכונה של סולם נסמך?",a:["יחס של כ-1:4 — מרחק הבסיס מהקיר כרבע מגובה ההשענה (כ-75 מעלות)","יחס 1:1 — 45 מעלות","אנכי לחלוטין צמוד לקיר","שטוח ככל האפשר ליציבות"],c:0,e:"זווית של כ-75° (בסיס מרוחק מהקיר רבע מגובה נקודת ההשענה) מאזנת בין סכנת החלקת הבסיס (סולם שטוח מדי) לסכנת התהפכות לאחור (סולם תלול מדי).",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007; הנחיות מינהל הבטיחות לשימוש בסולמות"},
{t:"סולמות",d:3,q:"כיצד חייב סולם נסמך להישען בנקודת ההשענה התחתונה?",a:["על שני זקפיו, בשתי נקודות יציבות","על זקף אחד מספיק","על השלב התחתון","על גלגלות לניידות"],c:0,e:"התקנות קובעות שסולם נסמך יישען על שני זקפיו בשתי נקודות — הישענות על זקף אחד או על שלב יוצרת חוסר יציבות וסכנת התהפכות צידית.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007 — פרק הסולמות"},
{t:"סולמות",d:3,q:"מה דינו של סולם שנפל נפילה בלתי מבוקרת או שונע באמצעות כלי?",a:["המבצע אחראי שייבדק לפני שימוש חוזר, וסולם פגום ייפסל ויימנע השימוש בו","ממשיכים להשתמש בו אם הוא נראה תקין במבט","משתמשים בו רק לעבודות נמוכות","צובעים אותו ומחזירים לשימוש"],c:0,e:"נפילה או טלטול בכלי עלולים ליצור סדקים ועיוותים סמויים בזקפים ובשלבים. התקנות מטילות על המבצע לבדוק סולם לאחר אירוע כזה, ולפסול ולמנוע שימוש בסולמות פגומים.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007 — פרק הסולמות"},
{t:"סולמות",d:3,q:"מדוע אסור לצבוע סולם עץ בצבע אטום?",a:["הצבע מסתיר סדקים ופגמים בעץ ומונע גילוים בבדיקה","הצבע מכביד על הסולם","צבע מחליק את השלבים בלבד","מותר לצבוע — אין כל מגבלה"],c:0,e:"שכבת צבע אטומה מכסה סדקים, קשרים ורקבון בעץ — בדיוק הפגמים שבדיקה חזותית אמורה לגלות. הגנה על עץ הסולם תיעשה בחומר שקוף (לכה) בלבד.",s:"הנחיות בטיחות בסולמות — מינהל הבטיחות; תקנות עבודה בגובה, התשס\"ז-2007"},
{t:"סולמות",d:2,q:"בעת טיפוס על סולם, העובד נדרש לשמור על:",a:["שלוש נקודות מגע עם הסולם (שתי ידיים ורגל או שתי רגליים ויד) ופנים אל הסולם","שתי נקודות מגע מספיקות","גב אל הסולם לירידה מהירה","אחיזת הכלים בשתי הידיים תוך טיפוס"],c:0,e:"שלוש נקודות מגע ופנים אל הסולם הן כלל הזהב לטיפוס בטוח. כלים וחומרים יועלו בחגורת כלים, בתיק או בחבל הרמה — לא בידיים.",s:"הנחיות עבודה בטוחה בסולמות — מינהל הבטיחות; תקנות עבודה בגובה, התשס\"ז-2007"},
{t:"סולמות",d:3,q:"מה קובעות תקנות העבודה בגובה לעניין 'פיגום סולמות' (משטח עבודה הנשען על סולמות)?",a:["המבצע יוודא שלא ייעשה בו שימוש כלל","מותר עד גובה 4 מטרים","מותר אם הסולמות חדשים","מותר בהשגחת מנהל עבודה"],c:0,e:"התקנות אוסרות במפורש שימוש בפיגום סולמות — סולמות אינם מתוכננים לשאת משטחי עבודה אופקיים, והמבנה המאולתר הזה גרם לתאונות קשות.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007"},
{t:"סולמות",d:2,q:"סולם ניצב (סולם 'A') יוצב לעבודה כאשר:",a:["התקן הגבלת המפתח שלו פתוח ונעול במלואו, על משטח יציב ואופקי","הוא שעון על קיר במצב סגור","שתי רגליו על מדרגות","הוא מוגבה על בלוקים להגבהה נוספת"],c:0,e:"סולם ניצב בטוח רק כשהמפתח פתוח במלואו ומנגנון ההגבלה נעול, על קרקע יציבה ומאוזנת. שימוש בו סגור כסולם נסמך, או הגבהתו על בלוקים — אסורים ומסוכנים.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007 — פרק הסולמות"},
{t:"סולמות",d:3,q:"באילו תנאים מותרת עבודה מתוך סולם (להבדיל ממעבר עליו) בלא אמצעי הגנה נוספים מפני נפילה?",a:["בעבודה קצרת מועד ופשוטה, כשמתקיימים תנאי התקנות — ובכל מקרה אחר נדרשים אמצעים כגון רתמה או חלופה בטוחה (פיגום, במת הרמה)","בכל עבודה ובכל משך זמן","רק אם העובד מנוסה מעל 10 שנים","אסור לעולם לעבוד מסולם"],c:0,e:"סולם נועד בעיקרו לגישה; עבודה ממנו מוגבלת לעבודות קצרות ופשוטות בתנאים שבתקנות (כגון שמירת אחיזה ויציבות). לעבודה ממושכת או מאומצת נדרשת חלופה בטוחה — פיגום או במת הרמה — או מיגון אישי מתאים.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007 — פרק הסולמות"},
{t:"גגות שבירים ותלולים",d:2,q:"מהו התנאי הבסיסי לעבודת אדם על גג שביר?",a:["הימצאות על לוח דריכה או לוח זחילה מתאים, המובטח מפני תזוזה ונדנוד","נעליים עם סוליה רכה","משקל גוף מתחת ל-80 ק\"ג","עבודה בשעות הבוקר בלבד"],c:0,e:"התקנות אוסרות עבודה על גג שביר אלא מעל לוח דריכה/זחילה המפזר את המשקל ומונע שבירת הסיכוך, כשהלוח מאובטח נגד תזוזה ונדנוד. דריכה ישירה על לוח אסבסט או פח שביר = נפילה דרך הגג.",s:"תקנות הבטיחות בעבודה (עבודה על גגות שבירים או תלולים), התשמ\"ו-1986"},
{t:"גגות שבירים ותלולים",d:2,q:"מי אחראי לספק לוחות דריכה לעבודה על גג שביר, ובאיזו כמות?",a:["האחראי לפי התקנות יספק לוחות באיכות טובה ובכמות הדרושה ליצירת גישה ממקום העלייה לגג ועד מקום ביצוע העבודה","העובד יביא לוח מביתו","די בלוח אחד שינויד עם העובד","הרשות המקומית מספקת את הלוחות"],c:0,e:"התקנות מחייבות אספקת לוחות דריכה או זחילה באיכות טובה ובכמות שתיצור נתיב בטוח רצוף — מנקודת העלייה לגג ועד נקודת העבודה.",s:"תקנות הבטיחות בעבודה (עבודה על גגות שבירים או תלולים), התשמ\"ו-1986"},
{t:"גגות שבירים ותלולים",d:2,q:"מה נדרש להציב בדרכי הגישה לגג שביר?",a:["שלטי אזהרה בולטים המתריעים שהגג שביר","תאורה צבעונית","מצלמות אבטחה","אין דרישת שילוט"],c:0,e:"שילוט אזהרה קבוע ובולט בגישות לגג שביר נועד למנוע עלייה תמימה של עובד שאינו מודע לסכנה — רבות מתאונות הגגות השבירים קרו לעובדים שלא ידעו שהגג אינו נושא אדם.",s:"תקנות הבטיחות בעבודה (עבודה על גגות שבירים או תלולים), התשמ\"ו-1986"},
{t:"גגות שבירים ותלולים",d:3,q:"עבודה על גג שטוח שאינו שביר וללא מעקה בשוליו — באילו תנאים היא מותרת ללא אמצעי מיגון אישי?",a:["רק בשטחי הגג המרוחקים יותר מ-2 מטרים מהשוליים, עם גישה בטוחה, כאשר רצועת 2 המטרים לאורך השוליים מסומנת באמצעים בולטים ושלטי אזהרה","בכל שטח הגג אם מזג האוויר נוח","עד מטר מהשוליים","אסורה בכל מקרה ללא רתמה, גם במרכז הגג"],c:0,e:"התקנות מתירות עבודה ומעבר בלא מיגון אישי רק באזור הפנימי של הגג — מעבר ל-2 מטרים מהשוליים הפתוחים — בתנאי שהגבול מסומן באופן בולט וקבוע, כולל שלטים, והגישה לרצועת השוליים אסורה בלא מיגון לעבודה בגובה.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007 — עבודה על גגות"},
{t:"גגות שבירים ותלולים",d:3,q:"לפני עלייה לגג ישן באתר שיפוץ, מה על מנהל העבודה לברר תחילה?",a:["את סוג הגג וחוזקו — האם הוא שביר (אסבסט, פח קל, סקיילייט) — ולקבוע את אמצעי העבודה בהתאם","את צבע הגג","את גיל הבניין בלבד","את כיוון הרוח בלבד"],c:0,e:"זיהוי הגג כשביר הוא ההכרעה הקריטית: גג אסבסט/פח שביר מחייב לוחות דריכה ואמצעי מיגון, ופתחי תאורה (סקיילייטים) הם נקודות נפילה נסתרות. ההערכה נעשית לפני העלייה — לא תוך כדי.",s:"תקנות עבודה על גגות שבירים או תלולים, התשמ\"ו-1986; תקנות עבודה בגובה, התשס\"ז-2007"},
{t:"ציוד מגן אישי",d:2,q:"מתי חייב המעביד לספק לעובד ציוד מגן אישי לפי תקנות ציוד מגן אישי, התשנ\"ז-1997?",a:["כאשר לא ניתן למנוע את הסיכונים הבטיחותיים במקום העבודה באמצעות בנייה או התקנה","רק אם העובד דורש זאת בכתב","רק בעבודות בגובה","רק אם נדרש בחוזה העבודה"],c:0,e:"העיקרון בתקנות: ההגנה ההנדסית קודמת — אך מקום עבודה שלא ניתן למנוע בו את הסיכונים על ידי בנייה או התקנה, חייב המעביד לספק לעובד ציוד מגן אישי מתאים ולפקח על השימוש בו.",s:"תקנות הבטיחות בעבודה (ציוד מגן אישי), התשנ\"ז-1997, תקנה 2-3"},
{t:"ציוד מגן אישי",d:2,q:"על חשבון מי מסופק ציוד המגן האישי לעובד?",a:["על חשבון המעביד — אסור לגבות מהעובד תשלום עבורו","על חשבון העובד","בחלוקה שווה בין העובד למעביד","על חשבון המוסד לביטוח לאומי"],c:0,e:"חובת אספקת ציוד מגן תקין ומתאים מוטלת על המעביד והיא על חשבונו. גביית תשלום מהעובד או ניכוי משכרו עבור ציוד בטיחות חיוני — אסורים.",s:"תקנות הבטיחות בעבודה (ציוד מגן אישי), התשנ\"ז-1997"},
{t:"ציוד מגן אישי",d:3,q:"מה דין ציוד מגן אישי שנתגלה בו פגם או נזק?",a:["המעביד יתקן או יחליף אותו","העובד ימשיך להשתמש בו בזהירות","יושאל מעובד אחר","יירשם בפנקס ויטופל בסוף השנה"],c:0,e:"התקנות קובעות במפורש: מעביד יתקן או יחליף ציוד מגן אישי שנתגלה בו פגם או נזק. ציוד מגן פגום שקול להיעדר הגנה — קסדה סדוקה או רתמה בלויה לא יעצרו את הפגיעה.",s:"תקנות הבטיחות בעבודה (ציוד מגן אישי), התשנ\"ז-1997, תקנה 3(ג)"},
{t:"ציוד מגן אישי",d:3,q:"באילו תנאים מותר לספק לעובד ציוד מגן שהיה בשימוש עובד אחר (כגון קסדה, משקפי מגן, מגפיים)?",a:["רק לאחר שעבר ניקוי וחיטוי נאותים","מותר תמיד — הציוד שייך למעביד","אסור בכל מקרה לספק ציוד משומש","רק אם העובד הקודם הסכים"],c:0,e:"התקנות מתירות העברת ציוד אישי (משקפי מגן, מסכות, כפפות, קסדות, מגיני שמיעה, נעליים ומגפיים) בין עובדים רק לאחר ניקוי וחיטוי נאותים — מטעמי היגיינה ובריאות.",s:"תקנות הבטיחות בעבודה (ציוד מגן אישי), התשנ\"ז-1997"},
{t:"ציוד מגן אישי",d:3,q:"מה קובעות התקנות לגבי עובד החשוף לקרני שמש?",a:["המעביד לא יעסיק עובד החשוף לקרני שמש אלא אם כן הוא מוגן (כובע, ביגוד מתאים וכדומה)","אין התייחסות לשמש בתקנות","חובת ההגנה חלה רק בקיץ","ההגנה מהשמש היא באחריות העובד בלבד"],c:0,e:"התקנות כוללות הוראה מפורשת: מעביד לא יעסיק עובד כשהוא חשוף לקרני שמש אלא אם כן הוא מוגן — דרישה רלוונטית במיוחד לאתרי בנייה פתוחים בישראל.",s:"תקנות הבטיחות בעבודה (ציוד מגן אישי), התשנ\"ז-1997"},
{t:"ציוד מגן אישי",d:2,q:"מהן חובות העובד עצמו ביחס לציוד המגן שסופק לו?",a:["להשתמש בו בהתאם לייעודו, לשמור על תקינותו וניקיונו ולהודיע על פגם או אובדן","רק לחתום על קבלתו","להחזיק אותו בארון הביתי","אין לעובד חובות — הכול על המעביד"],c:0,e:"הבטיחות היא חובה דו-צדדית: המעביד מספק ומפקח, והעובד חייב להשתמש בציוד כייעודו, לשמרו תקין ונקי ולדווח על פגמים. עובד המסרב להשתמש בציוד — אסור להעסיקו באותה עבודה.",s:"תקנות הבטיחות בעבודה (ציוד מגן אישי), התשנ\"ז-1997"},
{t:"ציוד מגן אישי",d:2,q:"לפי מה נבדקת ונקבעת תקינותו של ציוד מגן אישי?",a:["לפי הוראות התקן החל עליו או הוראות היצרן","לפי שיקול דעת העובד הוותיק","לפי מראהו החיצוני בלבד","אין צורך בבדיקות תקינות"],c:0,e:"ציוד המגן חייב להתאים לתקנים הרלוונטיים, ובדיקת תקינותו נעשית לפי הוראות התקן או הוראות היצרן — למשל החלפת קסדה לאחר חבטה או בתום אורך החיים שקבע היצרן.",s:"תקנות הבטיחות בעבודה (ציוד מגן אישי), התשנ\"ז-1997, תקנות 6-7"},
{t:"ציוד מגן אישי",d:2,q:"מי חייב בחבישת קסדת מגן באתר בנייה?",a:["כל אדם הנמצא באתר — עובדים, מנהלים, מבקרים וספקים","פועלי השלד בלבד","רק מי שעובד מתחת לעגורן","רק עובדים מתחת לגיל 40"],c:0,e:"סכנת נפילת חפצים קיימת בכל שטח האתר ואינה מבחינה בין תפקידים. חבישת קסדה היא חובה גורפת לכל הנכנס לאתר, ואכיפתה באחריות מנהל העבודה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; תקנות ציוד מגן אישי, התשנ\"ז-1997"},
{t:"ציוד מגן אישי",d:3,q:"עובד חותך בטון במשור דיסק. איזה שילוב ציוד מגן נדרש לו?",a:["מגן עיניים/פנים, מיגון נשימתי מתאים לאבק, מגיני שמיעה, כפפות ונעלי בטיחות","כפפות בלבד","קסדה ואפוד זוהר בלבד","משקפי שמש וכובע"],c:0,e:"חיתוך בטון משלב כמה גורמי סיכון בו-זמנית: רסיסים (עיניים), אבק סיליקה מסוכן (נשימה), רעש מזיק (שמיעה) ופגיעות מכניות (ידיים ורגליים) — ולכן נדרש מערך מיגון משולב, בנוסף להרטבה או יניקת אבק במקור.",s:"תקנות ציוד מגן אישי, התשנ\"ז-1997 — התוספת; תקנות אבק מזיק וגיהות תעסוקתית"},
{t:"מקום מוקף",d:2,q:"אילו מהבאים הם דוגמאות ל'מקום מוקף' לפי פקודת הבטיחות בעבודה?",a:["תא, מכל, בור, שוחה, מעבר אדים — מקום שהכניסה והיציאה ממנו מוגבלות והאוורור בו לקוי","כל חדר סגור עם דלת","משרד ממוזג ללא חלונות","עמדת שמירה בכניסה לאתר"],c:0,e:"מקום מוקף מאופיין בפתחי כניסה/יציאה מוגבלים ובאוורור טבעי לקוי, שבו עלולים להצטבר גזים מסוכנים או מחסור בחמצן: מכלים, בורות, שוחות ביוב, תאי משאבות, תעלות עמוקות מקורות וכדומה.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 — מקום מוקף"},
{t:"מקום מוקף",d:3,q:"באילו תנאים מותרת כניסת אדם למקום מוקף שעלולים להיות בו אדים מסוכנים?",a:["לאחר סילוק האדים ומניעת חדירתם, וכל עוד מבחן נאות לא הראה שאין אדים מסוכנים — האדם ייכנס חגור חגורה עם חבל שקצהו מוחזק בידי אדם בחוץ","בכניסה מהירה של פחות מדקה","עם פנס בלבד","בליווי עובד נוסף בתוך המקום"],c:0,e:"הפקודה קובעת מנגנון כפול: או הוכחה במבחן נאות (בדיקת אטמוספרה) שאין אדים מסוכנים, או כניסה עם חגורה וחבל הצלה שקצהו החופשי מוחזק בידי אדם הנמצא בחוץ — שיוכל לחלץ בלי להיכנס בעצמו.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970, סעיפים 88-90"},
{t:"מקום מוקף",d:3,q:"מה נדרש לגבי מכשירי נשימה, מכשירי הנשמה, חבלים וחגורות המיועדים לעבודה במקום מוקף?",a:["יוכנו ויקוימו כך שהגישה אליהם נוחה, ויבוקרו לעיתים מזומנות","יישמרו נעולים במשרד הראשי של החברה","יירכשו רק לאחר תאונה ראשונה","נדרשים רק במפעלי כימיקלים"],c:0,e:"ציוד החילוץ וההצלה חייב להיות זמין מיידית בנקודת העבודה ומבוקר תקופתית — ברגע האמת אין זמן לחפש מכשיר נשימה או לגלות שהחבל רקוב.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 — מקום מוקף"},
{t:"מקום מוקף",d:3,q:"מה נדרש מבחינת הכשרת עובדים לעניין עבודה במקום מוקף?",a:["מספר מספיק מקרב העובדים יודרכו ויאומנו בשימוש במכשירי הנשימה וההנשמה ובשיטת ההנשמה","די בכך שמנהל העבודה יודע להשתמש בציוד","הדרכה נדרשת רק לעובדי חברת החילוץ","אין דרישת הדרכה ייעודית"],c:0,e:"הפקודה מחייבת שמספר מספיק של עובדים יהיו מאומנים בשימוש בציוד ההצלה ובהנשמה — כדי שבכל משמרת יהיה מי שמסוגל לבצע חילוץ והחייאה מיידיים.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 — מקום מוקף"},
{t:"מקום מוקף",d:3,q:"מדוע אסור לאדם בחוץ, המחזיק בחבל ההצלה, להיכנס פנימה לחלץ עובד שהתמוטט במקום מוקף?",a:["האטמוספרה שהפילה את הראשון תפיל גם אותו — החילוץ ייעשה בחבל מבחוץ או עם מכשיר נשימה מתאים בלבד","כי הוא יאבד את שכרו","כי אסור שיהיו שני אנשים במקום מוקף בשום מצב","אין מניעה שייכנס מיד"],c:0,e:"חלק ניכר מהרוגי מקומות מוקפים הם המחלצים הספונטניים: אדם נכנס להציל חבר וקורס מאותם גזים. תפקיד האיש בחוץ הוא למשוך בחבל ולהזעיק עזרה — כניסה מותרת רק עם מיגון נשימתי מתאים.",s:"פקודת הבטיחות בעבודה — מקום מוקף; לקחי תאונות — מינהל הבטיחות"},
{t:"מקום מוקף",d:3,q:"האם מותר לבצע ריתוך או עבודה באש גלויה במכל שהכיל חומר דליק או נפיץ?",a:["רק לאחר שהמכל נוקה ונבדק ונשללה הימצאות אדים דליקים, לפי הוראות הפקודה","כן, אם המכל ריק מנוזל","כן, אם הריתוך קצר","רק בשעות הערב"],c:0,e:"שאריות אדים דליקים במכל 'ריק' מתלקחות מניצוץ ריתוך וגורמות לפיצוץ. הפקודה אוסרת עבודה חמה במכלים שהכילו חומרים דליקים עד ביצוע ניקוי, אוורור ובדיקה שמוודאת היעדר אדים.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 — אדים מתלקחים"},
{t:"מקום מוקף",d:2,q:"מי רשאי לפטור, בתעודה ובתנאים, מהוראות מסוימות של דרישות המקום המוקף?",a:["מפקח העבודה הראשי","מנהל העבודה באתר","ראש הרשות המקומית","מהנדס הפרויקט"],c:0,e:"הפקודה מסמיכה את מפקח העבודה הראשי לתת פטור בתעודה, בכפוף לתנאים, כשהוא משוכנע שמילוי הוראה מסוימת אינו נחוץ או אינו מעשי — סמכות חריגים השמורה לדרג הארצי בלבד.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 — מקום מוקף"},
{t:"גיהות: רעש, אבק וחומרים מסוכנים",d:2,q:"מהו 'רעש מזיק' לפי התקנות?",a:["חשיפה לרעש שמפלסו עולה על 85 דציבל (A) במשך יום עבודה של 8 שעות","כל רעש מעל 60 דציבל","רעש הנשמע מחוץ לאתר","רעש בתדר גבוה בלבד"],c:0,e:"הרף המרכזי בתקנות הרעש הוא 85dB(A) בממוצע משוקלל ל-8 שעות עבודה. מעבר לו נדרשים מיגון שמיעה, בדיקות רפואיות, הדרכות ופעולות להפחתת הרעש.",s:"תקנות הבטיחות בעבודה (גיהות תעסוקתית ובריאות העובדים ברעש), התשמ\"ד-1984"},
{t:"גיהות: רעש, אבק וחומרים מסוכנים",d:3,q:"עובד חשוף לרעש של 88 דציבל. מהו משך החשיפה המרבי המותר ללא מיגון, בקירוב?",a:["כ-4 שעות — כל עלייה של 3 דציבל מחצית את זמן החשיפה המותר","8 שעות כרגיל","שעה אחת","אין הגבלה מתחת ל-100 דציבל"],c:0,e:"סולם הדציבלים לוגריתמי: עלייה של 3dB מכפילה את האנרגיה האקוסטית, ולכן זמן החשיפה המותר נחצה — 88dB מתיר כ-4 שעות, 91dB כשעתיים, וכן הלאה.",s:"תקנות הגיהות ברעש, התשמ\"ד-1984 — מפלסי חשיפה מותרים"},
{t:"גיהות: רעש, אבק וחומרים מסוכנים",d:3,q:"אילו בדיקות רפואיות נדרשות לעובד ברעש מזיק?",a:["בדיקה רפואית ראשונית לפני תחילת העבודה ובדיקות חוזרות אחת לשנה, בידי רופא מורשה","בדיקה חד-פעמית בקבלה לעבודה בלבד","בדיקה רק לאחר תלונה על ירידה בשמיעה","בדיקת ראייה שנתית"],c:0,e:"התקנות מחייבות בדיקה רפואית (כולל שמיעה) לפני תחילת העבודה ברעש מזיק, ובדיקות חוזרות אחת לשנה — לאיתור מוקדם של ירידה בשמיעה והוצאת עובד נפגע מהחשיפה.",s:"תקנות הגיהות ברעש, התשמ\"ד-1984"},
{t:"גיהות: רעש, אבק וחומרים מסוכנים",d:2,q:"מהי חובת המעביד בעניין מגיני אוזניים לעובדים ברעש מזיק?",a:["לספק מגיני אוזניים מתאימים ותקינים, והעובדים חייבים להשתמש בהם ולשמור על שלמותם","להמליץ על רכישה עצמית","לספק רק לעובדים מעל גיל 50","לספק אטמים חד-פעמיים פעם בחודש"],c:0,e:"המעביד מספק מיגון שמיעה מתאים ותקין ומפקח על השימוש; העובד חייב להשתמש ולשמור על הציוד. בנוסף נדרשת הדרכה שנתית, בכתב ובעל-פה, על נזקי הרעש ודרכי המיגון.",s:"תקנות הגיהות ברעש, התשמ\"ד-1984"},
{t:"גיהות: רעש, אבק וחומרים מסוכנים",d:3,q:"חיתוך והשחזה של בטון, אבן ובלוקים משחררים אבק המכיל סיליקה גבישית. מהם אמצעי המנע הנדרשים?",a:["הרטבה במים או יניקת אבק במקור, בנוסף למיגון נשימתי מתאים לעובד","עבודה ברוח חזקה שתפזר את האבק","מטלית על הפה","אין צורך באמצעים — אבק בטון אינו מזיק"],c:0,e:"אבק סיליקה גבישית גורם לצרידת ריאות (סיליקוזיס) ולמחלות קשות. הבקרה ההנדסית במקור — חיתוך רטוב או יניקה — היא העיקר, ומיגון נשימתי (מסכה מתאימה, לא מטלית) משלים אותה.",s:"תקנות הבטיחות בעבודה (גיהות תעסוקתית ובריאות העובדים באבק מזיק); הנחיות מינהל הבטיחות — סיליקה"},
{t:"גיהות: רעש, אבק וחומרים מסוכנים",d:3,q:"באתר משתמשים בחומר כימי מסוכן (דבק, ממס, חומר איטום). מה חייב להיות זמין לעובדים לגביו?",a:["גיליון בטיחות (SDS) של החומר, והדרכה על סיכוניו ואמצעי המיגון הנדרשים","המחירון של הספק","אישור כשרות","דוגמית של החומר בבקבוק שקוף"],c:0,e:"תקנות הבטיחות מחייבות שגיליון בטיחות עדכני של כל חומר מסוכן יהיה זמין לעובדים, ושהם יודרכו על הסיכונים, אופן השימוש הבטוח, המיגון והטיפול באירוע — לפני תחילת העבודה עם החומר.",s:"תקנות הבטיחות בעבודה (גיליון בטיחות, סיווג, אריזה, תיווי וסימון של אריזות), התשנ\"ח-1998"},
{t:"גיהות: רעש, אבק וחומרים מסוכנים",d:2,q:"עבודה עם חומרי איטום וממסים בחלל סגור (ממ\"ד, מרתף) מחייבת בראש ובראשונה:",a:["אוורור נאות של החלל ומיגון נשימתי מתאים, בהתאם לגיליון הבטיחות","תאורה חזקה","עבודה בזוגות בלבד","סגירת הדלת למניעת ריחות בבניין"],c:0,e:"אדי ממסים בחלל לא מאוורר גורמים להרעלה, אובדן הכרה ולעיתים לפיצוץ (אדים דליקים). הפתרון: אוורור מאולץ, מיגון נשימתי לפי גיליון הבטיחות, והרחקת מקורות הצתה.",s:"תקנות גיליון בטיחות, התשנ\"ח-1998; פקודת הבטיחות בעבודה — אוורור"},
{t:"ריתוך, חיתוך ומניעת אש",d:2,q:"כיצד יאוחסנו ויוצבו גלילי גז דחוס (חמצן, אצטילן) באתר?",a:["במצב מאונך, קשורים נגד נפילה, עם מכסי מגן על הברזים, הרחק מחום וממקורות הצתה","בשכיבה על הקרקע לנוחות הגלגול","בתוך הרכב הצמוד לאתר","ליד מיכל הסולר לריכוז החומרים המסוכנים"],c:0,e:"גליל שנופל וברזו נשבר הופך לטיל ממונע גז דחוס. הגלילים יוצבו מאונכים וקשורים, עם מכסי מגן, מוצלים ומרוחקים ממקורות חום והצתה — ובנפרד מחומרים דליקים.",s:"כללי הבטיחות בגזים דחוסים — מינהל הבטיחות; פקודת הבטיחות בעבודה"},
{t:"ריתוך, חיתוך ומניעת אש",d:3,q:"איזה אבזר בטיחות חיוני חייב להיות מותקן במערכת ריתוך אוטוגני (חמצן-אצטילן)?",a:["שסתומי אל-חוזר ומונעי הבזק (Flashback Arrestors) על הקווים","מד לחץ דקורטיבי","צינור מאריך באורך 50 מטר","מצת אלקטרוני בלבד"],c:0,e:"מונע הבזק עוצר חזרת להבה מהמבער אל הצינור והגליל — תרחיש שמסתיים בפיצוץ הגליל. שסתומי אל-חוזר מונעים ערבוב גזים בין הקווים. שניהם חובה במערכות אוטוגן.",s:"כללי בטיחות בריתוך וחיתוך בלהבת גז — מינהל הבטיחות"},
{t:"ריתוך, חיתוך ומניעת אש",d:3,q:"מדוע אסור בתכלית האיסור שמן או גריז על ברזים ואביזרים של גליל חמצן?",a:["חמצן דחוס במגע עם שמן עלול לגרום להתלקחות ופיצוץ ספונטניים","השמן סותם את הברז","זה משאיר כתמים","מותר — שמן משפר את האטימה"],c:0,e:"חמצן בלחץ גבוה מחמצן שמנים וגריזים באלימות — די במגע כדי לגרום הצתה עצמית ופיצוץ. ידיים, כפפות וכלים מלוכלכים בשמן אסורים במגע עם אביזרי חמצן.",s:"כללי בטיחות בגזים דחוסים — מינהל הבטיחות"},
{t:"ריתוך, חיתוך ומניעת אש",d:2,q:"לפני ביצוע עבודה חמה (ריתוך, חיתוך, השחזה) באזור עם חומרים דליקים, מה נדרש?",a:["הרחקת/כיסוי החומרים הדליקים, הצבת אמצעי כיבוי זמינים, ובמידת הצורך השגחת אדם (צופה אש) במהלך העבודה ואחריה","פתיחת חלון בלבד","הרטבת ידי הרתך","ביצוע העבודה במהירות מרבית"],c:0,e:"ניצוצות ריתוך עפים למרחקים ומציתים חומרים גם זמן רב אחרי סיום העבודה. הנוהל: סילוק/מיגון דליקים ברדיוס הסיכון, מטף זמין, וצופה אש שנשאר גם לאחר סיום העבודה החמה לוודא שאין התלקחות מאוחרת.",s:"כללי עבודה חמה — מינהל הבטיחות ורשות הכבאות; פקודת הבטיחות בעבודה"},
{t:"ריתוך, חיתוך ומניעת אש",d:2,q:"איזה מיגון עיניים נדרש ברתך בריתוך חשמלי (אלקטרודות)?",a:["מסכת ריתוך עם זכוכית מסננת בדרגה מתאימה — גם לעוזר הנמצא בקרבת הקשת","משקפי שמש כהים","משקפי ראייה רגילים","אין צורך במיגון אם מרצדים בעיניים"],c:0,e:"קשת הריתוך פולטת קרינת UV עזה הגורמת ל'ברק רתכים' (כוויית קרנית) ולנזק מצטבר לעין. נדרשת מסכה עם פילטר בדרגת הכהיה מתאימה לזרם — וגם העוזר והעובדים בסביבה זקוקים למיגון או למחיצות.",s:"תקנות ציוד מגן אישי, התשנ\"ז-1997; כללי בטיחות בריתוך — מינהל הבטיחות"},
{t:"ריתוך, חיתוך ומניעת אש",d:3,q:"ריתוך בתוך חלל סגור או מקום מוקף מחייב, בנוסף לכללי הריתוך הרגילים:",a:["אוורור מאולץ או יניקת עשנים מקומית, ולעיתים מיגון נשימתי — עשני ריתוך מצטברים ורעילים, והגזים עלולים לדחוק את החמצן","הגברת זרם הריתוך","עבודה ללא מסכה לשיפור הראות","סגירת כל הפתחים למניעת רוח"],c:0,e:"בחלל סגור עשני הריתוך (תחמוצות מתכת, גזים) מצטברים במהירות לריכוזים מסוכנים, וגז מגן עלול לדחוק חמצן. נדרשים אוורור/יניקה במקור, ניטור, ולפי הצורך מיגון נשימתי — בנוסף לכל דרישות המקום המוקף.",s:"פקודת הבטיחות בעבודה — מקום מוקף; כללי בטיחות בריתוך — מינהל הבטיחות"},
{t:"ריתוך, חיתוך ומניעת אש",d:2,q:"כיצד יאוחסן דלק (סולר, בנזין) באתר בנייה?",a:["במכלים תקניים ומשולטים, באזור מוגדר ומאוורר, הרחק ממקורות הצתה ומעבודות חמות, עם אמצעי כיבוי בקרבת מקום","בבקבוקי שתייה לנוחות החלוקה","בתוך מבנה המגורים של העובדים","ליד גלילי החמצן לריכוז החומרים"],c:0,e:"דלקים יאוחסנו בכלים המיועדים לכך בלבד, באזור משולט ומרוחק מהצתה. אחסון בבקבוקי שתייה גרם בעבר לתאונות בליעה ושריפה; וקרבה לגלילי חמצן היא שילוב נפיץ.",s:"פקודת הבטיחות בעבודה; הנחיות בטיחות אש באתרי בנייה — מינהל הבטיחות ורשות הכבאות"},
{t:"ריתוך, חיתוך ומניעת אש",d:2,q:"מה נדרש לגבי מטפי כיבוי אש באתר?",a:["מטפים תקינים, נגישים ומסומנים בעמדות העבודה המסוכנות, ותחזוקה תקופתית בידי גורם מוסמך","מטף אחד נעול במשרד האתר","מטפים נדרשים רק במבני מגורים","די בדלי חול אחד לאתר"],c:0,e:"מטפים יוצבו נגישים באזורי סיכון (עבודות חמות, אחסון דלקים, לוחות חשמל), יסומנו, וייבדקו ויתוחזקו תקופתית לפי התקן בידי גורם מוסמך — מטף לא תקין ברגע האמת שקול להיעדר מטף.",s:"תקן ישראלי 129 — תחזוקת מטפים; הנחיות בטיחות אש באתרי בנייה"},
{t:"ריתוך, חיתוך ומניעת אש",d:3,q:"בעת הפסקת עבודה והשארת ציוד אוטוגן ללא השגחה (הפסקת צהריים, סוף יום), מה נדרש?",a:["סגירת ברזי הגלילים ושחרור הלחץ מהצינורות והווסתים","השארת הלהבה דולקת בקטן","כיסוי המבער בסמרטוט","הנחת המבער על גליל החמצן"],c:0,e:"דליפת גז מצינור פגום בזמן הפסקה ממלאת חללים באצטילן — מתכון לפיצוץ. הנוהל: סגירת ברזי הגלילים, ריקון הלחץ מהמערכת ואחסון מסודר של המבער והצינורות.",s:"כללי בטיחות בריתוך וחיתוך בלהבת גז — מינהל הבטיחות"},
{t:"ריתוך, חיתוך ומניעת אש",d:2,q:"היכן אסור בהחלט לעשן באתר בנייה?",a:["באזורי אחסון דלקים, גזים וחומרים דליקים — והאיסור ישולט באופן בולט","במשרד האתר","בחניון","מותר לעשן בכל מקום באתר"],c:0,e:"עישון באזורי דלקים, גלילי גז, ממסים וחומרים דליקים הוא מקור הצתה ישיר. אזורים אלה ישולטו ב'אסור לעשן' והאיסור ייאכף — בנוסף למגבלות העישון הכלליות בדין.",s:"הנחיות בטיחות אש באתרי בנייה — מינהל הבטיחות ורשות הכבאות"},
{t:"גיהות: רעש, אבק וחומרים מסוכנים",d:3,q:"מהי חובת ההדרכה הייעודית לעובדים ברעש מזיק?",a:["הדרכה אחת לשנה לפחות, הן בכתב והן בעל-פה, על נזקי הרעש ודרכי המיגון","הדרכה חד-פעמית בקבלה לעבודה","אין חובת הדרכה ברעש","הדרכה רק למנהלי העבודה"],c:0,e:"תקנות הרעש מחייבות הדרכה שנתית כפולה — בכתב ובעל-פה — לעובדים החשופים לרעש מזיק, על הנזק הבריאותי ועל השימוש הנכון במגיני האוזניים.",s:"תקנות הגיהות ברעש, התשמ\"ד-1984"},
{t:"ציוד מגן אישי",d:3,q:"עובד מסרב בעקביות להשתמש ברתמת בטיחות בעבודה בגובה. כיצד על מנהל העבודה לנהוג?",a:["להפסיק את עבודתו בגובה — אסור להעסיק עובד שאינו משתמש בציוד המגן הנדרש, לאחר הדרכה ותיעוד","להחתים אותו על ויתור אחריות ולאפשר לו להמשיך","להתעלם אם הוא עובד מקצועי","להעביר אותו לעבודת לילה"],c:0,e:"השימוש בציוד מגן הוא תנאי להעסקה בעבודה המסוכנת — לא בחירה אישית. 'כתב ויתור' חסר תוקף ואינו פוטר את המעביד מאחריות פלילית ואזרחית. הסירוב מטופל בהדרכה, תיעוד, ובמידת הצורך הרחקה מהמשימה.",s:"תקנות ציוד מגן אישי, התשנ\"ז-1997; תקנות עבודה בגובה, התשס\"ז-2007"},
{t:"מכונות וכלי עבודה",d:2,q:"מה קובעת פקודת הבטיחות בעבודה לגבי חלקים נעים ומסוכנים של מכונה?",a:["יגודרו לבטח בגידור מתאים, אלא אם מיקומם או מבנם בטוח כאילו גודרו","יסומנו בצבע אדום בלבד","יופעלו רק ביד שמאל","יכוסו בבד"],c:0,e:"עקרון היסוד בפקודה: כל חלק מסוכן של מכונה (גלגלי שיניים, רצועות הנעה, להבים) יגודר לבטח. הסרת מגן או הפעלת מכונה ללא גידורה — אסורות.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 — גידור מכונות"},
{t:"מכונות וכלי עבודה",d:2,q:"באילו תנאים מותר לנקות, לשמן או לכוון חלק נע של מכונה?",a:["רק כשהמכונה דוממת ומנותקת ממקור הכוח, ובאמצעים המונעים הפעלה מקרית","תוך כדי פעולה, בזהירות","כשהמכונה פועלת במהירות נמוכה","בכפפות עבות בלבד"],c:0,e:"ניקוי או טיפול בחלק נע בתנועה הוא גורם קטיעות ולכידות קלאסי. העבודה תיעשה רק במכונה מושבתת ומנותקת, עם אמצעים נגד הפעלה בשוגג (נעילה/שילוט — LOTO).",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970"},
{t:"מכונות וכלי עבודה",d:2,q:"משחזת זווית ('דיסק') — מהם כללי הבטיחות החיוניים בשימוש בה?",a:["מגן דיסק במקומו, דיסק מתאים לסוג העבודה ולמהירות המכשיר, אחיזה בשתי ידיים ומיגון עיניים ופנים","הסרת המגן לשיפור שדה הראייה","שימוש בדיסק חיתוך להשחזה ולהפך","הפעלה ביד אחת תוך החזקת החומר בשנייה"],c:0,e:"התפרקות דיסק במהירות סיבוב היא תאונה קטלנית. חובה: מגן מותקן, דיסק תקין שמתאים למהירות הנקובה ולסוג העבודה, שתי ידיים על הכלי, והחומר מקובע — לא מוחזק ביד.",s:"פקודת הבטיחות בעבודה — גידור מכונות; הוראות יצרן; הנחיות מינהל הבטיחות"},
{t:"מכונות וכלי עבודה",d:3,q:"מסור עגול שולחני לעץ באתר חייב להיות מצויד ב:",a:["מגן להב וסכין מפלגת (Riving knife) למניעת בעיטה לאחור","מאוורר קירור","ידית עץ מהוקצעת","שלט 'זהירות' בלבד"],c:0,e:"מגן הלהב מונע מגע יד בלהב, והסכין המפלגת מונעת התכווצות העץ על הלהב ובעיטת החומר לאחור אל המפעיל — שתי דרישות חובה במסורים עגולים לפי תקנות מכונות העץ.",s:"תקנות הבטיחות בעבודה (מכונות עץ); פקודת הבטיחות בעבודה"},
{t:"מכונות וכלי עבודה",d:2,q:"כלי עבודה חשמלי מיטלטל באתר בנייה יהיה:",a:["בעל בידוד כפול או מוארק כנדרש, מחובר למעגל המוגן במפסק מגן (פחת), עם כבל ותקע תקינים","מחובר ישירות לקו ללא הגנות","עטוף בסרט בידוד בכל מקום שנשחק","מופעל רק כשהוא רטוב לקירור"],c:0,e:"השילוב הנדרש: כלי בבידוד כפול (או הארקה תקינה), הזנה דרך פחת, וכבל/תקע שלמים. כלי עם כבל קרוע או תקע שבור — מורחק מהשימוש עד תיקון בידי חשמלאי.",s:"תקנות הבטיחות בעבודה (חשמל), התש\"ן-1990; חוק החשמל"},
{t:"מכונות וכלי עבודה",d:3,q:"מהי 'בעיטה לאחור' (Kickback) במסור שרשרת או במשחזת, וכיצד מצמצמים את הסיכון?",a:["העפה פתאומית של הכלי לעבר המפעיל כשקצה הלהב נתפס בחומר — מצמצמים באחיזה נכונה בשתי ידיים, עבודה בחלק הנכון של הלהב והימנעות מחיתוך בקצהו","רעידה קלה של הכלי — אין בה סיכון","תופעה המתרחשת רק בכלים ישנים","כשל חשמלי בכלי"],c:0,e:"בעיטה לאחור מטיחה את הכלי המסתובב לעבר פניו וגופו של המפעיל בשבריר שנייה. ההגנה: אחיזה יציבה בשתי ידיים, עמידה נכונה, חיתוך באזור הבטוח של הלהב, וכלים עם בלם שרשרת/מגן תקינים.",s:"הוראות יצרן; הנחיות בטיחות בכלי עבודה — מינהל הבטיחות"},
{t:"מכונות וכלי עבודה",d:2,q:"עובד הפעיל מערבל בטון נייד וביקש להכניס את ידו לתופו כדי לשחרר חומר. מה הכלל?",a:["אסור להכניס יד או כלי לתוף מסתובב — השחרור רק לאחר עצירה מלאה וניתוק המערבל","מותר אם היד עטופה בכפפה","מותר בעזרת מקל ארוך כשהתוף מסתובב","מותר בהאטת התוף"],c:0,e:"תוף מערבל הוא חלק נע מסוכן לכל דבר — הכנסת יד או מוט לתוכו בתנועה גרמה לקטיעות. כל טיפול בתוף ייעשה במכונה עצורה ומנותקת בלבד.",s:"פקודת הבטיחות בעבודה — גידור מכונות וחלקים נעים"},
{t:"מתקני הרמה לאנשים",d:2,q:"מי רשאי להפעיל במת הרמה מתרוממת ניידת (סל הרמה ממונע) באתר?",a:["מפעיל שהוסמך לכך כדין לפי תקנות מפעילי מכונות הרמה","כל עובד שצפה בהדגמה","מנהל העבודה מתוקף תפקידו בלבד","עובד שמלאו לו 16"],c:0,e:"במת הרמה מתרוממת ניידת היא מכונת הרמה שהפעלתה מחייבת הסמכה לפי תקנות העגורנאים ומפעילי מכונות ההרמה. הפעלה ללא הסמכה אסורה ומסוכנת.",s:"תקנות הבטיחות בעבודה (עגורנאים, מפעילי מכונות הרמה אחרות ואתתים), התשנ\"ג-1992"},
{t:"מתקני הרמה לאנשים",d:2,q:"עובד בתוך סל של במת הרמה מתרוממת חייב:",a:["להיות רתום ברתמת בטיחות המעוגנת לנקודת העיגון שבסל","לעמוד על מעקה הסל להגדלת הטווח","להישען החוצה ככל הנדרש","לעבוד ללא רתמה — הסל עצמו מגן"],c:0,e:"תקנות העבודה בגובה מחייבות רתימה בתוך הסל לנקודת העיגון הייעודית — תנודת זרוע, פגיעת מטען או בליעת גלגל בבור עלולות להעיף עובד לא רתום מהסל. טיפוס על המעקה אסור בהחלט.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007 — במות הרמה"},
{t:"מתקני הרמה לאנשים",d:3,q:"מעלית הרמה לבני אדם המותקנת באתר בנייה (מעלית בנאים) טעונה:",a:["בדיקות בודק מוסמך כדין לאחר ההתקנה ובאופן תקופתי, והפעלה בידי מי שהוסמך/הודרך לכך","אישור חברת המעליות שתותקן במבנה הגמור","רישיון נהיגה מדרגה ב' למפעיל","בדיקה רק אם אירעה תקלה"],c:0,e:"מעלית באתר היא מכונת הרמה: נדרשות בדיקות בודק מוסמך לאחר התקנה ובאופן תקופתי, תסקירים זמינים, והפעלה רק בידי גורם מוסמך/מודרך. הובלת אנשים במתקן שלא נבדק — אסורה.",s:"פקודת הבטיחות בעבודה — מכונות הרמה; תקנות עגורנאים ומפעילי מכונות הרמה, התשנ\"ג-1992"},
{t:"מתקני הרמה לאנשים",d:2,q:"מהו הכלל לגבי הימצאות אנשים מתחת לבמת הרמה או לזרוע מורמת?",a:["אסורה — האזור שמתחת לסל ולזרוע יוגדר ויפונה מאנשים","מותרת לעובדי האתר בלבד","מותרת אם הבמה חדשה","מותרת בזמן ירידה איטית"],c:0,e:"כשל הידראולי, נפילת חפץ מהסל או תנועה פתאומית מסכנים כל מי שמתחת. אזור הפעולה יגודר/יסומן ואנשים יורחקו ממנו.",s:"תקנות עבודה בגובה, התשס\"ז-2007; הוראות יצרן במות הרמה"},
{t:"מתקני הרמה לאנשים",d:3,q:"לפני הפעלת במת הרמה מתרוממת ניידת בנקודת עבודה חדשה, על המפעיל לוודא:",a:["קרקע יציבה ומפולסת, פריסת רגליות ייצוב כנדרש, היעדר קווי חשמל בטווח הסיכון ובדיקת תקינות יומית","שיש דלק לכל היום בלבד","שצבע הבמה תואם את האתר","שהרדיו בסל פועל"],c:0,e:"רוב תאונות הבמות נובעות מהתהפכות (קרקע רכה/שיפוע/אי-פריסת רגליות) או מהתחשמלות מקווי מתח. בדיקת ההצבה והסביבה לפני כל הפעלה היא חובת המפעיל, בנוסף לבדיקה התפעולית היומית.",s:"הוראות יצרן; תקנות עבודה בגובה; הנחיות מינהל הבטיחות לבמות הרמה"},
{t:"מתקני הרמה לאנשים",d:3,q:"האם מותר להרים עובד על שיני מלגזה כדי לבצע עבודה בגובה?",a:["לא — הרמת אדם במלגזה מותרת רק בסל עבודה ייעודי ותקני המחובר כנדרש, ובתנאים שנקבעו","כן, אם העובד אוחז היטב בתורן","כן, לגובה של עד 3 מטרים","כן, אם הנהג מנוסה"],c:0,e:"עמידה על שיני מלגזה או על משטח מונח עליהן היא תאונה ידועה מראש — נפילה או מעיכה בתורן. הרמת אדם מותרת אך ורק בסל ייעודי תקני המקובע כהלכה, עם מעקות ועיגון רתמה.",s:"תקנות הבטיחות בעבודה (עבודה בגובה), התשס\"ז-2007; הנחיות מינהל הבטיחות — מלגזות"},
{t:"רווחה ועזרה ראשונה",d:2,q:"מה חייב מבצע הבנייה להעמיד לרשות העובדים באתר בתחום הרווחה?",a:["מי שתייה צוננים וראויים, שירותים תקינים, מקום מוצל להפסקות ותנאי היגיינה נאותים","מכונת קפה בלבד","חדר כושר","אין דרישות רווחה באתרי בנייה"],c:0,e:"תקנות הרווחה בעבודה מחייבות מי שתייה זמינים וצוננים, שירותים תקינים ונקיים, מקום מוצל לאכילה ומנוחה ותנאים סניטריים — חיוני במיוחד בעבודה פיזית בחום הישראלי.",s:"תקנות ארגון הפיקוח על העבודה (רווחה בעבודה); הנחיות מינהל הבטיחות"},
{t:"רווחה ועזרה ראשונה",d:2,q:"מה נדרש באתר בתחום העזרה הראשונה?",a:["ארגז עזרה ראשונה מצויד כנדרש, נגיש ומשולט, ועובד שהוכשר כמגיש עזרה ראשונה","בקבוק יוד אחד במשרד","הסכם עם בית מרקחת סמוך","אין דרישה — מד\"א קרובים"],c:0,e:"התקנות מחייבות ציוד עזרה ראשונה בהיקף התואם את מספר העובדים וסיכוני האתר, נגיש ומסומן, וכן אדם שהוכשר להגשת עזרה ראשונה — הטיפול בדקות הראשונות מציל חיים.",s:"תקנות הבטיחות בעבודה (עזרה ראשונה במקומות עבודה); הנחיות מינהל הבטיחות"},
{t:"רווחה ועזרה ראשונה",d:3,q:"עובד מתלונן על סחרחורת וחולשה ביום שרב במהלך עבודה פיזית בשמש. מה התגובה הנכונה?",a:["הפסקת עבודתו מיד, העברתו לצל, השקיה וקירור, והשגחה — ואם אין שיפור מהיר או יש בלבול: פינוי רפואי דחוף","להורות לו לסיים את המשימה ואז לנוח","לתת לו קפה ממריץ","לשלוח אותו לעבוד בקומה גבוהה ומאווררת"],c:0,e:"אלה סימני מצוקת חום שעלולה להידרדר למכת חום קטלנית. הטיפול: הפסקה מיידית, צל, שתייה וקירור אקטיבי. בלבול, הקאות או אי-שיפור = מצב חירום רפואי. מניעה: שתייה מרובה, הפסקות בצל והתאמת העומס בשרב.",s:"הנחיות עבודה בחום — מינהל הבטיחות ומשרד הבריאות; תקנות הרווחה בעבודה"},
{t:"רווחה ועזרה ראשונה",d:2,q:"מהי הדרישה לגבי שילוט באתר בנייה?",a:["שלטי אזהרה, הכוונה וחירום ברורים ומובנים לעובדים, בהתחשב בשפותיהם, במקומות הנדרשים","שלט אחד בכניסה מספיק","שילוט בעברית משפטית בלבד","שילוט נדרש רק באתרים ציבוריים"],c:0,e:"השילוט (סכנות, חובת ציוד מגן, דרכי מילוט, טלפוני חירום) חייב להיות מובן לעובדים בפועל — באתרים עם עובדים דוברי שפות שונות נדרשת התאמה (פיקטוגרמות, ריבוי שפות) כחלק מחובת ההדרכה וההגנה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה); תקנות מסירת מידע והדרכת עובדים, התשנ\"ט-1999"},
{t:"רווחה ועזרה ראשונה",d:3,q:"באתר עובדים שאינם דוברי עברית. כיצד מקיימים את חובת ההדרכה כלפיהם?",a:["ההדרכה ותמצית המידע בכתב יימסרו בשפה המובנת לעובד, ויש לוודא שהבין את הסיכונים והאמצעים","מספיקה הדרכה בעברית עם חתימה על טופס","הם פטורים מהדרכה","חברם לעבודה יסביר להם מתישהו"],c:0,e:"הדרכה שאינה מובנת אינה הדרכה. תקנות מסירת המידע מחייבות שההדרכה תינתן באופן המובן לעובד — לרבות שפתו — ושהמעסיק יוודא הבנה בפועל, עם תיעוד.",s:"תקנות ארגון הפיקוח על העבודה (מסירת מידע והדרכת עובדים), התשנ\"ט-1999"},
{t:"עבודות מיוחדות",d:3,q:"בהקמת שלד פלדה, מה הכלל לגבי שחרור אלמנט (קורה, עמוד) מאונקל העגורן?",a:["רק לאחר שהאלמנט חובר וקובע באופן המבטיח את יציבותו (חיבור זמני מספק לפחות)","מיד כשהאלמנט נוגע בנקודת ההתקנה","כשהמרכיב מחזיק אותו בידיו","לפי קריאת העגורנאי בלבד"],c:0,e:"שחרור מוקדם של אלמנט פלדה לא מקובע גרם לקריסות ולמוות מרכיבים. האלמנט ישוחרר מהעגורן רק לאחר חיבור (ברגים/ריתוך זמני) המבטיח שלא יזוז או ייפול.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — בנייה הנדסית והקמת מבנים"},
{t:"עבודות מיוחדות",d:3,q:"בהרכבת אלמנטים טרומיים (קירות, תקרות), מה נדרש לפני תחילת ההרכבה ובמהלכה?",a:["תכנית הרכבה וביצוע לפי שלביה, תמיכות זמניות לכל אלמנט עד חיבורו הסופי, והרחקת עובדים מאזור ההנפה","הרכבה לפי ניסיון הצוות ללא תכנית","הצבת האלמנטים ללא תמיכה והשלמת החיבורים בסוף","עבודה בלילה לקיצור לוחות זמנים"],c:0,e:"אלמנט טרומי שמשקלו טונות ועומד ללא תמיכה הוא דומינו קטלני. נדרשת תכנית הרכבה (סדר, נקודות אחיזה, תמיכות), תמיכה זמנית של כל אלמנט עד קיבועו הסופי, ופינוי אזור ההנפה מאנשים.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — הקמת מבנים טרומיים"},
{t:"עבודות מיוחדות",d:2,q:"בעבודה מעל מים או בקרבתם (גשר, מזח, מאגר), מה נדרש למניעת טביעה?",a:["אמצעי הגנה מנפילה למים, חגורות/אפודי הצלה לעובדים, ואמצעי הצלה זמינים (גלגלי הצלה, ולפי הצורך סירה ואיש צוות)","לוודא שכל העובדים יודעים לשחות — ותו לא","עבודה בקיץ בלבד כשהמים חמים","חבל קשור למותן של עובד אחד"],c:0,e:"התקנות מחייבות בעבודה מעל מים מניעת נפילה (מעקות, רתמות), אפודי/חגורות הצלה, ואמצעי חילוץ מיידיים. ידיעת שחייה אינה תחליף — נפילה עם בגדי עבודה וכלים מטביעה גם שחיינים.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 — עבודה מעל פני המים"},
{t:"עבודות מיוחדות",d:3,q:"מי רשאי לבצע פעולות פיצוץ (חציבה בחומר נפץ) באתר?",a:["מפוצץ מוסמך בעל רישיון כדין לפי חוק חומרי נפץ, ובתיאום ואישורים הנדרשים","מנהל העבודה לאחר צפייה בהדרכה","כל קבלן עפר מנוסה","חבלן משטרה בדימוס ללא רישיון בתוקף"],c:0,e:"שימוש בחומרי נפץ מוסדר בחוק חומרי נפץ ומחייב רישיונות לרכישה, אחסנה ושימוש, ומפוצץ מוסמך בלבד. נדרשים גם נהלי אזהרה, חסימת שטח ומרחקי בטיחות.",s:"חוק חומרי נפץ, התשי\"ד-1954 ותקנותיו; תקנות הבטיחות בעבודה (עבודות בנייה)"},
{t:"עבודות מיוחדות",d:2,q:"בעבודה עם ביטומן (זפת) חם באיטום גגות, מהו כלל בטיחות קריטי?",a:["אסור שמים ייכנסו למכל הביטומן החם — מגע מים בביטומן רותח גורם להתפרצות אלימה; נדרשים מיגון גוף ופנים ומטף זמין","יש לקרר את הביטומן במים מדי שעה","עובדים בסנדלים בגלל החום","מותר לחמם בלהבה גלויה ללא השגחה"],c:0,e:"טיפת מים במכל ביטומן ב-200+ מעלות מתאדה בן-רגע ומעיפה ביטומן רותח על הסביבה — כוויות קשות. נדרשים: מניעת רטיבות, חימום מבוקר ומושגח, ביגוד מגן, כפפות, מגן פנים ומטף בקרבת מקום.",s:"הנחיות בטיחות בעבודות איטום בחום — מינהל הבטיחות; תקנות ציוד מגן אישי"},
{t:"עבודות מיוחדות",d:2,q:"מה נדרש מבחינת תאורה בעבודת לילה או במקומות חשוכים באתר?",a:["תאורה נאותה ומספקת בכל מקומות העבודה, הגישה והמעברים","פנס ראש לעובד אחד בכל צוות","עבודה לאור הירח בלבד","תאורה רק בכניסה לאתר"],c:0,e:"תאורה לקויה מגבירה את כל סיכוני האתר — נפילות, פגיעות כלים, טעויות. נדרשת תאורה מתאימה בעמדות העבודה, בדרכי הגישה ובמעברים, ובעבודת גובה בלילה — גם הנחיות בכתב מהמבצע.",s:"פקודת הבטיחות בעבודה — תאורה; תקנות עבודה בגובה, התשס\"ז-2007"},
{t:"מכונות וכלי עבודה",d:3,q:"מהו עקרון 'נעילה ותיוג' (LOTO) בטיפול במכונה או במערכת חשמלית?",a:["ניתוק מקור האנרגיה, נעילתו באמצעי פיזי ותליית שלט המזהה את המטפל — כך שאיש לא יחזיר את הזרם בשוגג עד סיום הטיפול","סימון המכונה בצבע ייחודי","רישום הטיפול ביומן בלבד","הצבת שומר ליד המתג למשך כל הטיפול"],c:0,e:"LOTO מונע את תאונת ה'מישהו הדליק בלי לדעת שעובדים על הקו': המנתק ננעל פיזית (מנעול אישי) ומתויג בשם המטפל, ורק הוא מסיר את הנעילה בסיום. שלט בלבד או שומר אנושי אינם תחליף לנעילה.",s:"פקודת הבטיחות בעבודה; תקנות החשמל; נוהלי עבודה בטוחה — מינהל הבטיחות"},

/* ===== storage (with in-memory fallback) ===== */
const store = (() => {
  let mem = {};
  let ok = false;
  try {
    localStorage.setItem('__t','1'); localStorage.removeItem('__t'); ok = true;
  } catch(e){ ok = false; }
  return {
    get(k, def){
      try{
        const v = ok ? localStorage.getItem(k) : mem[k];
        return v == null ? def : JSON.parse(v);
      }catch(e){ return def; }
    },
    set(k, v){
      try{
        const s = JSON.stringify(v);
        if(ok) localStorage.setItem(k, s); else mem[k] = s;
      }catch(e){}
    },
    persistent: ok
  };
})();

/* ===== state ===== */
const TOPICS = [...new Set(QUESTIONS.map(q=>q.t))];
const PASS = 80;
let stats = store.get('k131_stats', {});           // qIndex -> {ok, bad}
let history = store.get('k131_history', []);       // {mode,score,total,date}
let session = null;                                 // current quiz session
let timerInt = null;

function topicStats(){
  const m = {};
  TOPICS.forEach(t=>m[t]={ok:0,bad:0});
  Object.keys(stats).forEach(i=>{
    const q = QUESTIONS[+i]; if(!q) return;
    m[q.t].ok += stats[i].ok||0; m[q.t].bad += stats[i].bad||0;
  });
  return m;
}
function mistakesPool(){
  return Object.keys(stats).filter(i=>(stats[i].bad||0) > (stats[i].ok||0)).map(Number);
}
function answeredCount(){ return Object.keys(stats).length; }
function shuffle(a){
  a = a.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(s){
  const m = Math.floor(s/60), ss = s%60;
  return m + ':' + String(ss).padStart(2,'0');
}
const app = document.getElementById('app');
function stopTimer(){ if(timerInt){ clearInterval(timerInt); timerInt = null; } }

/* ===== home ===== */
