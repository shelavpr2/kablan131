{t:"חפירות ודיפון",d:3,q:"מי רשאי לקבוע ששיפוע דפנות החפירה מבטיח יציבות ומייתר דיפון, במקרה של ספק לגבי טיב הקרקע?",a:["מהנדס, על סמך בחינת תנאי הקרקע","כל עובד ותיק באתר","נציג חברת כוח האדם","ספק כלי החפירה"],c:0,e:"קביעת שיפוע בטוח תלויה בסוג הקרקע, לחותה ועומסים סמוכים – שיקול הנדסי-גיאוטכני. בכל מקרה של ספק נדרשת הכרעה מקצועית של מהנדס, לא הערכה של גורם בלתי מוסמך.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:2,q:"גידור חפירה באתר נדרש בעיקר כדי:",a:["למנוע נפילת אדם לתוכה, לרבות עוברי אורח וילדים","לסמן את גבול המגרש","למנוע כניסת בעלי חיים בלבד","לשמור על ניקיון החפירה"],c:0,e:"חפירות ובורות הם מפגע נפילה חמור – לעובדים ולציבור. התקנות מחייבות גידור יציב ומחסומים, ובלילה גם תאורת אזהרה אדומה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:3,q:"בתעלה מדופנת, עד איזה מרחק מתחתית התעלה (או מעליה) צריך הדיפון להגיע ביחס לפני הקרקע?",a:["הדיפון צריך לבלוט מעל פני הקרקע כדי למנוע נפילת חומר וכלים לתוך התעלה","הדיפון נדרש רק עד מחצית גובה הדופן","הדיפון מסתיים 30 ס\"מ מתחת לפני הקרקע","אין דרישה לגבי קצה הדיפון העליון"],c:0,e:"דיפון הבולט מעל שפת התעלה (לוח רגל) מונע הידרדרות אבנים, עפר וכלי עבודה על ראשי העובדים בתוכה – בנוסף לתפקידו בתמיכת הדפנות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:2,q:"עובד הבחין בסדקים חדשים בקרקע לאורך שפת החפירה. מה הצעד הנכון?",a:["להפסיק מיד את העבודה בחפירה, להרחיק עובדים ולדווח למנהל העבודה לבדיקה","להמשיך לעבוד ולעקוב אחרי הסדקים","לכסות את הסדקים בעפר","לצלם ולהמשיך בעבודה"],c:0,e:"סדקים מקבילים לשפת חפירה הם סימן מובהק לתחילת כשל וקריסת דופן. התגובה הנדרשת היא פינוי מיידי של העובדים מהחפירה ובדיקה בידי מנהל העבודה (ובמידת הצורך מהנדס) לפני חידוש העבודה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות; עקרונות בטיחות בחפירות – מינהל הבטיחות"},
{t:"חפירות ודיפון",d:3,q:"חפירה צרה ועמוקה (תעלה) נחשבת מסוכנת יותר מחפירה רחבה באותו עומק, בעיקר משום ש:",a:["לעובד אין דרך מילוט צידית וקריסת דופן קוברת אותו מיידית","קשה להכניס אליה כלים","היא מתמלאת מים מהר יותר","היא דורשת יותר עובדים"],c:0,e:"בתעלה צרה העובד כלוא בין שתי דפנות; קריסה של קוב עפר בודד (כ-1.5 טון ויותר) קוברת אדם בשניות ללא אפשרות חילוץ עצמי. לכן הדרישות לדיפון ולדרכי מילוט בתעלות מחמירות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות; הנחיות מינהל הבטיחות"},
{t:"חפירות ודיפון",d:2,q:"כלי רכב פורק חומר בסמוך לשפת חפירה. מה האמצעי הנדרש למניעת הידרדרותו לתוכה?",a:["הצבת מחסום/סד עצירה (עצר גלגלים) במרחק בטוח משפת החפירה","הצבת עובד שיסמן לנהג בעמידה על שפת החפירה","פיזור חצץ על שפת החפירה","אין צורך באמצעי אם הנהג מנוסה"],c:0,e:"רכב המתקרב בנסיעה לאחור לשפת חפירה עלול להידרדר לתוכה או למוטט את הדופן ממשקלו. נדרש עצר (מחסום) פיזי במרחק בטוח מהשפה, ואסור להציב מכוון בנקודת הסכנה עצמה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988, פרק החפירות"},
{t:"חפירות ודיפון",d:3,q:"בור ספיגה ישן התגלה באתר ויש לעבוד בתוכו. מהי הסכנה הייחודית ומה נדרש לפני כניסה?",a:["אטמוספרה מסוכנת (גזים, חוסר חמצן) – נדרשת בדיקת אוויר ואוורור לפני כניסה, בהתאם לכללי מקום מוקף","סכנת רעש בלבד – נדרשות אטמי אוזניים","סכנת חום – נדרשת שתייה מרובה","אין סכנה מיוחדת מעבר לבור רגיל"],c:0,e:"בורות ספיגה, שוחות ביוב ובורות סגורים הם 'מקום מוקף': עלולים להצטבר בהם גזים רעילים/נפיצים או מחסור בחמצן. כניסה מותרת רק לאחר בדיקת אטמוספרה, אוורור ונקיטת סידורי חילוץ לפי פקודת הבטיחות בעבודה.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 – הוראות מקום מוקף"},
{t:"קווי חשמל",d:2,q:"מהו המרחק המזערי שיש לשמור בין כל חלק של ציוד או אדם לבין קו חשמל עילי במתח עד 33 ק\"ו?",a:["3.25 מטרים","5 מטרים","1.5 מטרים","10 מטרים"],c:0,e:"בקווי חשמל עיליים במתח עד 33 ק\"ו המרחק המזערי הנדרש הוא 3.25 מטרים; בקווים שמתחם עולה על 33 ק\"ו – 5 מטרים. מתחת למרחקים אלה קיימת סכנת קשת חשמלית גם ללא מגע ישיר.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – עבודה בקרבת קווי חשמל"},
{t:"קווי חשמל",d:2,q:"עגורן צריך לפעול במרחק קטן מהמרחק המזערי מקו חשמל עילי במתח גבוה. מה הפתרון התקין?",a:["ניתוק הקו, או בידודו/הצבת מחיצות מגן – בתיאום עם חברת החשמל – לפני תחילת העבודה","עבודה איטית ובזהירות של מפעיל מנוסה","עבודה בשעות הלילה כשהצריכה נמוכה","הרטבת הקרקע סביב העגורן"],c:0,e:"כשאי אפשר לשמור על מרחקי הבטיחות, התקנות מחייבות הסדרה מראש מול חברת החשמל: ניתוק המתח, בידוד הקו או התקנת מחיצות/גדרות מגן. מהירות עבודה או ניסיון המפעיל אינם מגינים מקשת חשמלית.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – עבודה בקרבת קווי חשמל"},
{t:"קווי חשמל",d:3,q:"מהו 'מתח נמוך מאוד' לעניין תאורה וכלי עבודה מיטלטלים במקומות לחים או מוקפים?",a:["מתח שאינו עולה על 50 וולט","מתח שאינו עולה על 230 וולט","מתח שאינו עולה על 110 וולט","כל מתח בזרם ישר"],c:0,e:"'מתח נמוך מאוד' מוגדר כמתח שאינו עולה על 50 וולט. בתנאי סיכון מוגבר (רטיבות, מקום מוקף, מגע עם מתכת) נדרש שימוש בתאורה וכלים במתח נמוך מאוד או באמצעי הגנה שווי ערך.",s:"חוק החשמל, התשי\"ד-1954 ותקנותיו; תקנות הבטיחות בעבודה (חשמל), התש\"ן-1990"},
{t:"קווי חשמל",d:2,q:"מי מוסמך להתקין מתקן חשמל ארעי באתר בנייה?",a:["חשמלאי בעל רישיון מתאים לפי חוק החשמל","מנהל העבודה","כל עובד שעבר הדרכת בטיחות בחשמל","טכנאי מיזוג אוויר"],c:0,e:"התקנת מתקן חשמל, לרבות מתקן ארעי באתר בנייה, היא 'עבודת חשמל' המותרת רק לבעל רישיון חשמלאי מתאים לפי חוק החשמל. מנהל עבודה או עובד מודרך אינם מוסמכים לכך.",s:"חוק החשמל, התשי\"ד-1954; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"קווי חשמל",d:3,q:"באיזו תדירות יש ללחוץ על לחצן הבדיקה של מפסק מגן (ממסר פחת) באתר, ומי רשאי לבצע זאת?",a:["אחת לשבוע לפחות; הבדיקה בלחצן יכולה להתבצע גם בידי מי שאינו חשמלאי","אחת ליום בידי חשמלאי בלבד","אחת לשנה בידי בודק מוסמך","אין צורך בבדיקה שוטפת"],c:0,e:"בדיקת תקינות באמצעות לחצן הבדיקה נעשית אחת לשבוע לפחות, ופעולה זו אינה דורשת חשמלאי. בנוסף נדרשת בדיקה באמצעות מכשיר בדיקה אחת לשלושה חודשים – וזו תיעשה בידי חשמלאי.",s:"תקנות הבטיחות בעבודה (חשמל), התש\"ן-1990"},
{t:"קווי חשמל",d:3,q:"בדיקת מפסק מגן (פחת) באמצעות מכשיר בדיקה נדרשת:",a:["אחת לשלושה חודשים, בידי חשמלאי","אחת לשבוע, בידי מנהל העבודה","אחת לחמש שנים, בידי חברת החשמל","רק לאחר תקלה"],c:0,e:"מעבר לבדיקת הלחצן השבועית, נדרשת בדיקה תקופתית של מפסק המגן באמצעות מכשיר בדיקה אחת לשלושה חודשים, והיא תבוצע בידי חשמלאי מוסמך לכך.",s:"תקנות הבטיחות בעבודה (חשמל), התש\"ן-1990"},
{t:"קווי חשמל",d:2,q:"כבל הזנה זמני באתר חוצה דרך שבה נעים כלי רכב. כיצד יוגן?",a:["הטמנה, הגבהה או הגנה מכנית מתאימה למניעת פגיעת רכב בכבל","הנחת הכבל על הקרקע עם סימון בצבע","קשירת הכבל לגדר בגובה מטר","אין צורך בהגנה אם הכבל מבודד"],c:0,e:"כבל חשמל החוצה נתיב תנועה חייב הגנה מפני פגיעה מכנית – הטמנה בשרוול, הגבהה מעל גובה הרכבים או מיגון פיזי. בידוד הכבל לבדו אינו עומד במעיכת גלגלים וזחלים.",s:"תקנות הבטיחות בעבודה (חשמל), התש\"ן-1990; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"קווי חשמל",d:3,q:"משאית הרמה (מנוף) נגעה בקו מתח עילי והנהג נותר בתא. מה ההנחיה הנכונה עבורו כל עוד אין סכנת שריפה?",a:["להישאר בתוך התא ולא לגעת בו-זמנית ברכב ובקרקע, עד לניתוק הקו בידי חברת החשמל","לקפוץ מיד מהתא ולרוץ","לרדת לאט במדרגות הרכב","לגעת בקרקע ברגל אחת תחילה לבדיקה"],c:0,e:"הרכב נמצא בפוטנציאל חשמלי; מגע בו-זמני ברכב ובקרקע יוצר מסלול זרם דרך הגוף. ההנחיה: להישאר בתא ולהרחיק אנשים, עד ניתוק הקו. אם חייבים לנטוש (שריפה) – לקפוץ בשתי רגליים צמודות בלי לגעת ברכב ולהתרחק בצעדים קטנים.",s:"הנחיות בטיחות בעבודה בקרבת קווי חשמל – מינהל הבטיחות וחברת החשמל"},
{t:"קווי חשמל",d:2,q:"לוח חשמל זמני באתר בנייה חייב להיות:",a:["מוגן מפני מים ופגיעות, סגור, ומחוברים בו מפסקי מגן (פחת) למעגלים","פתוח לגישה מהירה של כל עובד","מוצב בתוך מחסן כלים נעול שאין אליו גישה","מחובר ישירות ללא הגנות לחיסכון באנרגיה"],c:0,e:"לוח זמני באתר יהיה מוגן מפגעי מזג אוויר ופגיעה מכנית, דלתו סגורה, והמעגלים יוגנו במפסקי מגן ברגישות מתאימה. נדרשת גם גישה מהירה לניתוק חירום – ולכן אסור לנעול אותו באופן המונע ניתוק.",s:"תקנות הבטיחות בעבודה (חשמל), התש\"ן-1990; חוק החשמל ותקנותיו"},
{t:"קווי חשמל",d:3,q:"מתכננים עבודות באזור שבו עוברים כבלי חשמל תת-קרקעיים. מה הפעולה הראשונה הנדרשת?",a:["איתור וסימון תוואי הכבלים בתיאום עם חברת החשמל לפני תחילת החפירה","חפירה זהירה בכלי מכני קטן","חפירה רק בשעות היום","הנחת לוחות פלדה על הקרקע"],c:0,e:"לפני חפירה באזור החשוד בתשתיות חשמל יש לקבל מחברת החשמל את תוואי הכבלים, לסמנו, ובקרבתו לחפור בעבודת ידיים זהירה. פגיעת כף מחפר בכבל מתח גבוה קטלנית.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; הנחיות חברת החשמל ומינהל הבטיחות"},
{t:"עגורנים ומתקני הרמה",d:2,q:"באיזו תדירות חייב בודק מוסמך לבדוק עגורן ולתת תסקיר?",a:["אחת ל-14 חודשים לפחות, וכן לאחר הקמה או שינוי מהותי","אחת ל-6 חודשים","אחת ל-5 שנים","רק לאחר תאונה"],c:0,e:"מכונת הרמה, ובכלל זה עגורן, טעונה בדיקת בודק מוסמך לפחות אחת ל-14 חודשים, וכן לאחר התקנתה במקום או שינוי מהותי. התסקיר נשמר וזמין לעיון המפקח.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 – מכונות הרמה"},
{t:"עגורנים ומתקני הרמה",d:2,q:"באיזו תדירות נבדקים אבזרי הרמה (שרשרות, כבלים, אונקלים, רתמות) בידי בודק מוסמך?",a:["אחת ל-6 חודשים לפחות","אחת ל-14 חודשים","אחת לשבוע","אחת ל-3 שנים"],c:0,e:"אבזרי הרמה טעונים בדיקה תקופתית של בודק מוסמך אחת לשישה חודשים לפחות – תדירות גבוהה ממכונת ההרמה עצמה, בשל הבלאי המהיר והקריטיות שלהם בשרשרת ההרמה.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 – אבזרי הרמה"},
{t:"עגורנים ומתקני הרמה",d:2,q:"מה חייב להיות מסומן על כל עגורן ואבזר הרמה באופן ברור?",a:["עומס העבודה הבטוח (ע.ע.ב)","שם היצרן בלבד","שנת הייצור בלבד","שם מנהל העבודה"],c:0,e:"על כל מכונת הרמה ואבזר הרמה יסומן עומס העבודה הבטוח. בעגורן בעל זרוע משתנה – טבלת עומסים לפי המפתח (רדיוס). חריגה מהעומס הבטוח אסורה.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970 – מכונות ואבזרי הרמה"},
{t:"עגורנים ומתקני הרמה",d:2,q:"מתי חובה להעסיק אתת (מאותת) בעבודת עגורן?",a:["כאשר אין למפעיל העגורן קשר עין מלא עם המטען לאורך כל מסלולו","בכל הרמה, ללא תלות בתנאים","רק בהרמת מטענים מעל 5 טון","רק בעגורן צריח"],c:0,e:"כשהעגורנאי אינו רואה את המטען בכל שלבי ההרמה וההובלה, חובה להציב אתת מוסמך שיכוון אותו בסימנים מוסכמים או בקשר. תקנות העגורנאים מסדירות את הסמכת האתתים.",s:"תקנות הבטיחות בעבודה (עגורנאים, מפעילי מכונות הרמה אחרות ואתתים), התשנ\"ג-1992"},
{t:"עגורנים ומתקני הרמה",d:2,q:"מי רשאי להפעיל עגורן צריח באתר בנייה?",a:["עגורנאי בעל הסמכה תקפה לסוג העגורן הרלוונטי","כל עובד שעבר חפיפה מהעגורנאי הקודם","מנהל העבודה מתוקף תפקידו","טכנאי מטעם ספק העגורן, ללא הסמכת עגורנאי"],c:0,e:"הפעלת עגורן מותרת רק למי שבידו הסמכת עגורנאי תקפה מהסוג המתאים (עגורן צריח – סוג ב'). ההסמכות מוגדרות בתקנות העגורנאים לפי סוגי העגורנים.",s:"תקנות הבטיחות בעבודה (עגורנאים, מפעילי מכונות הרמה אחרות ואתתים), התשנ\"ג-1992"},
{t:"עגורנים ומתקני הרמה",d:3,q:"מה הדין לגבי הרמת אדם באמצעות עגורן?",a:["אסורה, אלא בסל הרמה ייעודי ותקני שאושר לכך ובתנאים שנקבעו","מותרת אם האדם קשור לאונקל ברתמה","מותרת עד גובה 6 מטרים","מותרת בהוראת מנהל העבודה בכל אמצעי"],c:0,e:"אסור להרים בני אדם בכף, על המטען או באבזרי הרמה רגילים. הרמת אדם מותרת רק בסל/במת הרמה ייעודית העומדת בדרישות, שנבדקה ואושרה, ובנקיטת אמצעי הבטיחות שנקבעו.",s:"פקודת הבטיחות בעבודה ותקנותיה; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988"},
{t:"עגורנים ומתקני הרמה",d:3,q:"מתי יש להפסיק את עבודת עגורן הצריח בשל רוח?",a:["כאשר מהירות הרוח מגיעה לסף שקבע יצרן העגורן בהוראות ההפעלה","רק כאשר נשבר חפץ מהעגורן","כאשר העובדים בשטח חשים אי-נוחות","בכל רוח מעל 10 קמ\"ש"],c:0,e:"סף הרוח להפסקת עבודה נקבע בהוראות היצרן לכל דגם עגורן (ערכים שונים להרמה ולמצב סופה). על העגורנאי ומנהל העבודה לעקוב אחר מד הרוח ולפעול לפי הוראות היצרן, כולל שחרור הזרוע לסיבוב חופשי בסערה.",s:"הוראות יצרן; תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – ציוד מכני"},
{t:"עגורנים ומתקני הרמה",d:2,q:"האם מותר להעביר מטען מורם מעל ראשי עובדים באתר?",a:["לא – יש לתכנן את מסלול ההנפה כך שלא יעבור מעל אנשים, ולהרחיק עובדים מהמסלול","כן, אם המטען קשור היטב","כן, אם גובה המטען מעל 10 מטרים","כן, בהנפות קצרות בלבד"],c:0,e:"נפילת מטען או חלק ממנו היא גורם תאונות קטלני. אסור להעביר מטענים מעל בני אדם; מתכננים את מסלול ההנפה מראש ומפנים את האזור שמתחתיו.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; פקודת הבטיחות בעבודה – מכונות הרמה"},
{t:"עגורנים ומתקני הרמה",d:3,q:"היכן נשמרים תסקירי הבדיקה של בודק מוסמך לעגורן הפועל באתר?",a:["באתר, זמינים לעיון מפקח עבודה, כחלק מתיעוד הציוד והפנקס הכללי","במשרדי הבודק המוסמך בלבד","במשרד הפנים","אין חובת שמירה לאחר הבדיקה"],c:0,e:"תסקירי בדיקה של מכונות הרמה יישמרו ויהיו זמינים להצגה למפקח עבודה. באתר בנייה נהוג לצרפם לתיעוד שליד הפנקס הכללי, כראיה לכשירות הציוד.",s:"פקודת הבטיחות בעבודה [נוסח חדש], התש\"ל-1970; תקנות מסירת מידע למפקח"},
{t:"עגורנים ומתקני הרמה",d:3,q:"שני עגורני צריח פועלים באתר וזרועותיהם עלולות להצטלב. מה נדרש?",a:["תיאום גבהים ונוהל עבודה משותף למניעת התנגשות, לרבות אמצעי תיאום בין העגורנאים","אין דרישה – העגורנאים יסתדרו בזמן אמת","הפעלת עגורן אחד בלבד בכל יום","הנמכת שני העגורנים לגובה זהה"],c:0,e:"בחפיפת תחומי עבודה של עגורנים נדרש תכנון: הפרשי גובה בין הזרועות, נוהל תיאום וקשר בין העגורנאים, ולעיתים מערכות מניעת התנגשות. היעדר תיאום גרם לתאונות קשות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; הנחיות מינהל הבטיחות לעגורני צריח"},
{t:"עבודות הריסה",d:2,q:"בהשגחת מי תתבצע עבודת הריסה של מבנה?",a:["בהשגחתו הישירה של מנהל עבודה","בהשגחת שומר האתר","בהשגחת נציג העירייה","ללא השגחה אם הקבלן מנוסה"],c:0,e:"התקנות מחייבות שעבודות הריסה יבוצעו בהנהלתו ובהשגחתו הישירה של מנהל עבודה, בשל רמת הסיכון הגבוהה והצורך בסדר הריסה מבוקר.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:2,q:"מה חובה לעשות בתשתיות (חשמל, גז, מים) לפני תחילת הריסת מבנה?",a:["לנתקן ממקורותיהן, ובמידת הצורך בתיאום עם הרשויות והחברות המספקות","להשאירן פעילות לצורכי העבודה","לנתק רק את החשמל ולהשאיר גז ומים","לנתקן רק ביום ההריסה הסופי"],c:0,e:"לפני הריסה יש לנתק חשמל, גז, מים וקווים אחרים – חשמל חי וצנרת גז במבנה נהרס הם סכנת התחשמלות ופיצוץ. אם נדרש חשמל לעבודה, יותקן מתקן ארעי מוגן ונפרד.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:2,q:"כיצד מאבטחים את סביבת מבנה העומד להריסה מפני כניסת אנשים?",a:["גידור האזור המסוכן, הצבת שלטי אזהרה ומניעת גישה של מי שאינו מועסק בהריסה","הצבת שלט אחד בכניסה הראשית","סימון בסרט פלסטיק בלבד","הודעה ברמקול פעם ביום"],c:0,e:"סביב מבנה נהרס נוצר אזור נפילת חלקים. נדרש גידור יציב של תחום הסכנה, שילוט אזהרה, ואיסור כניסה לכל מי שאינו עוסק בעבודה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:3,q:"האם מותר להעסיק עובדים בקומות שונות של מבנה נהרס, זה מעל זה?",a:["לא – אסור להעסיק עובדים במפלסים שונים באותו אנך, מחשש לנפילת חומרים וחלקי מבנה","כן, אם המרחק האנכי מעל 3 מטרים","כן, אם העליון עובד בכלים ידניים בלבד","כן, בתיאום קולי ביניהם"],c:0,e:"בעת הריסה נופלים שברים, אבנים וחלקי מבנה. העסקת עובדים במפלס תחתון מתחת לעובדים במפלס עליון באותו אנך אסורה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:3,q:"מה הכלל לגבי הפלת חלקי מבנה כבדים על תקרות המבנה הנהרס?",a:["אסור להפיל חלקים על תקרה באופן העלול לגרום לקריסתה – אין להעמיס עליה מעבר לכושר נשיאתה","מותר אם התקרה מבטון מזוין","מותר עד גובה הפלה של 2 מטרים","מותר אם אין עובדים בקומה שמתחת"],c:0,e:"תקרות מבנה ישן אינן מתוכננות לעומסי הלם של חומר נופל; הפלת קירות וחלקים כבדים עליהן עלולה למוטט את התקרה ואת העובדים שעליה. ההריסה תתבצע בסדר מבוקר ובפינוי שוטף של הפסולת.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:2,q:"עובד מפרק קיר בעבודת ידיים. היכן אסור לו לעמוד?",a:["על הקיר הנהרס עצמו או על חלק מבנה העלול לקרוס עמו","על פיגום סמוך לקיר","על רצפה יציבה במרחק מהקיר","על במת הרמה תקנית"],c:0,e:"עמידה על האלמנט הנהרס עצמו פירושה נפילה יחד איתו. ההריסה תיעשה ממשטח עבודה יציב ובטוח (פיגום, במה) ולא מהקיר או מהחלק המיועד להריסה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:3,q:"כיצד מפנים פסולת בניין מקומות עליונות של מבנה נהרס באופן תקין?",a:["באמצעות מגלשות (שנאטות) סגורות או אמצעי הורדה מבוקר – אסור להשליך חופשית למפלס הקרקע","בהשלכה חופשית מהחלונות לאחר אזהרה קולית","בהשארת הפסולת על התקרות עד תום ההריסה","בפיזור הפסולת על גרם המדרגות"],c:0,e:"השלכה חופשית של פסולת יוצרת רסס, אבק וסכנת פגיעה. הפינוי ייעשה במגלשות סגורות אל מכולה/אזור גדור, או בהורדה מבוקרת. הצטברות פסולת על תקרות מסכנת בקריסה.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:2,q:"איזה אמצעי נדרש לצמצום מפגע האבק בעבודות הריסה?",a:["הרטבה (התזת מים) של החומר הנהרס והפסולת","עבודה בשעות חמות שבהן האבק שוקע","שימוש במאווררים לפיזור האבק","אין דרישה לטיפול באבק"],c:0,e:"אבק הריסה מסכן את דרכי הנשימה ואת הראות באתר. הרטבת החומר הנהרס מקובלת וחיונית, בנוסף לציוד מגן נשימתי לפי הצורך (ובדגש מיוחד כשיש חשד לאסבסט – אז נדרשים כללים נפרדים).",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות"},
{t:"עבודות הריסה",d:3,q:"לפני תחילת הריסה של מבנה שניזוק (למשל בשריפה או רעידת אדמה), מה נדרש?",a:["בחינה הנדסית של יציבות המבנה וקביעת שיטת הריסה וסדר פעולות, בידי גורם מוסמך","הריסה מהירה ככל האפשר לפני קריסה עצמית","הסרת הגג בלבד והמתנה","כיסוי המבנה ביריעות"],c:0,e:"מבנה פגוע עלול לקרוס באופן בלתי צפוי במהלך ההריסה. נדרשת בדיקה הנדסית מוקדמת של מצב המבנה, קביעת שיטת ההריסה, סדר השלבים, ותמיכות זמניות במידת הצורך.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988 – פרק ההריסות; הנחיות מינהל הבטיחות"},
{t:"עבודות הריסה",d:3,q:"במהלך הריסה התגלה חומר החשוד כאסבסט. מה הפעולה הנדרשת?",a:["הפסקת העבודה באזור והמשך טיפול רק לפי חוק האסבסט – באמצעות קבלן אסבסט בעל רישיון ובאישור הגורמים המוסמכים","ריסוק החומר והרטבתו וערבובו בפסולת הרגילה","פינוי מהיר בשקיות רגילות","המשך עבודה עם מסכות אבק פשוטות"],c:0,e:"עבודות באסבסט מוסדרות בחוק נפרד ומחייבות קבלן אסבסט מורשה, תוכנית עבודה ואישורים. המשך הריסה רגילה או פינוי עצמאי של אסבסט אסורים ומסכנים את העובדים והסביבה.",s:"החוק למניעת מפגעי אסבסט ואבק מזיק, התשע\"א-2011; תקנות הבטיחות בעבודה (גיהות תעסוקתית ובריאות הציבור והעובדים באבק מזיק)"},
{t:"תאונות עבודה וחקירה",d:2,q:"עובד נהרג בתאונה באתר. תוך כמה זמן ולמי יש להודיע?",a:["מיד, למפקח העבודה האזורי","תוך 3 ימים, לרשם הקבלנים","תוך שבוע, לביטוח הלאומי בלבד","תוך 24 שעות, לעירייה"],c:0,e:"פקודת תאונות ומחלות משלח-יד (הודעה), 1945 מחייבת הודעה מיידית למפקח העבודה האזורי על תאונת עבודה שגרמה למוות. בנוסף קיימות חובות דיווח למשטרה ולמוסד לביטוח לאומי, אך החובה המיידית לפי הפקודה היא למפקח האזורי.",s:"פקודת תאונות ומחלות משלח-יד (הודעה), 1945, סעיף 3"},
{t:"תאונות עבודה וחקירה",d:2,q:"עובד נפצע ונעדר מעבודתו 5 ימים. האם קיימת חובת הודעה למפקח עבודה אזורי?",a:["כן – תאונה שגרמה לאי-כושר עבודה של יותר מ-3 ימים מחייבת הודעה","לא – חובת הודעה קיימת רק במקרה מוות","רק אם העובד פנה לבית חולים","רק אם העובד דורש זאת"],c:0,e:"הפקודה מחייבת הודעה למפקח האזורי על תאונת עבודה שבעקבותיה נבצר מהעובד לעבוד למעלה משלושה ימים, ולא רק על תאונות קטלניות.",s:"פקודת תאונות ומחלות משלח-יד (הודעה), 1945"},
{t:"תאונות עבודה וחקירה",d:3,q:"לאחר תאונה קטלנית באתר, מה הדין לגבי זירת התאונה?",a:["אין לשנות את הזירה ואת מצב הציוד עד לסיום בדיקת מפקח העבודה (ו/או המשטרה), אלא לצורך הצלת חיים או מניעת סכנה","יש לפנות מיד את הציוד כדי לחדש עבודה","יש לנקות את האזור מטעמי כבוד המת","מותר לשנות הכל לאחר צילום בטלפון"],c:0,e:"שימור הזירה חיוני לחקירת הגורמים. שינוי מותרת רק לצורך חילוץ והצלה או מניעת סכנה נוספת. שיבוש זירה עלול להיחשב שיבוש חקירה.",s:"פקודת הבטיחות בעבודה; נוהלי חקירת תאונות – מינהל הבטיחות"},
{t:"תאונות עבודה וחקירה",d:2,q:"היכן באתר מתועדות תאונות עבודה שאירעו בו?",a:["בפנקס הכללי של האתר","ביומן האישי של הקבלן בלבד","בקבוצת הוואטסאפ של האתר","אין חובת תיעוד באתר"],c:0,e:"הפנקס הכללי משמש לרישום אירועים מהותיים באתר, ובכלל זה תאונות עבודה, בנוסף לחובות ההודעה החיצוניות למפקח האזורי ולמוסדות.",s:"תקנות הבטיחות בעבודה (עבודות בנייה), התשמ\"ח-1988; פקודת הבטיחות בעבודה – הפנקס הכללי"},

/* ===== storage (with in-memory fallback) ===== */
const store = (() => {
  let mem = {};
  let ok = false;
  try {
    localStorage.setItem('__t','1'); localStorage.removeItem('__t'); ok = true;
  } catch(e){ ok = false; }
  return {
    get(k, def){
      try{
        const v = ok ? localStorage.getItem(k) : mem[k];
        return v == null ? def : JSON.parse(v);
      }catch(e){ return def; }
    },
    set(k, v){
      try{
        const s = JSON.stringify(v);
        if(ok) localStorage.setItem(k, s); else mem[k] = s;
      }catch(e){}
    },
    persistent: ok
  };
})();

/* ===== state ===== */
const TOPICS = [...new Set(QUESTIONS.map(q=>q.t))];
const PASS = 80;
let stats = store.get('k131_stats', {});           // qIndex -> {ok, bad}
let history = store.get('k131_history', []);       // {mode,score,total,date}
let session = null;                                 // current quiz session
let timerInt = null;

function topicStats(){
  const m = {};
  TOPICS.forEach(t=>m[t]={ok:0,bad:0});
  Object.keys(stats).forEach(i=>{
    const q = QUESTIONS[+i]; if(!q) return;
    m[q.t].ok += stats[i].ok||0; m[q.t].bad += stats[i].bad||0;
  });
  return m;
}
function mistakesPool(){
  return Object.keys(stats).filter(i=>(stats[i].bad||0) > (stats[i].ok||0)).map(Number);
}
function answeredCount(){ return Object.keys(stats).length; }
function shuffle(a){
  a = a.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(s){
  const m = Math.floor(s/60), ss = s%60;
  return m + ':' + String(ss).padStart(2,'0');
}
const app = document.getElementById('app');
function stopTimer(){ if(timerInt){ clearInterval(timerInt); timerInt = null; } }

/* ===== home ===== */

function resetAll(){
  if(!confirm('לאפס את כל הסטטיסטיקה וההיסטוריה?')) return;
  stats = {}; history = [];
  store.set('k131_stats', stats); store.set('k131_history', history);
  renderHome();
}

/* ===== session engine ===== */
function newSession(indices, opts){
  session = {
    order: indices,
    i: 0,
    answers: {},          // pos -> chosen original answer index
    mode: opts.mode,      // 'study' | 'exam'
    label: opts.label,
    timeLeft: opts.seconds || null,
    record: opts.record !== false,
    perms: indices.map(qi => shuffle([0,1,2,3]))   // answer display order per question
  };
  if(session.timeLeft){
    timerInt = setInterval(()=>{
      session.timeLeft--;
      const el = document.getElementById('timer');
      if(el){
        el.textContent = fmtTime(session.timeLeft);
        el.classList.toggle('warn', session.timeLeft <= 300);
      }
      if(session.timeLeft <= 0){ stopTimer(); finishSession(true); }
    }, 1000);
  }
  renderQuestion();
}
function startStudy(topic){
  let idx = QUESTIONS.map((_,i)=>i);
  if(topic) idx = idx.filter(i=>QUESTIONS[i].t === topic);
  renderStudyPicker();
}
function renderStudyPicker(){
  stopTimer();
  app.innerHTML = `
  <div class="backrow"><button class="linkback" onclick="renderHome()">→ חזרה</button></div>
  <div class="card">
    <h2>📖 מצב לימוד</h2>
    <div class="muted">בחר נושא או עבור על כל המאגר. לכל שאלה תקבל מיד הסבר מפורט ומקור חוקי.</div>
  </div>
  <div class="card">
    <div class="studynav">
      <button class="fchip on" onclick="beginStudy(null)">הכול (${QUESTIONS.length})</button>
      ${TOPICS.map(t=>{
        const n = QUESTIONS.filter(q=>q.t===t).length;
        return `<button class="fchip" onclick="beginStudy('${t.replace(/'/g,"\\'")}')">${t} (${n})</button>`;
      }).join('')}
    </div>
  </div>`;
}
function beginStudy(topic){
  let idx = QUESTIONS.map((_,i)=>i);
  if(topic) idx = idx.filter(i=>QUESTIONS[i].t === topic);
  newSession(shuffle(idx), {mode:'study', label: topic ? 'לימוד: '+topic : 'מצב לימוד'});
}
function startSim(n){
  const pool = shuffle(QUESTIONS.map((_,i)=>i)).slice(0, n);
  const secs = n === 30 ? 45*60 : n === 60 ? 90*60 : null;
  newSession(pool, {mode:'exam', label: n >= QUESTIONS.length ? 'מרתון מלא' : 'סימולציה '+n, seconds: secs});
}
function startRandom(){
  newSession(shuffle(QUESTIONS.map((_,i)=>i)).slice(0,10), {mode:'study', label:'10 אקראיות'});
}
function startMistakes(){
  const pool = mistakesPool();
  if(!pool.length){
    app.innerHTML = `<div class="backrow"><button class="linkback" onclick="renderHome()">→ חזרה</button></div>
    <div class="card"><div class="empty"><div class="ic">🎉</div>אין שאלות לחיזוק כרגע.<br>ענה על שאלות במצבי התרגול וכל טעות תיאסף לכאן.</div></div>`;
    return;
  }
  newSession(shuffle(pool), {mode:'study', label:'חזרה על טעויות'});
}

/* ===== question rendering ===== */
function renderQuestion(){
  const s = session;
  const qi = s.order[s.i];
  const q = QUESTIONS[qi];
  const perm = s.perms[s.i];
  const answered = s.answers[s.i] !== undefined;
  const diffTxt = q.d >= 3 ? '🔴 קשה' : q.d === 2 ? '🟠 בינוני' : '🟢 קל';
  app.innerHTML = `
  <div class="qtop">
    <button class="linkback" onclick="confirmExit()">✕ יציאה</button>
    <div class="progresswrap"><div class="progressbar" style="width:${(s.i)/s.order.length*100}%"></div></div>
    <span class="muted" style="font-variant-numeric:tabular-nums">${s.i+1}/${s.order.length}</span>
    ${s.timeLeft != null ? `<span class="timer ${s.timeLeft<=300?'warn':''}" id="timer">${fmtTime(s.timeLeft)}</span>` : ''}
  </div>
  <div class="card">
    <div class="qmeta">
      <span class="chip topic">${q.t}</span>
      <span class="chip">${diffTxt}</span>
      <span class="chip">${s.label}</span>
    </div>
    <div class="qtext">${esc(q.q)}</div>
    <div class="answers" id="answers">
      ${perm.map((ai,pos)=>`
        <button class="ans" id="ans${ai}" onclick="choose(${ai})" ${answered?'disabled':''}>
          <span class="let">${['א','ב','ג','ד'][pos]}</span>
          <span>${esc(q.a[ai])}</span>
        </button>`).join('')}
    </div>
    <div class="explain" id="explain"></div>
    <div class="navrow">
      ${s.mode === 'exam'
        ? `<button class="btn ghost" onclick="prevQ()" ${s.i===0?'disabled':''}>הקודמת</button>
           <button class="btn primary" id="nextBtn" onclick="nextQ()" ${answered?'':'disabled'}>${s.i === s.order.length-1 ? 'סיום מבחן' : 'הבאה'}</button>`
        : `<button class="btn primary" id="nextBtn" onclick="nextQ()" ${answered?'':'disabled'}>${s.i === s.order.length-1 ? 'סיום' : 'הבאה'}</button>`}
    </div>
  </div>`;
  if(answered) showFeedback(qi, s.answers[s.i]);
}
function choose(ai){
  const s = session;
  if(s.answers[s.i] !== undefined) return;
  s.answers[s.i] = ai;
  const qi = s.order[s.i];
  const q = QUESTIONS[qi];
  if(s.record){
    if(!stats[qi]) stats[qi] = {ok:0, bad:0};
    if(ai === q.c) stats[qi].ok++; else stats[qi].bad++;
    store.set('k131_stats', stats);
  }
  document.querySelectorAll('.ans').forEach(b=>b.disabled = true);
  if(s.mode === 'study'){
    showFeedback(qi, ai);
  } else {
    document.getElementById('ans'+ai).classList.add('sel');
  }
  const nb = document.getElementById('nextBtn');
  if(nb) nb.disabled = false;
}
function showFeedback(qi, ai){
  const q = QUESTIONS[qi];
  const good = ai === q.c;
  const elC = document.getElementById('ans'+q.c);
  if(elC) elC.classList.add('correct');
  if(!good){
    const elW = document.getElementById('ans'+ai);
    if(elW) elW.classList.add('wrong');
  }
  if(session.mode === 'study'){
    const ex = document.getElementById('explain');
    ex.className = 'explain' + (good ? '' : ' bad');
    ex.style.display = 'block';
    ex.innerHTML = `<b>${good ? '✅ נכון!' : '❌ לא מדויק'}</b>${esc(q.e)}<span class="src">📕 מקור: ${esc(q.s)}</span>`;
  }
}
function nextQ(){
  const s = session;
  if(s.i === s.order.length - 1){ finishSession(false); return; }
  s.i++; renderQuestion();
}
function prevQ(){
  const s = session;
  if(s.i === 0) return;
  s.i--; renderQuestion();
}
function confirmExit(){
  if(Object.keys(session.answers).length === 0 || confirm('לצאת? ההתקדמות בסבב הנוכחי לא תישמר כתוצאה.')){
    renderHome();
  }
}

/* ===== results ===== */
function finishSession(timeUp){
  stopTimer();
  const s = session;
  const answeredPos = Object.keys(s.answers).map(Number);
  let good = 0;
  const mist = [];
  answeredPos.forEach(pos=>{
    const qi = s.order[pos], q = QUESTIONS[qi], ai = s.answers[pos];
    if(ai === q.c) good++;
    else mist.push({q, ai});
  });
  const total = s.mode === 'exam' ? s.order.length : answeredPos.length;
  if(total === 0){ renderHome(); return; }
  const pct = Math.round(good/total*100);
  if(s.mode === 'exam'){
    history.push({mode:s.label, score:good, total, date:Date.now()});
    if(history.length > 30) history = history.slice(-30);
    store.set('k131_history', history);
  }
  const pass = pct >= PASS;
  const ringColor = pass ? 'var(--green)' : 'var(--red)';
  const circ = 2*Math.PI*62;
  app.innerHTML = `
  <div class="backrow"><button class="linkback" onclick="renderHome()">→ למסך הבית</button></div>
  <div class="card">
    <h2 style="text-align:center">${s.label} — סיכום</h2>
    ${timeUp ? '<div class="muted" style="text-align:center">⏰ הזמן נגמר</div>' : ''}
    <div class="score-ring"><div class="ring">
      <svg width="150" height="150">
        <circle cx="75" cy="75" r="62" fill="none" stroke="var(--line)" stroke-width="12"/>
        <circle cx="75" cy="75" r="62" fill="none" stroke="${ringColor}" stroke-width="12"
          stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}"/>
      </svg>
      <div class="num"><b>${pct}%</b><span>${good} מתוך ${total}</span></div>
    </div></div>
    ${s.mode === 'exam'
      ? `<div class="passline" style="color:${ringColor}">${pass ? '✅ עובר! (ציון מעבר '+PASS+')' : '❌ מתחת לציון המעבר ('+PASS+') — ממשיכים לתרגל'}</div>`
      : ''}
    <div class="navrow">
      ${mist.length ? `<button class="btn navy" onclick="startMistakes()">🩹 תרגול הטעויות</button>` : ''}
      <button class="btn primary" onclick="renderHome()">למסך הבית</button>
    </div>
  </div>
  ${mist.length ? `
  <div class="card">
    <h2>📋 דוח טעויות (${mist.length})</h2>
    <div class="muted" style="margin-bottom:12px">עברו על כל טעות — ההסבר והמקור הם הלימוד האמיתי.</div>
    ${mist.map(m=>`
      <div class="mist">
        <div class="q">${esc(m.q.q)}</div>
        <div class="you">✗ סימנת: ${esc(m.q.a[m.ai])}</div>
        <div class="cor">✓ נכון: ${esc(m.q.a[m.q.c])}</div>
        <div class="ex">${esc(m.q.e)}<br>📕 ${esc(m.q.s)}</div>
      </div>`).join('')}
  </div>` : `<div class="card"><div class="empty"><div class="ic">🏅</div>ללא טעויות — מצוין!</div></div>`}`;
  window.scrollTo(0,0);
  session = null;
}

/* ===== stats & weakness ===== */
function renderStats(){
  stopTimer(); session = null;
  const ts = topicStats();
  const rows = TOPICS.map(t=>{
    const {ok, bad} = ts[t], tot = ok+bad;
    return {t, ok, bad, tot, pct: tot ? Math.round(ok/tot*100) : null};
  });
  const attempted = rows.filter(r=>r.tot > 0);
  const weak = attempted.filter(r=>r.pct < PASS).sort((a,b)=>a.pct-b.pct);
  app.innerHTML = `
  <div class="backrow"><button class="linkback" onclick="renderHome()">→ חזרה</button></div>
  <div class="card">
    <h2>📊 ביצועים לפי נושא</h2>
    ${attempted.length ? rows.map(r=>{
      if(!r.tot) return `<div class="tstat"><div class="row"><span>${r.t}</span><span class="muted">טרם תורגל</span></div><div class="tbar"><i style="width:0"></i></div></div>`;
      const col = r.pct >= PASS ? 'var(--green)' : r.pct >= 60 ? 'var(--orange)' : 'var(--red)';
      return `<div class="tstat">
        <div class="row"><span>${r.t}</span><span style="font-weight:700;color:${col}">${r.pct}% <span class="muted">(${r.ok}/${r.tot})</span></span></div>
        <div class="tbar"><i style="width:${r.pct}%;background:${col}"></i></div>
      </div>`;
    }).join('') : `<div class="empty"><div class="ic">📭</div>עדיין אין נתונים — התחל לתרגל ותחזור לכאן.</div>`}
  </div>
  ${attempted.length ? `
  <div class="card">
    <h2>🎯 ניתוח חולשות והמלצות</h2>
    ${weak.length ? `
      <div class="muted" style="margin-bottom:10px">נושאים מתחת לציון המעבר (${PASS}), מהחלש לחזק:</div>
      ${weak.map(r=>{
        const col = r.pct >= 60 ? 'var(--orange)' : 'var(--red)';
        return `<div class="weak">
          <span class="pct" style="background:${col};color:#fff">${r.pct}%</span>
          <span style="flex:1"><b>${r.t}</b><br><span class="muted">${r.bad} טעויות מתוך ${r.tot} — מומלץ מצב לימוד ממוקד בנושא זה</span></span>
        </div>`;
      }).join('')}
      <div class="navrow"><button class="btn navy" onclick="startMistakes()">🩹 תרגול כל הטעויות</button>
      <button class="btn primary" onclick="renderStudyPicker()">📖 לימוד לפי נושא</button></div>`
    : `<div class="empty"><div class="ic">💪</div>כל הנושאים שתרגלת מעל ציון המעבר — המשך כך!</div>`}
  </div>` : ''}
  ${history.length ? `
  <div class="card">
    <h2>🕘 היסטוריית סימולציות</h2>
    ${history.slice().reverse().map(h=>{
      const p = Math.round(h.score/h.total*100);
      const d = new Date(h.date);
      const ds = d.toLocaleDateString('he-IL') + ' ' + d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
      return `<div class="setrow"><span>${h.mode}<br><span class="muted" style="font-size:.75rem">${ds}</span></span>
        <span class="badge ${p>=PASS?'green':'red'}">${p}% (${h.score}/${h.total})</span></div>`;
    }).join('')}
  </div>` : ''}`;
}

/* ===== theme & boot ===== */
const themeBtn = document.getElementById('themeBtn');
function applyTheme(t){
  document.documentElement.dataset.theme = t;
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  store.set('k131_theme', t);
}
themeBtn.onclick = ()=> applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
document.getElementById('homeBtn').onclick = ()=>{
  if(session && Object.keys(session.answers).length && !confirm('לעזוב את הסבב הנוכחי?')) return;
  renderHome();
};
applyTheme(store.get('k131_theme', window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
renderHome();
</script>
</body>
</html>
